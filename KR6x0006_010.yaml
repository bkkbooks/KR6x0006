body:
  text: 第十夜叉相應一第一因陀迦一爾時世尊住王舍城因陀峰山因陀夜叉之住處二時因陀迦夜叉來詣世尊處詣而以偈白世尊曰諸佛說此色非命然則如何命在身此骨與肉何處來如何此生住母胎三世尊初有迦羅邏由此迦羅邏而有阿部曇由此阿部曇由生宍肉生宍肉生堅肉由堅肢節生生髮及毛爪如是母以取飲料及食物住於母胎者依此而生長二第二釋羅一爾時世尊住王舍城靈鷲山二時名釋羅夜叉來詣世尊處詣已以偈白世尊曰卿離一切縛解脫之沙門教化其他者非卿之所為三世尊釋羅與衆交無論之形態非相應智人唯傾心同情以是寂靜心雖教化於他亦不為所縛唯同情愛憐三第三針毛一爾時世尊住伽耶之石牀針毛夜叉之住處二時怯羅夜叉與針毛夜叉路過世尊近處三時怯羅夜叉告針毛夜叉曰此是沙門四不此非沙門是小沙門至少知彼是沙門耶小沙門耶暫為小沙門五時針毛夜叉來詣世尊處詣已以身碰世尊六時世尊將身閃避七時針毛夜叉以此白世尊沙門恐怖我耶八不友我非恐怖然而與汝相觸總非善事九沙門我問汝汝若不能說明汝當亂心當破汝之心臟取汝之兩腳投諸恆河之彼岸一不友我於包括天界魔界梵天界之世界於沙門婆羅門人天之衆中不見我心亂破我心臟取兩腳投諸恆河彼岸者然而友欲者先問一一貪欲與瞋恚以何為因起快不快恐怖又從何因生猶如童子等放其縛足鳥心想何處起一二世尊貪欲與瞋恚當由渴愛起快不快恐怖悉由自己生猶如童子等放其縛足鳥心想由此起身從渴愛生尼俱律陀樹其幹由根生凡夫著愛欲如遍林蔓草知其生因者則以滅此因諦聽之夜叉彼等前來渡難渡渡瀑流無有受再生四第四摩尼跋陀一爾時世尊住摩揭陀國摩尼摩羅迦制底之摩尼跋陀夜叉住處二時摩尼跋陀夜叉來詣世尊處詣己於世尊處說此偈曰常於正念人幸福以持正念得安樂正念明日猶言祥彼解脫一切憤怒三世尊常於正念人幸福以持正念得安樂正念明日猶吉祥然彼不解一切怒是心日夜樂不害以慈悲一切有情於彼無有任何怒五第五左奴一爾時世尊住舍衛城祇樹給孤獨園二時有優婆夷名左奴之子為夜叉所魅惑三時優婆夷嘆息而唱此等偈曰我常聞如是阿羅漢宣說我常聞如是阿羅漢宣說然則今日我見夜叉魅弄左奴為何事十四十五日半月第八日得神變分日奉持八齊戒以住於布薩以行於梵行夜叉不能魅我聞羅漢說然我今日見夜叉魅左奴此乃為何事四夜叉十四十五日半月第八日得神變分日奉持八齊戒以住於布薩以住梵行者夜叉不能魅我聞羅漢說左奴若醒覺以此可語汝此乃夜叉語不分公與私勿行任何惡若作惡業者又若為欲為如鳥躍上逃難逃汝苦惱五左奴人皆哭死人生別時亦哭我活活於此母何故泣我六優婆夷人皆泣子死生別時亦哭然一度離欲而且又歸來亦以哭其子其生亦似死子汝出燼炎願不再墮燼愛子出地獄希不再入獄逃離為幸福誰此語我等盛火出家貨汝欲再燒耶六第六夜叉童子一爾時尊者阿那律住舍衛城祇樹給孤獨園二時尊者阿那律黎明即起以誦法句三時夜叉童母之夜叉女如是告其子曰美哉迦羅汝勿騷作音聲比丘誦法句我若知法句以如是行者乃我等利益切勿殺生物知而勿妄語自己行善戒我等脫鬼胎七第七富那婆藪一爾時世尊住舍衛城祇樹給孤獨園二其時世尊就有關涅槃說法教示利益鼓勵比丘等彼等諸比丘深切注意虔誠心意集中傾耳諦聽三時富那婆藪母之夜叉女以言告其子等靜默鬱多羅富那婆當默我暫聞思惟無上佛師教世尊說涅槃解脫諸結縛我甚愛此法世我子可愛世我夫可愛然而求此法有勝過此等子夫雖可愛不能脫苦惱聽聞正法者令人解苦惱於世敗此惱迷之於老死為解脫老死證悟於正法我願聞此法富那婆當默四富那婆藪母我乃不語靜默鬱多羅傾耳於法者聞法為快樂因不知正法母我迷苦惱此乃與迷於人天光輝者最後身佛陀有眼今說法五夜叉女善哉如是語我子寢我懷我子乃賢哉我子今愛樂無上佛所說無染淨白法子富那婆藪我今日心安解脫於輪回以見於聖諦我子鬱多羅汝亦聞於我八第八須達多一爾時世尊住王舍城之寒林二其時給孤獨長者有事到王舍城三給孤獨長者聞佛實出現於世欲往拜見世尊四時給孤獨長者作如是思惟今日欲往拜見世尊時已過遲明日適時當始往拜見世尊則念佛而臥其夜曾三度以為天亮而起身五時給孤獨長者來到墓地之門諸天則開其門六時給孤獨長者走出市鎮當離去時光滅而暗恐怖戰栗毛髮豎立長者就此欲退返七時尸婆迦夜叉來現其形只令聞聲百象與百馬又百之驢車百千之女亦裝摩尼耳環於此行一步不值十六一行進之長者行進之長者行進始能近退避當用腳八時給孤獨長者暗滅光現毛髮豎立之恐怖戰栗亦靜止九二度乃至一給孤獨長者三度光滅而暗恐怖戰栗毛髮豎立長者又欲從此而退返三度尸婆迦夜叉不現其形只令聞其聲乃至一一時給孤獨長者暗滅光現毛髮豎立之恐怖戰栗亦靜止一二時給孤獨長者來詣寒林於世尊住處一三其時世尊於夜曉起身在露地經行一四世尊見給孤獨長者從遠而來見已下經行處即坐所設座坐已世尊以此言給孤獨長者曰來須達多一五時給孤獨長者世尊按名呼我於此即於世尊足下五體投地而白曰世尊輕安而眠耶一六世尊煩惱火悉消婆羅門安眠不著於愛欲清涼無所依斷一切執著調伏心苦惱寂靜輕安寢是達心寂靜九第九叔迦羅一一爾時世尊住王舍城竹林栗鼠養餌所二其時叔迦羅比丘尼為被大衆圍繞而說法三時集叔迦羅比丘尼之信樂夜叉於王舍城從此街至彼街從此路至彼路以說此偈曰王舍城人衆為何而居耶猶如於甘酒或醉於臥倒以侍叔迦羅比丘尼所說甘露之道足無混濁甘液於此飲至再飲之不為飽思智慧人飲如渴旅人雨一第十叔迦羅二一爾時世尊住王舍城竹林栗鼠養餌所二其時有優婆塞施食於叔迦羅比丘尼三時叔迦羅比丘尼之信樂夜叉於王舍城從此街至彼街從此路至彼路以唱此偈曰悉解脫結縛施食叔迦羅實賢優婆塞彼得多功德一一第十一毗羅一如是我聞爾時世尊住王舍城竹林栗鼠養餌所二其時有優婆塞施衣於毗羅比丘尼三時毗羅比丘尼之信樂夜叉於王舍城從此街至彼街從此路至彼路以唱此偈曰脫一切縛軛施衣豫毗羅實賢優婆塞彼得多功德一二第十二阿羅毗一如是我聞爾時世尊住阿羅毗之阿羅婆迦夜叉住居二時阿羅婆迦夜叉白世尊曰沙門出去是友世尊便出去沙門進來是友世尊便進來三再度乃至四阿羅婆迦夜叉如此三度白世尊沙門出去乃至是友世尊便進來五阿羅婆迦夜叉四度白世尊沙門出去六不友我不應出去由汝所欲為七沙門我且問汝汝若不能答我者我以汝心亂破汝心臟取汝兩腳投諸恆伽河之彼岸八不友我於包括天界魔界梵天界之世界於含括沙門婆羅門人天之衆中不見以我心亂破我心臟取我兩腳投諸恆伽河之彼岸者然而汝若欲問則問九夜叉於此世間人何為最勝富以善修何物齎得以安樂何物味最上云何之生活為最勝生活一世尊此世信最富修善最安樂真實最上味智慧之生活謂最勝生活一一夜叉如何渡瀑流如何渡大海如何超苦惱如何為清淨一二世尊依信渡瀑流不逸渡大海精進超苦惱依智慧清淨一三夜叉如何得智慧如何以得富如何以得譽如何而結友此世行彼世如何得不悲一四世尊以信阿羅漢聞達涅槃法不逸分別者當得於智慧如實堪重荷精進者得富語真實得譽布施友不離是為由此世無悲往彼世求居亦信仰真實與調順堅實與捨離具此四法者死而無有悲此世往彼世亦無有悲事有疑問其他沙門婆羅門真實與調順堪忍與捨離此世有勝者一五夜叉今何問其他沙門婆羅門我已於今日得知未來利佛實為於我來於阿羅毗我今施其人知有大果事我今致禮敬正覺法善性由村以至村遊方邑至邑此嗢陀南田陀迦與釋羅針毛摩尼跋陀左奴童子夜叉那婆藪須達多有二之叔迦羅毗羅與阿羅毗
