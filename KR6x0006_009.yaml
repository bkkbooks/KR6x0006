body:
  text: 第九森林相應第一葦品一第一遠離一如是我聞爾時有比丘住拘薩羅國之茂林二其時彼比丘去往日住至住家起惡不善之思三時住彼森林之天神憐憫彼比丘欲警覺此比丘令思有益而接近此比丘四近而以偈語此比丘曰入森求遠離汝心走外界對人與滅欲離貪欲心安除不快正念我等讚善人地獄塵難除勿運渴愛塵如鳥浴沙泥挺身羽塵落如是之比丘於正念正勤拂落沾身塵五時彼比丘受天神所警策而起驚惺二第二看護一爾時有比丘住拘薩羅國之茂林二其時彼比丘去往日住而睡眠三時住於林中之一天神憐憫比丘欲警覺彼比丘令思有益以詣比丘之處四詣已以偈語彼此丘曰比丘當醒起何故而睡臥睡眠有何益有病毒箭射煩惱人何眠依信而出家身為無家者始增養其信勿陷睡眠域五比丘樂欲無常滅癡漢迷醉此以解脫結縛出家無所著眠之何故責解脫滅貪欲以超過無明其智已清淨如是之出家何故受見責依明破無明以滅盡諸漏無憂亦無悶如是之出定何故受見責精進而不撓冀望於涅槃常勇猛精進如是之出家何故受見責三迦葉獵夫一爾時尊者迦葉住拘薩羅國之茂林二其時尊者迦葉去往日住教誡一獵夫三時住彼林中有一天神憐憫尊者迦葉欲警覺尊者迦葉令思有益來至尊者迦葉處四到已而以偈語尊者迦葉曰往山嶮獵師無智無心者非為教誡時我見如癡漢彼聞亦不悟連見亦不見雖然與語法愚者不悟義迦葉猶如與十指之光明彼不見物形因無眼可見五時尊迦葉依其天神之警覺而驚起四第四多數遊方者一爾時衆多比丘住拘薩羅國之茂林二時彼等諸比丘渡過雨期三月之後而外出遊方三時住彼林中有一天神不見彼等諸比丘而心生悲其時以唱此偈曰多見空居座我今心不樂多聞美說者瞿曇弟子等已從何處去四如是言已其他之天神以偈語其天神曰或者摩揭陀或者拘薩羅或者往跋耆如無係蹄鹿比丘等無家而能自在住五第五阿難一爾時尊者阿難住拘薩羅國之茂林二其時尊者阿難多說在家諸事而住三時住彼林中一天神憐憫尊者阿難欲警覺尊者阿難令思有益來至阿難之處說偈曰入樹下居住潛心於涅槃瞿曇禪思之勿為於放逸以行於雜談與汝有何用四時尊者阿難受天神之警覺而驚起六第六阿那律一爾時尊者阿那律住拘薩羅國之茂林二時尊者阿那律俗家之妻為三十三天天神之闍利仁來詣尊者阿那律處三詣已以偈語阿那律曰請卿來此住具一切愛欲以發起志願生於忉利天而嘗天妃擁圍繞耀光輝四阿那律滯著有身見天女等之禍天女之所得人人亦成禍五闍利仁為世所稱讚忉利天住家不見歡喜園非知快樂事六阿那律愚者汝不知佛之所宣說一切行無常皆為生滅性生者而又滅此等之寂靜始是真快樂闍利仁天界我無受住家越過此輪回從今無他生七第七那伽達多一爾時尊者那伽達多住拘薩羅國之茂林二其時尊者那伽達多於清晨趁早入村過午後則遲歸林中三時住彼林中一天神憐憫尊者那伽達多欲警覺尊者那伽達多令思有益來到尊者那伽達多處四到已以偈語尊者那伽達多曰那伽達多友汝過早入村日遲始歸林與在家人交同以為苦樂我那伽達多惟恐過大膽與在家人交力強之死王將落惡魔領五時尊者那伽達多依天神之警覺而驚起八第八家婦一爾時一比丘住拘薩羅國之茂林二其時有一比丘多住於在家三時彼林住一天神憐憫其比丘欲警覺其比丘令思有益到其家中化作家婦到其比丘處四到已以偈告彼比丘曰河之岸或者市門之間場集會堂等地街頭或市集私議汝與妾原來為何故五比丘世多不快語苦行者堪忍不因此焦心不因此痛苦如風怖林鹿其聲亦驚人若謂輕其心修行不成就九第九跋耆子毗舍離一爾時有跋耆子比丘住毗舍離之茂林二時毗舍離整夜行祭事三時其比丘聞毗舍離器樂聲樂之騷音而嘆息其時以唱偈曰如棄林木材我等獨住森實則如是夜誰比我等幸四時彼林住一天神憐憫此比丘欲警覺此比丘令思有益來到此比丘之處五到已以偈語此比丘曰若棄林木材汝雖獨住森衆多人羡汝猶如墮獄者羡慕生天者六時此比丘受其天神之警覺而起驚一第十誦經法一爾時有比丘住拘薩羅國之茂林二其時此比丘以往甚勤誦經今則不勤默然而坐三時住彼林中天神不得復聞此比丘之法來到比丘之處四到已而以偈語此比丘曰比丘汝何故今交諸比丘不誦法句耶人聞得歡喜現在得稱讚五比丘依離欲至果前望於法句今依離至果見聞思何物依智慧捨棄善人是為教一一第十一不正思惟思惟一爾時有比丘住拘薩羅國之茂林二時彼比丘去往日住起惡不善覺即欲覺瞋覺害覺三時住其林中一天神憐憫此比丘欲警覺此比丘令思有益來到此比丘之處四到已以偈語比丘曰汝依不正思醉不善覺想捨不正思惟以為正思惟對於師法僧勿從戒退轉汝斯達歡喜無疑得喜樂從此歡喜多應盡諸苦惱五時此比丘依天神之警覺而起驚一二第十二中午鳴動一爾時比丘住拘薩羅國之茂林二時住其林一天神來到比丘之處三到已走近此比丘以言偈曰在日之炎盛鳥停枝不動大林聲鳴放恐怖以襲我四比丘在日之炎盛鳥停枝不動大林聲鳴放我滿其快樂一三第十三不制御根多比丘一爾時衆多比丘住拘薩羅國之茂林掉舉心亂輕騷絮叨而多無聊語妄念不正知心不靜散亂諸根不制御二時住其林之天神憐憫此比丘等欲警覺彼等諸比丘令思有益來到此比丘等處三到已而以偈語彼等諸比丘曰往昔瞿曇之弟子比丘等安樂而其住心無求乞食心無求而住知世之無常彼等苦惱盡如今比丘等以惡向自己如村長於村心為他富奪餐食而寢臥於僧不合掌此有人禮我然而被遺棄無主之人衆猶如諸死尸我對放逸者其衆人以語於不住放逸人人我歸依四時彼等諸比丘依天神之警覺而起驚一四第十四紅蓮白蓮一爾時一比丘住拘薩羅國之茂林二時此比丘食後收鉢入於蓮池以嗅紅蓮之香三時住彼林一天神憐憫此比丘欲警覺此比丘令思有益來到比丘處四到已以偈語其比丘曰此水所生花不豫汝嗅聞此亦一盜者汝盜香花人五比丘不取又不折離而嗅蓮香如何汝云我是花香盜人以掘其根頭或餐其蓮莖如是行暴人何故汝不云六天神如下婢污衣不淨粗暴人我不言此語云汝則相應無有罪污穢常求清淨人惡如毛毫端見猶天雲大七比丘夜叉我知汝又以哀憐我以如是見時夜叉又語我八天神我非靠汝生亦非指為惡比丘汝自己不得為不知如何去善趣九時此比丘依天神之警覺而起驚此嗢陀南遠離與看護迦葉與多數阿難阿那律及那伽達多家婦跋耆子毗舍離誦經不正思午日及不制御根紅蓮等十四
