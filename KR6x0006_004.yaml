body:
  text: 第四惡魔相應第一惡魔品一第一苦業一如是我聞爾時世尊初成正覺時住優留毗羅林之尼連禪河邊阿闍波羅尼俱律陀樹下二時世尊獨坐靜觀而作如是思念我今實已脫離彼苦行善哉我今實已脫離彼無利益之苦行善哉證得堅毅正念菩提三爾時惡魔波旬知世尊心之所念而來詣世尊處詣已以偈白世尊曰若無離苦行清淨青年衆躊躇離淨道不淨思為淨四爾時世尊知是惡魔波旬以偈答惡魔波旬曰不死等苦行知無一切利如陸舟艫舵一切無護益修戒及定慧此乃菩提道我達無上淨破壞者汝敗五爾時惡魔波旬苦惱而曰世尊已知我善逝已知我即萎身沒於彼處二第二象一如是我聞爾時世尊初成正覺時住優留毗羅林之尼連禪河邊阿闍波羅尼俱律陀樹下二爾時世尊暗夜坐於露地雨絲霏霏而下降三爾時惡魔波旬欲令世尊生起恐怖毛髮豎立乃化作大象王來詣世尊前四彼頭實如大黑岩其牙如淨銀其鼻如大鋤柄五時世尊知此惡魔波旬而以偈言惡魔波旬曰作淨不淨相汝之輪回長波旬汝可去破壞者汝敗六時惡魔波旬苦惱而曰世尊已知我善逝已知我即萎身沒於其處三第三淨一爾時世尊住優留毗羅林二爾時世尊暗夜坐於露地雨絲霏霏下降三時惡魔波旬欲令世尊生起恐怖毛髮豎立來詣世尊坐處四詣已於世尊之近處以顯或高或下之種種淨不淨形相五時世尊知是惡魔波旬以偈言惡魔波旬曰作淨不淨相汝之輪回長波旬汝可去破壞者汝敗依身語及意人人善調魔無行惡魔配非惡魔弟子六時惡魔波旬乃至苦惱萎身於其處四第四係蹄其一一如是我聞爾時世尊住波羅奈仙人墮處鹿野苑於此世尊呼諸比丘諸比丘彼等諸比丘亦奉答世尊唯然世尊二世尊乃宣說諸比丘我依正思惟我依正精進實證到達無上解脫諸比丘汝等亦依正思惟正精進亦實證到達無上解脫三時惡魔波旬來詣世尊處詣已以偈言世尊曰汝為天與人惡魔係蹄縛汝縛惡魔繩沙門難逃我四世尊我脫天與人惡魔係蹄縛我解惡魔縛破壞者汝敗五時惡魔波旬乃至形體沒於其處五係蹄其二一爾時世尊住波羅捺仙人墮處鹿野苑於此世尊呼諸比丘彼等諸比丘唯然世尊以奉答世尊二世尊曰諸比丘我解脫天人等所有之係蹄諸比丘汝等亦解脫天人等所有之係蹄諸比丘為衆人之利益幸福以憐憫世間為人天之利益幸福以遊方二人勿走一條路諸比丘說具初善中善終善之文與義之法說一切圓滿清淨之梵行有衆生生來不少塵垢不聞法亦得令滅彼等應是知解法者諸比丘我亦為說法而詣優留毗羅將軍村三時惡魔波旬詣世尊前詣已以偈言世尊曰汝為天與人惡魔係蹄縛汝縛惡魔繩沙門難逃我四世尊我脫天與人惡魔係蹄縛我解惡魔縛破壞者汝敗六第六蛇一如是我聞爾時世尊住王舍城竹林栗鼠養餌所二爾時世尊暗夜中坐於露地雨絲霏霏下降三時惡魔波旬欲使世尊生起恐怖毛髮豎立化作大蛇王相來詣世尊前四其軀體大如木舟其頭如酒屋之箕其兩眼如拘薩羅國之銅鉢其口如雷鳴出電光吐舌其呼吸聲如鐵工之火具音五時世尊知是惡魔波旬以偈語惡魔波旬曰空舍自制御勝哉彼牟尼於此行放棄如是相應彼野獸之往來蚊虻毒蛇多充滿諸恐怖大聖行空舍無有損一毛虛空裂地震生者皆恐嚇縱向於胸位投擲利猛槍諸佛不被護六時惡魔波旬世尊已知我善逝已知我即形體沒其處七第七睡眠一爾時世尊住王舍城竹林栗鼠養餌所二爾時世尊其當夜多作露地經行後將曉洗足入室盤腿起思惟於正念正心時而作師子臥三時惡魔波旬來詣世尊前詣已以偈語世尊曰何故睡眠耶睡眠為何故今何如眠死空舍為眠乎日已高上升何以睡眠乎四世尊破愛貪著網何處均無惑一切有依盡覺者於睡眠惡魔汝何為八第八歡喜一如是我聞爾時世尊住舍衛城祇樹給孤獨園二時惡魔波旬來詣世尊前詣已向世尊唱此偈曰有子依子喜牛主依牛喜人喜依所依無依則無喜三世尊有子依子悲牛主依牛悲人喜悲所依無依則無悲四時惡魔波旬世尊已知我善逝已知我形體即沒於其處九第九壽命其一一如是我聞爾時世尊住王舍城竹林栗鼠養餌所二於此世尊呼諸比丘諸比丘彼諸比丘以唯然世尊奉答世尊三世尊曰諸比丘此人壽命短不可不行於未來不可不為善不可不行梵行生者無不死諸比丘則長壽者亦少多於百歲四時惡魔波旬詣世尊前詣已以偈白世尊曰人壽實甚長善人莫輕此如飽乳赤子死即豈不來五世尊人壽實甚短善人應輕此如人遇燃髮死者豈不來六時惡魔波旬乃至沒於其處一第十壽命其二一爾時世尊住王舍城時世尊曰諸比丘人類壽命短不可不行未來不可不為善不可不行梵行生者無不死諸比丘則長壽者亦少多於百歲二時惡魔波旬來詣世尊前詣已以偈白世尊曰日夜猶未逝壽命亦未盡如輪軸回轉人命亦輪逝三世尊日夜之過逝壽命亦將盡如小河水竭人壽命亦滅四時惡魔波旬苦惱以世尊已知我善逝已知我而萎身隱沒於其處此嗢陀南苦業之與象淨係蹄等二蛇睡眠歡喜壽命又為二第二惡魔品一一第一巖一爾時世尊住王舍城靈鷲山二爾時世尊暗夜中坐於露地雨絲霏霏下降三時惡魔波旬欲令生恐怖毛髮豎立以詣世處詣已於世尊不遠之處以碎大石巖四時世尊知是惡魔波旬以偈謂惡魔波旬曰猶如靈鷲山雖震動一切正解脫佛陀絲毫不動搖五時惡魔波旬苦惱以世尊已知我善逝已知我而萎身沒形於其處一二第二獅子一爾時世尊住舍衛城祇樹給孤獨園其時世尊為大會衆所圍繞而說法二時惡魔波旬作如是思惟此沙門瞿曇為大會衆所圍繞而說法我寧可昏昧諸人眼目以往詣沙門瞿曇三時惡魔波旬詣世尊處詣已以偈言世尊曰任何大衆前敢如是無畏作師子吼耶此處角力士乃汝之敵手既勝汝曾思四世尊大雄衆會前歡喜依無畏如來得十力超離世愛著五時惡魔波旬苦惱以世尊已知我善逝已知我萎身沒形於其處一三第三巖石之破片一如是我聞爾時世尊住王舍城摩達屈闍之鹿野苑二爾時世尊其足被石片所傷世尊足痛鋭烈苦痛不快世尊正念正心以克服忍耐三時惡魔波旬來詣世尊處詣已以偈言世尊曰懶惰於寢眠耽著作詩耶汝為事不多獨自離市里住何寢意臥四世尊非依懶惰臥亦非作詩臥離愁我事了獨自離市里我哀憐一切有情以為臥以箭貫串胸心臟逆猛烈受傷亦在眠我為無傷者何故不成眠覺之無躊躇眼之無恐怖日夜無悔苦不見逆世間憐諸有情臥五時惡魔波旬苦惱以世尊已知我善逝已知我而萎身隱形沒於其處一四第四非相應一爾時世尊住拘薩羅國名一葦村之婆羅門村爾時世尊受在家大衆所圍繞而說法二時惡魔波旬作如是思惟今沙門瞿曇受在家大衆所圍繞而說法我寧可昏昧諸人眼目以詣沙門瞿曇三時惡魔波旬詣世尊處詣已以偈言世尊曰所謂以教他於汝不相應若為行此者勿為貪瞋縛四世尊依利益哀憐正覺者教他如來實解脫如是貪瞋者五時惡魔波旬乃至隱形沒於其處一五第五意一如是我聞爾時世尊住舍衛城祇樹給孤獨園二時惡魔波旬來詣世尊處詣已以偈言世尊曰意之馳騁轉虛空掛係蹄我係蹄縛汝沙門未脫我三世尊色聲香味觸是等五境樂於此我不欲破壞者汝敗四時惡魔波旬乃至隱形沒於其處一六第六鉢一爾時世尊住舍衛城爾時世尊以五取蘊為諸比丘說法教示獎勵令歡喜彼等諸比丘理解思惟注心傾耳諦聽於法二時惡魔波旬作如是思惟今沙門瞿曇以五取蘊為諸比丘說法教示獎勵令歡喜彼等諸比丘理解思惟注心傾耳諦聽於法我寧可為昏昧彼等眼以詣沙門瞿曇三爾時為晾乾衆多諸鉢而置於露地四時惡魔波旬化作牡牛之形以近其鉢五時一比丘語於另一比丘曰比丘比丘此牡牛將破此鉢六如是言時世尊言此比丘曰比丘此非牡牛此為昏昧汝等眼目之惡魔波旬七時世尊知是惡魔波旬以偈告惡魔波旬曰色受乃至想識行等非我亦非是我所於此離貪著離貪心平安以超諸結縛何處求此人魔軍尋不得八惡魔波旬乃至隱形沒於其處一七第七處一爾時世尊住毗舍離大林重閣講堂二爾時世尊以六觸處為諸比丘說法教示獎勵令歡喜彼等諸比丘理解思惟注心傾耳諦聽於法三時惡魔波旬作如是思惟此沙門瞿曇以六觸處為諸比丘說法教示獎勵令歡喜彼等諸比丘理解思惟注心傾耳諦聽於法我寧可昏昧彼等眼目以詣沙門瞿曇四時惡魔波旬來詣世尊處詣已於世尊之不遠處號大恐怖聲如大地破裂五時一比丘謂於另一比丘曰比丘比丘此大地會破裂六如是語時世尊告彼比丘曰比丘此非大地之破裂此乃惡魔波旬為來昏昧汝等眼目七時世尊知是惡魔波旬以偈告惡魔波旬曰色聲香及味觸等一切法乃世恐怖餌迷亂諸世人佛弟子正念超越恐怖餌超脫惡魔領光輝如太陽八時惡魔波旬乃至隱形沒於其處一八第八團食一爾時世尊住摩揭陀國名五葦村之婆羅門村二其時五葦婆羅門村青年男女等舉行互換禮物式典三時世尊清晨持鉢著衣入五葦婆羅門村乞食四時五葦村婆羅門家主等為惡魔波旬所執取沙門瞿曇不豫得食五時世尊入村乞食時清洗其鉢而歸六時惡魔波旬來詣世尊處詣已白世尊曰沙門得食耶不得耶七如我之不得食豈非汝波旬之所為八然則世尊再入五葦婆羅門村如得食應是我為侵犯於如來惡魔生不德波旬惡不實汝如何思惟即無有所得我等亦樂住猶如光音天我等喜為食九時惡魔波旬乃至隱形沒於其處一九第九農夫一舍衛城因緣爾時世尊對諸比丘說涅槃法教示獎勵令歡喜彼等諸比丘理解思惟注心傾耳諦聽於法二時惡魔波旬生是思惟今沙門瞿曇說涅槃法教示獎勵令歡喜彼等諸比丘理解思惟全心傾耳諦聽於法我寧可昏昧彼等眼目以詣沙門瞿曇三時惡魔波旬化作農夫肩扛大鋤持趕牛棒散髮衣大麻粗布足塗泥漿而詣世尊處詣已白言世尊曰四沙門見牡牛否五波旬牡牛於汝有何用六沙門眼是我有色是我有眼觸之識處是我有沙門去往何處汝能脫我否沙門耳是我有聲是我有乃至沙門鼻是我有聲是我有乃至沙門舌是我有味是我有乃至沙門身是我有觸是我有乃至沙門意是我有法是我有意觸之識處是我有沙門去往何處能脫我否七波旬眼是汝有色是汝有眼觸之識處是汝有波旬無眼無色無眼觸之識處者則非汝之行處八波旬耳是汝有聲是汝有乃至九波旬鼻是汝有香是汝有乃至一波旬舌是汝有味是汝有乃至一一波旬意是汝有法是汝有意觸之識處是汝有波旬無意無法無意觸之識處則非汝之行處一二惡魔此云我有者是云此有我若汝意於此沙門未脫我一三世尊不去此有我不云此是我惡魔如是知汝不見我道一四時惡魔波旬乃至隱形沒於其處二第十統治一爾時世尊住拘薩羅國雪山森林小屋二時世尊獨作靜觀作如是思念能不殺不害不勝不令勝不悲不念悲以行如法不行非法否三時惡魔波旬知世尊之所念來詣世尊處白世尊曰世尊世尊自為統治善逝不自殺不害不勝不令勝不悲不令悲行如法統治四波旬汝見於何者如是云我世尊自行統治乃至如法統治五世尊世尊修習四如意足無如乘用之車無立處常行慣行圓滿若世尊欲以雪山山王為金應豫決心令山為金六世尊光耀之金山即有倍黃金難滿一人欲知是人正行見苦原因者如何傾愛欲依知世結縛衆人學解脫七時惡魔波旬苦惱以世尊已知我善逝已知我萎身隱形沒於其處此嗢陀南巖獅巖破片非是相應意鉢處及團食農夫統治十第三惡魔品二一第一多數一如是我聞爾時世尊住釋迦族之尸羅越底二爾時衆多比丘住於世尊不遠之處不放逸虔誠精進三時惡魔波旬化作一老婆羅門相結髮著羚羊背皮衣背曲如垂木咽喉詬詬響鳴執鬱曇鉢羅樹杖來詣諸比丘處詣已謂諸比丘曰諸大德盛壯髮黑具是青春為人生之第一期未味愛欲而出家諸大德先享受人之愛欲勿放棄現前以追隔時者四婆羅門我等非放棄現前以追隔時者婆羅門我等乃放棄隔時者以追遂現前者婆羅門愛欲為隔時物多苦多惱凶禍亦越強烈此法乃現前物而非隔時世尊宣說可謂來見者即導向涅槃識者應各所應知五如是言已惡魔波旬乃垂頭卷舌現三皺於額頭抱杖而去六時彼等諸比丘詣世尊處詣已禮敬世尊坐於一面一面坐已之彼等諸比丘以此白世尊七世尊於此我等住離世尊不遠不放逸虔誠精進時世尊有一老婆羅門結髮著羚羊背皮衣背曲如垂木咽喉之呼吸詬詬響鳴執鬱曇鉢羅樹杖詣我等住處詣已以此白我等曰諸大德盛壯髮黑具足青春為人生第一期未味愛欲而出家諸大德先享受人之愛欲勿棄現前以追隔時物八世尊作如是言已我等即謂婆羅門婆羅門我等非棄現前以追隔時婆羅門我等乃放棄隔時以追現前婆羅門愛欲是隔時物多苦多惱凶禍亦越強烈此法於現前非隔時世尊宣說可謂來見者即導向涅槃識者應各所應知九世尊作如是言已彼婆羅門即垂頭卷舌現三皺於額頭抱杖而去一諸比丘此非婆羅門此乃惡魔波旬為來昏昧汝等之眼目一一時世尊了知此義是時即唱此偈曰若人見苦因如何傾愛欲知依世結縛人應學解此二二第二三彌提一爾時世尊住釋迦族之尸羅越底二時尊者三彌提住離世尊不遠不放逸虔誠精進三時尊者三彌提於獨坐靜觀作如是思念我師乃應供者正等覺者我實得大利益我如是於善說之律與法出家我實得大利益我之同梵行者乃諸善人之持戒者我實得大利益四時惡魔波旬知尊者三彌提心之所念來詣尊者三彌提住處詣已於尊者三彌提之不遠處作大恐怖聲宛如大地破裂五時尊者三彌提詣世尊住處詣已禮敬世尊坐於一面坐一面已尊者三彌提以此告世尊曰六世尊我於獨坐靜觀作如是思念我師乃應供者正等覺者我實得大利益我於善說之律與法出家我實得大利益我同梵行者諸善人之持戒者我實得大利益世尊此時於離我不遠處作大恐怖聲宛如大地破裂七三彌提此非大地之破裂此乃惡魔波旬為來昏昧汝等眼目者三彌提汝於此行不放逸虔誠精進而住八唯然世尊尊者三彌提奉答世尊禮敬世尊右繞而去九復次尊者三彌提不放逸虔誠精進而住復次尊者三彌提於獨坐靜觀作如是思念我師乃應供者正等覺者乃至諸善人之持戒者我實得大利益復次惡魔波旬知尊者心所思念乃至宛如大地破裂一時尊者三彌提知此乃惡魔波旬以偈語惡魔波旬曰我依於信仰由家而出家正念與智慧於我眼目醒我心乃澄靜若隨所意欲將為何狀態令我無恐怖一一時惡魔波旬苦惱以三彌提比丘已知我萎身隱沒於其處二三第三瞿低迦一爾時世尊住王舍城竹林栗鼠養餌所二爾時尊者瞿低迦住伊師耆利山麓之黑曜巖三時尊者瞿低迦不放逸虔誠精進而住得一時之心解脫時尊者瞿低迦退轉其一時之心解脫四復次尊者瞿低迦不放逸虔誠精進而住得一時之心解脫尊者瞿低迦又退轉其一時之心解脫五八三次乃至四次乃至五次乃至六次尊者瞿低迦不放逸虔誠精進而住得一時之心解脫尊者瞿低迦六次退轉其一時之心解脫九尊者瞿低迦七次不放逸虔誠精進而住得一時之心解脫一時尊者瞿低迦作如是思念我至六次退轉一時之心解脫我寧可將執劍一一時惡魔波旬知尊者瞿低迦心之所念詣於世尊處詣已以偈語世尊輝耀神通譽大雄大智慧離諸怖畏者禮奉卿足下大雄之勝死卿弟子想死以死是期望光明主止此世尊喜於教卿之弟子者如何未達證有學而為死一二其時尊者瞿低迦執劍一三時世尊知是惡魔波旬以偈語惡魔波旬曰不欲於此生大雄乃如是拔除渴愛根瞿低迦涅槃一四時世尊呼諸比丘諸比丘我等今往伊師耆利山麓之黑曜巖良家之子瞿低迦於彼執劍一五然唯世尊彼等諸比丘應諾世尊一六時世尊與衆多比丘俱到伊師耆利山麓之黑曜巖世尊由遠處見尊者瞿低迦於牀上抱肩仰臥一七其時又見朦朧如煙霧行往東方行往西方行往南方行往北方行於上方行往下方行往四維一八時世尊呼諸比丘曰諸比丘汝等見矇朧如煙者行往東方行往西方行往南方行往北方行往上方行往下方行往四維者否世尊誠如所說一九諸比丘此惡魔波旬以求良家子瞿低迦之識良家子瞿低迦之識住何處耶然則諸比丘良家子瞿低迦之識已般涅槃而無住處二時惡魔波旬取耶慮瓦樹之黃色箜篌來詣世尊處詣已以偈白世尊曰我求於上下乃至於四維四方及八方不見瞿低迦往於何處耶二一世尊志堅英雄者常樂於禪思日夜從於道無願於此生打破死魔軍不行於再生拔除渴愛根瞿低迦涅槃二二破敗於彼悲小脅落箜篌悲愴之夜叉以沒於此處二四第四七年一如是我聞爾時世尊住優留毗羅之尼連禪河邊阿闍波羅尼俱律陀樹下二其時惡魔波旬跟蹤世尊七年以求空隙而無所得三時惡魔波旬來詣世尊處詣已以偈語世尊曰悲侵沈思林求復得失富犯罪村人中何故不與交汝非我友人四世尊掘除諸悲根無罪復無悲我耽於禪思捨諸生存欲放逸之親族諸漏盡禪思五惡魔諸人語我者我者語諸人若汝意於此沙門未脫我六世尊諸人語非我語非我諸人惡魔知如是汝不知我道七惡魔汝若至不死證得菩提道離去汝獨行何以教他人八世尊望到彼岸者問我不死國問我之彼等說無餘涅槃九惡魔世尊猶如離村邑不遠處有池蟹住於此世尊時衆多之童男童女出由村邑以到其池到已由水中舉蟹置於陸上世尊若蟹豎立其剪彼童男童女即以木片小石豫破斷如是世尊蟹皆破斷其足剪不能再入於池世尊亦如是以前任何彎曲歪斜歪曲皆由世尊所破斷伺其間隙之我等不得再近至世尊一時惡魔波旬於世尊前氣餒而唱偈曰鳥飛於空中見石似凝膏於此為獲得軟甘之等食於此不得食飛空以離去如襲石之鳥氣餒離瞿曇一一時惡魔波旬於世尊前氣餒以唱偈離座而去於離世尊不遠趺坐於地上默然悄然落肩氣餒困惱以杖搔地而坐二五第五魔女一時渴愛不快貪欲之三魔女來至惡魔波旬處至已以偈語惡魔波旬曰何故父不樂為因何人悲我等從其人以貪欲係蹄如縛森林象用以牽繫來應置汝手下二惡魔以貪欲誘惑世間阿羅漢善逝者不易彼出魔領域是故我甚悲三時渴愛不快貪欲之三魔女來詣世尊處詣已以此白世尊曰沙門奉事卿足下然則得盡煩惱依卻於無上解脫之世尊不為一顧四時渴愛不快貪欲之三魔女退於一面具如是思惟諸之興趣各異我等各化作一百童女相五時渴愛不快貪欲三魔女各化作一百童女相以詣世尊前詣已白世尊曰沙門奉事卿足下然而得盡煩惱依則於無上解脫之世尊不為一顧六一一時渴愛不快貪欲三魔女退於一面具如是思惟諸人興趣各異我等各化作未生子之百人女乃至化作生一次子之百人女乃至化作生二次子之百人女乃至化作中年之百人女乃至化作高年之百人女時三魔女各化作高年女百人來詣世尊前詣已白世尊曰沙門奉事卿足下然而盡煩惱之依於無上解脫之世尊不為一顧一二時渴愛不快貪愛三魔女退於一面以言此曰我等父之所言確是真實以貪欲誘惑世間阿羅漢善逝者不易彼出魔領域是故我甚悲一三我等依此攻擊未離欲之沙門婆羅門者令破其心臟口吐熱血亂心狂氣猶如割青葦乾萎枯應令之乾萎枯一四時渴愛不快貪欲三魔女來詣世尊處詣已立於一面一五立一面之魔女渴愛以偈言世尊曰悲侵沈思林求復得失富犯罪村人中何故不與交汝非我友人一六世尊破可愛樂軍獨坐得勝義禪思心寂靜安樂於菩提是故我不與諸人之交往於我無友人一七時魔女不快以偈白世尊曰比丘住多修以度五瀑流於此度第六如何多禪思外界之欲想其人不能得一八世尊身安心解脫以離作三業正念無貪著了知法無尋禪思不憶怒亦不為懶惰比丘住多修以度五暴流亦度於第六如是多禪思外界之欲想其人不能得一九時魔女貪欲於世尊處以唱此寂靜偈曰彼斷除渴愛以率群衆行衆多有情行此無貪欲者令衆斷魔掌導死王彼岸二如來大雄者依法王導衆於法之所導於所了解者我等何所嫉二一惡魔波旬見渴愛不快貪欲三魔女從遠而來見已以偈曰愚人以蓮莖想破碎大山以爪掘山巖以齒嚙硬鐵以頭撞大巖大渦探足地以杙自捶胸今厭瞿曇來二二愛不快貪欲雖是光輝來猶捲風神之柔毛與落葉大師退彼等此嗢陀南多數三彌提瞿低迦七年魔女五魔經依佛大師說
