body:
  text: 第三拘薩羅相應第一拘薩羅品一幼少一如是我聞爾時世尊住舍衛城祇樹給孤獨園二時拘薩羅之波斯匿王詣世尊處詣已與世尊交談敬重之見面禮而坐於一面三坐於一面之拘薩羅國波斯匿王白世尊曰世尊瞿曇曾宣示證悟無上之正等覺否四大王有正確言説證悟無上正等覺者即是我大王我是證悟無上之正等覺五瞿曇有僧伽有群衆為群衆之師有名有名聲為救濟者有受甚多人認定為善人之沙門婆羅門猶如富蘭那迦葉末伽梨瞿舍羅尼乾陀若提子刪闍耶吠羅底子迦據陀迦旃延阿耆多翅舍飲婆羅門等問彼等曾宣示證悟無上正等覺否未曾宣示證悟無上之正等覺何況尊者瞿曇其生年青少出家又日淺六大王年少不可輕年少不可輕有四種何為四種耶大王年少不可輕剎帝利是年少不可輕大王年少不可輕蛇是年少不可輕大王年少不可輕火是年少不可輕大王年少不可輕比丘是年少不可輕視大王年少不可輕此四種者是年少之不可輕視者七世尊宣説此已善逝更宣示曰善生而有譽具足尊貴姓如是剎帝利生年青少人勿以輕低視勿以藐視他得彼剎帝位成為人王時忿怒而強烈有加於王罰是故守己命以避遭繩罰於村或森林在此見蛇時以為是幼少勿輕勿藐視或高或低貌持炎蛇倣徨若愚男女近即直受彼咬是故守己命以避遭傷害餌食甚多貪熾燃火黑煙雖然是細小勿輕勿藐視只要得柴薪其火大炎出若愚男女近當即遭燃燒是故守己命以避受火害火燒於森林火盡成黑炭日夜以過後於此出草萌持戒之比丘若以戒炎燒其人無生子不富於子孫無子無相續彼等切斷芽不如多羅樹是故賢智人自己以見利小蛇與細火有譽剎帝利具戒之比丘以善於正行八如是語已拘薩羅國之波斯匿王白尊曰世尊是最勝世尊是最勝世尊譬喻倒者立起覆者顯現迷者教示道如有眼者見諸色如暗中揭明燈如是世尊説種種法世尊我歸依佛及歸依法與僧世尊容受我從今日終生歸依為優婆塞二第二人一爾時世尊住舍衛城二時拘薩羅國之波斯匿王詣於世尊處詣已禮敬世尊坐於一面三坐於一面之拘薩羅國波斯匿王白世尊曰世尊於人中生幾何法即成為人之不利苦惱及不安住耶四大王三法生於人中即成為人之不利苦惱與不安住三者為何大王貪生於人中即成為人之不利苦惱與不安住大王瞋生於人中即成為人之不利苦惱與不安住大王癡生於人中即成為人之不利苦惱與不安住者五世尊宣説此已乃至貪與瞋及癡生此惡心已以為自傷害如持倒竹實三第三王一爾時世尊住舍衛城二坐於一面之拘薩羅國波斯匿王白世尊曰世尊於有生者中有能免老死者否三大王任何生物亦不能免老死四大王雖有大財富有大富有大受用甚多金銀甚多資財甚多財穀之家主因有生故亦不能免老死五大王雖有大財之婆羅門有大財富有大富有大受用甚多金銀甚多資財甚多財穀之家主因有生故亦不能免老死六大王漏盡之應供者行盡梵行所作已辦已捨重擔達自利盡有縛依正智而解脫之比丘之身體亦是破壞之法應捨之法七世尊宣説此已乃至王車美亦壞身體邁向老正法永不老善人所語善四第四愛者一爾時世尊住舍衛城二坐於一面之拘薩羅國波斯匿王白世尊曰世尊我於此獨坐靜觀生如是思念自我為何人所愛者不為何人所愛者乎世尊我生如是思念三任何人皆依身以行惡行依語以行惡行依意以行惡行此等諸人乃非愛自我者假若彼等雖云我等乃自我之愛者但彼等卻非自我之愛者不論如何非愛者所以為非愛者乃彼等之自所作為是故彼等非自我之愛者四任何人皆依身以行善行依語以行善行依意以行善行此等之諸人乃自我之愛者假若彼等雖云我等乃非自我之愛者但彼等卻是自我之愛者不論如何愛者所以為愛者乃彼等之自所作為是故彼等乃自我之愛者五大王如是大王如是任何人依身語意以行惡行此諸人乃非自我之愛者任何人依身語意以行善行此諸人乃自我之愛者六世尊於此宣説已乃至知自可愛者勿自連結惡以行惡行人難得於安樂所囚於死魔以捨生命者有何是彼物彼行而取何功德惡之二是人此世作此為彼身物彼行而取此如添影之形此二從隨彼是故以行善為善積未來功德於後世乃人渡津頭五第五自護一坐於一面之拘薩羅國波斯匿王白世尊曰二世尊我獨坐靜觀生如是念何人乃護自我何人不護自我耶世尊我如是思念三任何人依身以行惡行依語以行惡行依意以行惡行者其人即是不護自我彼等如何受象軍之善護馬軍之善護車軍之善護步軍之善護但不護彼等之自我何以故此等外在之守護此等非為內在之守護是故非守護彼等之自我四任何人依身以行善行依語以行善行依意以行善行者其人乃護自我者彼等雖云無任何象軍之守護無馬軍之守護無車軍之守護無步軍之守護但有守護彼等之自我何以故此等乃內在之守護此等非外在之守護是故乃守護彼等之自我五大王如是大王如是任何人依身語意以行惡行者其人不護自我任何人依身語意以行善行者其人乃護自我六世尊宣説此已乃至善哉自制身善哉自制語善哉自制意善哉制一切自制知恥者云為守護人六第六少數一爾時世尊住舍衛城二坐於一面之拘薩羅國波斯匿王白世尊曰世尊我獨坐靜觀生如是思念於此世得巨大之富而不迷醉不溺不耽於欲樂不誤於諸人中者甚少於此世得巨大之富而迷醉溺耽於欲樂誤於諸人中者甚多三大王如是大王如是於此世得巨大之富而不迷醉不溺不耽於欲樂不誤於諸人中者甚少於此世得巨大之富而迷醉溺耽於欲樂誤於諸人中者甚多四世尊宣説此已乃至富迷於欲樂貪欲以奪心不覺於道外如鹿被縛蹄彼等後苦澀其果即是惡七裁斷一坐於一面之拘薩羅國波斯匿王白世尊曰二世尊我坐於裁判之座見有大富有大財大産甚多資財甚多財穀之剎帝利婆羅門家主等自知為欲樂依於欲樂欲樂之故而語妄語故我生如是思念我今有充分裁斷今當依裁斷以顯賢面三大王有大富有大財大産甚多金銀甚多資財甚多財穀之剎帝利婆羅門家主等自知為欲樂依於欲樂欲樂之故而語妄語彼等應長時之不利苦惱四世尊宣説此已乃至富迷於欲樂貪欲以奪心不知於道外如魚被網羅彼等後苦澀其果即是惡八第八末利一爾時世尊住舍衛城二又爾時拘薩羅之波斯匿王與末利夫人具在高樓之上三時拘薩羅之波斯匿王言末利夫人曰末利可有其他之何人比汝更可愛耶四大王無有其他之何人比我更可愛者大王有其他之何人比汝自己更可愛耶五末利無有其他之何人比我更可愛者六時拘薩羅國之波斯匿王走下高樓詣世尊處詣已禮敬世尊坐於一面坐於一面之拘薩羅國波斯匿王白世尊曰七世尊我於此與末利夫人於高樓上以此言末利夫人末利可有其他之何人比汝更可愛耶世尊如是言已末利夫人以此言我曰大王無有其他之何人比我更可愛者大王可有其他之何人比王我更可愛耶世尊如是言已以此我對末利夫人曰末利無有其他之何人比我自己更可愛者八時世尊了知此義其時唱此偈曰思雖往一切不達於比己更為可愛者其他之諸人亦是可愛己是故為自愛勿以傷害他九第九供犧一爾時世尊住舍衛城二爾時又作備辦大供犧拘薩羅國之波斯匿王有五百牡牛五百牝犢五百山羊五百隻羊為供犧而受縛於柱三又有王之奴隸僕人男傭人彼等亦害怕刑罰恐怖戰抖一面為作準備而一面哭泣流淚四時甚多比丘等晨早著衣持鉢入舍衛城行乞於舍衛城行乞食已收放鉢後而詣世尊處詣已禮敬世尊坐於一面坐於一面之彼等諸比丘白世尊曰五世尊此拘薩羅國之波斯匿王有備辦大供犧五百牡牛五百牝犢五百山羊五百隻羊均為供犧而繁縛於柱又王之奴隸僕人男傭人等彼等害怕刑罰恐怖戰抖一面哭泣流淚一面為作準備六時世尊了知此義於此時唱偈曰馬犧人供犧投擲之棒賽勝利者之飲而無有障礙此等之供犧事多無大果山羊及羊牛種種加殺害如此之供犧大聖不行為事少常行此山羊及羊牛於此不殺害而於此供犧以行正道者大聖亦行之賢者行此供此供有大果以行此行者有善而無空偉大之供犧諸天之賞讚一第十縛一又其時拘薩羅國之波斯匿王捕縛甚多人有者以繩有者以網有者以鎖縛之二時甚多比丘等於晨早著衣持鉢入舍衛城行乞舍衛城行乞食已收放鉢後詣世尊處詣而禮敬世尊坐於一面三坐於一面之彼等諸比丘白世尊曰世尊彼拘薩羅國之波斯匿王捕縛甚多人有者以繩有者以網有者以鎖縛之四時世尊了知此義於其時誦此偈曰鐵繩以及木或以葦之網賢者不云縛以心為迷醉寶玉及珠環又心繫妻子賢者云強縛牽引於此人雖緩亦難離無欲捨欲樂斷此而出家此嗢陀南幼少人及王愛者並自護少數與裁斷末利供與縛第二拘薩羅品一一第一結髮行者一爾時世尊住舍衛城東園鹿子母講堂二又其時將日暮世尊從獨坐靜觀起座出而坐於門外之小屋時拘薩羅國之波斯匿王詣世尊處詣已禮敬世尊坐於一面三其時有七名結髮行者七名尼乾陀徒七名裸行者七名一衣者七人名遊行者等其腋下毛或身毛均長爪亦長持遊方者之用具通過離世尊不遠之處四時拘薩羅國之波斯匿王即從座起立著上衣偏袒一肩右膝著地向七名結髮行者七名尼乾陀徒七名裸行者七名一衣者七名遊方者合掌三次稱呼其名尊者我乃拘薩羅國之波斯匿王尊者我乃拘薩羅國之波斯匿王五時拘薩羅國之波斯匿王離開彼等七名結髮行者七名尼乾陀徒七名裸行者七名一衣者七名遊行者去後直詣世尊之處詣已禮敬世尊坐於一面六坐於一面之拘薩羅國波斯匿王白世尊曰世尊此等之諸人於此世間為阿羅漢或具足阿羅漢之諸人中耶七大王此等諸人是阿羅漢耶為具足阿羅漢道者耶即如王者之在家受用欲樂住於子嗣之障礙中即使用迦尸國之栴檀用華鬘香塗料貯蓄金銀者亦不易知八大王彼之戒依於共住而且非短時依長時而非不思惟依思惟而非無智應依有智慧而得知九大王彼之清淨是依於共語而且非短時依長時而非不思惟依思惟而非無智應依有智慧而得知一大王彼之確立於不幸之時而且非短時依長時而非不思惟依思惟而非無智應依有智慧而得知一一大王彼之智慧依共同商量而且非短時依長時而非不思惟依思惟而非無智應依有智慧而得知一二世尊誠然希有世尊誠然未曾有世尊此事確實是依世尊之所説大王此事即使在家受用欲樂乃至貯蓄金銀亦不易知乃至一三世尊此等我密訪訪察者之諸人於訪察各國歸來最初依彼等之所察訪於後我來作結論一四世尊如今彼等為去其塵垢沐浴塗以香料剃除鬚髮穿著白衣為五欲所纏繞所具者是樂一五時世尊了知此義於此時唱偈曰色貌之於人實是不易知即刻見勿信善制者其相非為制御人此世普橫行如似是而非泥土之耳環渡金銅半錢人人裝飾美內懷於不淨外面美橫行一二第二五王一爾時世尊住舍衛城二其時波斯匿王初為五王為五欲所圍纏充分享受快樂彼於此間生起如是言語何為欲愛之第一三時或有人作如是説色是欲愛之第一或作如是説聲是欲愛之第一或作如是説香是欲愛之第一或作如是説味是欲愛之第一或作如是説觸是欲愛之第一當時彼等諸王互相皆不能承服四時拘薩羅國之波斯匿王以此謂彼等諸王曰友請過來我等何不往詣世尊處請問此義如世尊為我等所説應豫各自受持五彼等五王答拘薩羅國之波斯匿王友誠然六時彼等五王以波斯匿王為先導往詣世尊之處詣已禮敬世尊坐於一面七坐於一面之拘薩羅國波斯匿王以此語白世尊世尊於此我等五王為五欲所纏充分享受快樂我等之間生出如此言語何為欲愛之第一耶或亦有人作如是説色是愛欲之第一或作如是説聲是欲愛之第一或作如是説香是欲愛之第一或作如是説味是欲愛之第一或作如是説觸是欲愛之第一世尊何為欲愛之第一耶八大王我説限以人心所好之程度為欲愛之第一大王此等諸色或為心之所好者或為心之所不好者有人或依色而歡喜若能滿足所思則更希望求其他更殊勝微妙之色於彼而言則其色乃無上之最殊勝九大王此等之聲乃至香乃至味乃至此等之觸或為心所好者或為心所不好者有人或依觸而歡喜若得滿足所思則不再希望其他更殊勝微妙之觸於彼而言其觸乃無上之最殊勝一爾時亦有栴檀庵伽梨迦優婆塞坐其會座時栴檀庵伽梨迦優婆塞即從座而起偏袒一肩合掌向世尊以此謂世尊曰世尊思我則不顯善逝思我則不顯一一世尊曰栴檀庵伽梨迦顯此一二時栴檀庵伽梨迦優婆塞於世尊座前當場以相應之偈讚歎之芳香赤蓮華晨開香不去見鴦耆羅光映空如太陽一三時彼等五王向栴檀庵伽梨迦優婆塞五件僧伽梨請穿著一四時栴檀庵伽梨迦優婆塞即以此五件僧伽梨奉獻世尊一三第三大食一爾時世尊在舍衛城其時拘薩羅國之波斯匿王常食一陀那之飯食二時拘薩羅之波斯匿王食後就大息而詣世尊處詣已禮敬世尊坐於其傍三時世尊知拘薩羅國波斯匿王飯食已訖曾作大息其時而唱此偈曰以常持正念取食知量人則少有其苦遲老得壽長四爾時善見摩納立於拘薩羅國波斯匿王之後五時拘薩羅國波斯匿王呼善見摩納善見汝在我食時於世尊前暗唱此偈我常日日施百錢與汝六善見摩納答覆拘薩羅國之波斯匿王曰大王承教則暗誦在世尊前之偈於拘薩羅國之波斯匿王食時即歌此偈以常持正念取食知量人則少有其苦遲老得壽長七時拘薩羅國之波斯匿王即漸次滿足於一陀那量之飯食八如是拘薩羅國之波斯匿王即較以往身體康健以手撫其身體當時發此歡喜語世尊實以二利哀憐我是現在之利與未來之利一四第四於戰之二語其一一爾時世尊在舍衛城時摩揭陀國韋提希子阿闍世王整備四軍針對拘薩羅國之波斯匿王攻入其迦尸國二拘薩羅國之波斯匿王聞摩揭陀國之韋提希子阿闍世王整備四軍攻入我迦尸國三時拘薩羅國波斯匿王整備四軍迎戰摩揭陀國韋提希子阿闍世王於迦尸國四時摩揭陀國韋提希子阿闍世與拘薩羅國之波斯匿王生戰事依其戰鬥摩揭陀國韋提希子阿闍世王攻破拘薩羅國之波斯匿王拘薩羅國之波斯匿王則逃歸首都之舍衛城五時衆多比丘朝晨著衣持鉢入舍衛城行乞舍衛城行乞飯食後置鉢往詣世尊處詣已敬禮世尊而坐於一面坐於一面之諸比丘等以此事白世尊曰六世尊如今摩揭陀國韋提希子阿闍世王與拘薩羅國之波斯匿王挑起戰事依其戰鬥摩揭陀國韋提希子阿闍世王攻破拘薩羅國之波斯匿王拘薩羅國之波斯匿王逃歸首都之舍衛城七諸比丘摩揭陀國韋提希子阿闍世王有惡友惡朋惡伴諸比丘拘薩羅國之波斯匿王有善友善朋善伴諸比丘但拘薩羅國之波斯匿王今夜為敗者應是苦眠八世尊説此乃至勝利以生怨敗者苦難寢只有捨勝敗平靜樂安眠一五於戰之二語其二九時摩揭陀國韋提子阿闍世王整備四軍針對拘薩羅國之波斯匿王戰攻入其迦尸國一拘薩羅國之波斯匿王聞摩揭陀國韋提希子阿闍世王整備四軍攻入我迦尸國一一時拘薩羅國之波斯匿王整備四軍於迦尸國迎戰摩揭陀國之韋提希子阿闍世王一二如是摩揭國之韋提希子阿闍世王與拘薩羅國之波斯匿王挑起戰事於此戰鬥拘薩羅國之波斯匿王攻破摩揭陀國之韋提希子阿闍世王生擒彼王一三時拘薩羅國之波斯匿王如是思念如摩揭國之韋提希子阿闍世王雖無害但謂害我乃我之甥我寧奪摩揭陀國之韋提希子阿闍世王所有之象軍馬軍車軍步軍以逐放彼一四時拘薩羅國之波斯匿王奪摩揭陀國之韋提希子阿闍世王所有之象軍馬軍車軍步軍而逐放彼一五時衆多比丘晨早著衣持鉢入舍衛城於舍衛城乞食食已置鉢往詣世尊處詣已禮敬世尊而坐於一面坐於一面之諸比丘等以此事白世尊曰一六世尊如今摩揭陀國之韋提希子阿闍世王整備四軍針對拘薩羅國之波斯匿王攻入其迦尸國世尊拘薩羅國之波斯匿王聞悉亦以整備四軍迎戰於此交戰拘薩羅國之波斯匿王攻破摩揭陀國之韋提希子阿闍世王生擒彼王世尊如是拘薩羅國之波斯匿王如是思念如摩揭國之韋提希子阿闍世王雖無害但謂害我乃我之甥我寧奪彼王之四軍以逐放彼王世尊如是拘薩羅國之波斯匿王奪得摩揭陀國之韋提希子阿闍世王之四軍以逐放彼王一七時世尊得知此義其時唱此偈曰人為己利時即以掠奪他他之被奪時彼亦為所奪愚者惡不實雖思為當然惡之成實時即受於苦惱若以殺他人即得殺己者若以勝他人即得勝己者以譏他人者即得誹己者以惱他人者即得惱己者如是業輪轉奪人當被奪一六第六公主一舍衛城因緣二時拘薩羅國之波斯若王往詣世尊處詣已禮敬世尊坐於一面三時有一人坐近拘薩羅國之波斯匿王進而耳語於拘薩羅國波斯匿王告曰王末利夫人生王女四如是云時拘薩羅國之波斯匿王不喜五時世尊知拘薩羅國波斯匿王之不喜於是唱偈曰人主或婦人勝比於男子有智慧全戒敬姑及事夫以生其子者英雄地上主實如賢妻子亦教導王國一七第七不放逸其一一爾時世尊在舍衛城二坐於一面之拘薩羅國波斯匿王以此白世尊曰世尊現世之利與未來之利可有取得兩利之一法耶三大王有取得現在與未來之利為一法者四世尊有取得現在之利與未來之利為一法者何耶五大王取得現在之利與未來之利為一法者是不放逸大王譬喻任何步行獸之足迹皆入於象之足迹即云象之足迹其大為第一大王如是現在之利與未來之利以此二利取之為一法六世尊宣説此乃至生命與無病美貌生天界日日於願望以生高貴家賢者行功德稱讚不放逸賢者不放逸現法之益利乃至未來利若得此二利依於得此義英雄謂賢者一八第八不放逸其二一爾時世尊住舍衛城二坐於一面之拘薩羅國波斯匿王以此白世尊曰世尊我於獨坐靜觀以生思念依世尊之善説法而與善友善朋善伴交非與惡友惡朋惡伴交三大王如是大王如是大王依我善説法而與善友善朋善伴交非與惡友惡朋惡伴交四大王爾時我住釋迦族邑五大王時阿難比丘詣我處詣已禮敬於我坐於一面大王坐於一面之阿難比丘謂我曰世尊此善友善朋善伴即梵行之一半六大王我如是言已以此謂阿難比丘曰阿難不然阿難不然阿難此善友善朋善伴乃是梵行之全部阿難有善友善朋善伴之比丘得以期待於修行八支聖道屢修八支聖道七阿難如何有善友善朋善伴之比丘屢修八支聖道耶八阿難此比丘依遠離依離貪依滅以修正見捨離煩惱及轉向涅槃依遠離依離貪依滅以修正思乃至正語乃至正業乃至正命乃至正精進乃至正念乃至正定而捨離及轉向阿難如是有善友善朋善伴之比丘以修行八支聖道屢修八支聖道九阿難依此應知有善友善朋善伴乃梵行之全部一阿難不論如何依以我為善友生法之衆生依生而解脫老法之衆生依老而解脫病法之衆生依病而解脫死法之衆生依死而解脫愁悲苦惱悶之衆生依愁悲苦惱悶而解脫阿難依此應知有善友善朋善伴乃梵行之全部一一大王是故王不能不如是學我應容有善友善朋善伴大王不能不如是學大王欲有善友善朋善伴者不能不依此一法而住即於善法不放逸一二大王王依不放逸住不放逸者王之後宮亦應如是思念王依不放逸住不放逸我等亦應依不放逸住不放逸一三大王王依不放逸住不放逸者剎帝利之侍臣等應如是思念王依不放逸住不放逸我等亦應依不放逸住不放逸一四大王王依不放逸住不放逸者國民亦應如是思念王依不放逸住不放逸我等亦應依不放逸住不放逸一五大王王依不放逸住不放逸者當亦護自己亦護後宮亦護庫藏一六世尊宣説乃至繼續負願望欲得至大富賢者行功德以讚不放逸賢者不放逸以得二種利現世之益利以及未來利依得於此義英雄謂賢者一九第九無子其一一舍衛城因緣二時拘薩羅國之波斯匿王日中往詣世尊處詣已禮敬世尊於一面坐世尊謂於一面坐之拘薩羅國波斯匿王曰大王王此日中從何處來耶三世尊於今舍衛城之長者家主死彼無子我來接收其財産世尊其金即有八百萬金銀當更不待言世尊如是巨富之長者家主以如是受用所食混粳之酸粥如是受用所衣唯縫合三片之大麻粗布如是用車乘老舊朽車又持木葉之蓋傘四大王如是大王如是大王卑人乍得巨大之富不令自樂不令喜不令父母樂喜不令妻子樂喜不令下男下僕樂喜不令朋友樂喜對沙門婆羅門升上界導上界轉生天界亦不行布施彼之財富不如是正當受用則被王沒收被盜賊奪被火燒被水流被不喜愛之相續者奪取大王無如是正當受用之富當是無用之破滅行五大王譬喻有池於無人之境其水澄潔清冷甘美澄白岸亦甚善但無人行樂亦無人取水故無人飲浴則是無何所用大王如是無正當受用之水即是無用之消滅如是卑人得富不令自己父母妻子下僕依此而樂喜如是無正當受用之富是無用之破滅行六大王善人得巨大之富令自己樂喜令父母樂喜令妻子樂喜令下男下僕樂喜令朋友樂喜對沙門婆羅門升上界導上界有樂果轉生天界者行布施彼之財富有如是正當受用不被王沒收不被盜賊奪不被火燒不被水流不被不喜愛之相續者奪取大王如是正當受用之富則無破滅七大王譬喻近村或邑有蓮池其水澄潔清泠甘美澄白岸甚善而有人行樂其水衆人取去或飲或浴以供人用大王如是正當受用之水有用而不行滅如善人得巨大之富令自己乃至朋友樂喜乃至如是正當受用之富有用而無破滅行八世尊如是宣説乃至如無人山野清水無人飲用自行滅若猶卑人得富者不自用亦不與他英雄識者以得富自用並供其他事彼牛王養親族群無被非難行天界二第十無子其二一時拘薩羅國之波斯匿王日中詣世尊處詣已禮敬世尊坐於一面對一面坐之拘薩羅國波斯匿王世尊問曰大王王日中從何而來耶二世尊於今舍衛城之長者家主死彼無子我來接收其財産世尊其金即有千萬金銀當更不待言世尊如是巨富之長者家主以如是受用所食為混粳之酸粥如是受用衣為縫合三片之大麻粗布如是受用車老舊朽車又持用木葉之蓋傘三大王如是大王如是大王往昔其長者家主令供食於多伽羅尸棄辟支佛之行乞令供食於沙門即從座起而去來反後悔於此食不如豫下僕為勝又為財産而奪兄弟一子之生命四大王其長者家主依令施食多伽羅尸棄辟支佛行乞之業果七返生天界七返之餘業七返於此舍衛城置長者之位五大王此長者家主依施後反悔此食不如豫下僕為勝之業果其心不傾向於善食之受用不傾向於善衣之受用不傾向於善車乘之受用不傾向五欲之善受用六大王其長者家主依由為財産而殺兄弟之子其業果得多年多百年多千年多百千年受苦於地獄依其餘業當七返無子其財富則被沒入王庫大王其長者家主乃舊功德盡已不積新功德大王其長者今日被煮於大叫喚地獄七世尊長者家主即如是生於大叫喚地獄八大王長者家主如是生於大叫喚地獄穀物富金銀如何為所有奴下男傭人及他從屬者悉皆不隨行一切皆離去依於身之行以及口意行唯此彼身物即隨之而行一切皆依業如影之隨形然則行善事積善為未來功德是後世衆人渡津場此嗢陀南結髮之行者以及於五王擊戰故事二姬二不放逸無子二故事依此云一品第三拘薩羅品二一第一人一爾時世尊在舍衛城二時拘薩羅國之波斯匿王往詣世尊處詣已禮敬世尊於一面坐世尊謂於一面坐之拘薩羅國波斯匿王曰大王世間有四種人三四種者何耶乃由暗入暗由暗入明由明入暗由明入明者是四大王如何之為由暗入暗耶大王今有人生卑賤家生於旃陀羅家作竹籠家獵夫家作皮家清潔夫家貧窮而缺乏飲食生計困難難得衣食醜陋畸軀而駝背多病獨眼曲手跛足半身不遂不得飲食衣服車乘華鬘香塗香寢牀住居燈光彼身為惡行語為惡行意為惡行彼為此身語意之惡行身體毀壞死後墮於苦處惡處地獄大王譬喻人由暗入暗由暗入暗即由血暗入血暗大王我説譬喻此人大王如是等人是由暗入暗五大王如何之人是由暗入明耶大王如今有人生卑賤旃陀羅家作竹籠家獵夫家皮匠家清潔夫家貧窮而缺乏飲食生計困難難得衣食醜陋奇而駝背多病獨眼曲手跛足半身不遂不得飲食衣服車乘華鬘香塗香寢牀住居燈光彼身行善行口行善行意行善行彼於身語意善行身體毀壞死後生善趣天界大王譬喻有人由地乘輿由輿移乘馬背由馬背移乘象由象肩移登高樓大王正如我以此人為喻大王如是之人是由暗入明六大王如何之為人由明入暗耶大王於今有人生高貴家生大富剎帝利家大富婆羅門家大富家主之家富而有大財大産多金銀多資財多財穀之家彼等美貌見好似樂見蓮葉具最上美色之皮膚得飲食衣服車乘華鬘香塗香寢牀住居明燈彼身為惡行口為惡行意為惡行彼者身口意為惡行身體毀壞死後墮惡趣苦處地獄大王譬喻人由高樓下至象肩由象肩下至馬背由馬背下至輿由輿下至地面由地面降入於暗處大王我説譬喻此人大王如是之人是由明入暗七大王如何之人為由明入明耶大王於今有人生高貴家生大富剎帝利家大富婆羅門家大富家主之家富而有大財大産多金銀多資財多財穀之家得飲食衣服車乘華鬘香塗香寢牀住居明燈彼之身為善行口為善行意為善行彼者身口意為善行身體毀壞死後生善趣天界大王譬喻有人由輿移至馬背由馬背移至象肩由象肩移至高樓大王我説譬喻比人大王如是之人是由明入明八大王世有如此四種之衆人九世尊如此宣説乃至貧者無信仰心卑而吝惜慳嗇有惡思邪見無敬心嘲罵乞食者沙門婆羅門惱不為人思妨與乞食者如是人死後往恐懼地獄此由暗入暗貧窮有信仰無有卑吝心行施思崇高心靜不混亂對他乞食者沙門婆羅門從座立敬禮平安行修身乞食不妨食如是人死後生於忉利天此由暗入明雖富無信仰心卑心吝惜慳嗇有惡思邪見無敬心嘲罵乞食者沙門婆羅門惱不為人思妨與乞食者如是人死後往恐懼地獄此由明入暗富貴有信仰無有卑吝心行施思崇高心靜不混亂對他乞食者沙門婆羅門從座立敬禮平安行修身對於乞食者不妨與之食如是人死後生於忉利天此由明入明二二第二祖母一舍衛城因緣二世尊謂於一面坐之拘薩羅國波斯匿王曰大王王日中從何處來耶三世尊我老祖母年百二十歲死矣四世尊我祖母於我是所思慕者世尊若我依於象寶得令祖母不死者我當豫象寶不令祖母死若我依馬寶得令祖母不死者我當豫馬寶不令祖母死得依善村或國得令祖母不死者我當豫善村或國令祖母不死五大王一切衆生乃死法終當必死無得超越於死者六世尊希有世尊未曾有此一切衆乃死法終當必死無能得超死者實是善説七大王如是大王如是一切衆生乃死法終當必死無得超越於死者大王譬喻作壺之任何所作之土器或燒或不燒者悉是破壞之法終必破壞無有免破壞者如是一切衆生為死法終當必死無得超死者八世尊此宣説乃至衆生皆必死生者無不死應如依其業隨行功罪果依惡墮地獄功德生天界然者行善事積善為未來功德實衆人後世渡津場二三世間一爾時世尊在舍衛城二坐於一面之拘薩羅國波斯匿王白世尊曰世尊世間有幾種法生為不利苦惱不安住耶三大王世間有三法生為不利苦惱不安住四三者何耶大王於世間貪生為不利苦惱不安住大王於世間瞋生為不利苦惱不安住大王於世間癡生為不利苦惱不安住五大王此等三法生於世間為不利苦惱不安住六世尊此宣説乃至貪瞋以及癡此惡心生人害人如竹類生之即傾倒二四第四弓術一爾時世尊住舍衛城二坐於一面之拘薩羅國波斯匿王以此白世尊曰世尊布施應於何處為之耶三大王應於心之信樂處為作之四世尊於何處行施有大果耶五大王布施應於何處為與何處行施有大果者有別也大王施於持戒者有大果於惡戒者則不然大王誠然今我問王王之意云何耶六大王王之意如何耶於此王興起戰爭其戰激烈時有不學不熟習不慣不練恐懼症而戰栗恐怖逃亡之剎帝利青年來王扶持其人如是其人有用耶七世尊不我不扶持其人其人無有用八時有不學乃至逃亡之婆羅門青年毗舍之青年首陀羅之青年來乃至不我不扶持其人其人無有用九大王王之意云何耶於此王興起戰爭其戰激烈時有有學熟習慣練無恐懼症不戰栗不恐怖不逃亡之剎帝利青年來王扶持其人如是其人有用耶一世尊我扶持其人如是之人為有用一一時有有學乃至不逃亡之婆羅門青年毗舍之青年首陀羅之青年來乃至王扶持此人如是之人有用耶一二世尊我扶持此人如是之人有用一三大王如是任何家族從其家族無家而出家以離五支並具五支者施彼有大果一四如何為離五支耶為離愛欲離瞋離惛眠離掉悔離疑此謂離五支一五如何為具五支耶為具無學戒蘊具無學定蘊具無學慧蘊具無學解脫蘊具無學解脫知見蘊此謂具五支一六施如是離五支具五支者有大果一七世尊宣説於此乃至師其時唱偈曰王為戰生貴不扶持怯者善選巧弓術勇氣力青年如是之智者其生雖卑劣忍辱有慈悲善供聖迹人善住多聞者欣樂作小屋無水林設池嶮處與設道食物飲堅食衣服及住居以信樂之心善施直心人如受電華鬘轟百鳥冠雲雨降於大地高低皆潤濕有信而多聞賢者以集富食物及飲料惠於乞食者心喜而播散言豫之豫之此乃彼之轟如天之降雨廣大功德水以注衆人上二五第五山之比喻一舍衛城因緣二世尊謂於一面坐之拘薩羅國波斯匿王曰大王王從何處來耶三世尊沉醉於主權之憍耽於愛欲貪得國家保全征服廣大領土剎帝利之灌頂王有諸王事我忙碌於此等事四大王王之意如何耶於此可信可賴者從東方來彼詣王處作如是言曰大王請知我從東方來於彼見如虛空之大山而壓碎一切生物大王請作應作之事五時有可信可賴之第二人由西方乃至第三人由北方乃至第四人由南方來彼詣王處作如是言曰大王請知我從南方來於彼見如虛空之大山壓碎一切生物大王諸作應作之事大王如是大恐怖已至人類滅盡之可怕人身更難再受於王應作何事耶六世尊如是大恐怖已至人類滅盡之可怕人身更難再受者唯為法行正行善業功德業之外無何所為焉七大王我説王我告於王老死壓在王之上如老死壓在王頭上應何所為耶八世尊如老死壓在我上應為法行正行善業功德業之外無何所為焉九世尊沉醉主權之憍耽愛欲之貪得國家之保全征服廣大之領土剎帝利種之灌頂王有象軍戰然而世尊此等象軍戰亦於老死之壓來無防老死之方法與餘地一世尊沈醉於主權之憍乃至剎帝利之灌頂王有馬軍戰車軍戰步軍戰然而此步軍戰亦於老死之壓來無防老死之方法與餘地一一世尊王宮有善咒之大臣彼等得以咒語破來攻之敵然而世尊咒戰之壓來無防老死之方法與餘地一二又世尊於此王宮有布滿地階又布滿上階莫大之黃金我等依此財寶可説服攻來之敵然而此財寶之戰無防老死壓來之方法與餘地一三世尊老死壓來我頭上時唯為法行正行善業功德業之外無何所為焉一四大王實者如是大王實者如是老死壓來王之上唯為法行正行善業功德業之外無何所為焉一五世尊此宣説乃至師唱此偈曰穿空大岩山猶四方迫來老死之強迫臨衆人頭上剎帝婆羅門毗舍首陀羅乃至旃陀羅下水清掃人任何人難免一切皆被迫象軍無餘地車軍及步軍亦為無餘地咒術亦無濟富亦無術勝故賢為己思佛法及僧伽以植於信仰身口以至心如法之行人此世承讚譽未來生天界此之嗢陀南人祖母世間弓術佛勝説譬喻廣大山拘薩品第五
