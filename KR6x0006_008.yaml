body:
  text: 第八婆耆沙長老相應一第一出離一如是我聞爾時尊者婆耆沙與乃師尊者尼俱律陀劫波共住於阿臘毗之阿伽羅婆奢提耶二其時尊者婆耆沙乃出家不久之新比丘被留作精舍之看守人三其時衆多婦人為參觀精舍裝飾打扮而來阿蘭若四時尊者婆耆沙見彼等婦人而生不快貪欲污其心五時尊者婆耆沙如是思念我心生不快貪欲污我心對我實是甚悲痛別人無從滅我心之不快而令愈悅我自滅我心之不快令生愈快六時尊者婆耆沙自滅自己之不快而生愈悅其時以唱此偈曰由家而無家於我之出離實是從黑暗無法之思起然其生世高以習強弓法不知於退屈千人弓術者一時周放矢多比於其數婦女子等來不能亂我心我強立於法我一度於彼日種之佛陀所說導涅槃依此以開導我心樂於此如是我居住波旬來則來惡魔我亦應揚拂之令汝不能尋覓出我所行之道二第二不快一爾時乃至二尊者婆耆沙與乃師尼俱律陀劫波共住於阿臘毗之阿伽羅婆奢提耶三其時尊者尼俱律陀劫波從乞食歸食後而入室至夕夜或至翌日早皆不出戶門四其時尊者婆耆沙生不快貪欲污其心五時婆耆沙生如是思念我心生不快貪欲污我心對我甚實悲痛別人無從滅我心之不快而生愈悅我須自滅我之不快而令生愈悅六時尊者婆耆沙自滅自己之不快令生愈悅其時唱此等偈曰思快不快者捨諸著家念不欲住何處離欲之住處無有欲之思此則是比丘地載空所覆世間諸一切悉是無常老有智悟此住人見聞觸思皆悉依執著除此依欲念無污無染者是云為牟尼凡常者易陷六十之依著不法之覺想此等不行往任何之部類不語惡語者此則是比丘有天稟之資長夜心寂靜無欺無欲念賢達寂靜道牟尼依涅槃以滅除煩惱待般涅槃時三第三輕蔑溫和者一爾時尊者婆耆沙與乃師尊者尼俱律陀劫波共住於阿臘毗之阿伽羅婆奢提廟二其時尊者婆耆沙以誇自己之頓才輕蔑其他溫和比丘等三時尊者婆耆沙生如是思念以誇自己之頓才輕蔑其他溫和比丘等對我實是甚悲痛四如是尊者婆耆沙自己省悔其時唱此偈曰捨慢瞿曇徒無餘離慢道昏醉於慢道悔之焉不久覆覆於慢行人人墮地獄慢墮地獄者長夜於悲痛道之勝利者正行者比丘何時皆不悲以受譽安樂彼實法樂者於世不固陋精進離蓋障清拂無餘慢依智慧滅盡煩惱寂靜者四第四阿難一爾時尊者阿難住舍衛城祇樹給孤獨園二時尊者阿難清晨著衣持鉢尊者婆耆沙為隨侍入舍衛城乞食三其時尊者婆耆沙生不快貪欲污其心四時尊者婆耆沙以偈白阿難曰我為貪欲燒我乃心炎燃瞿曇哀憐我請說消火法五阿難依於顛倒想汝心之炎燃以呼起貪欲令止見淨相見諸行無常苦惱非自己消滅大貪火勿為屢次燒集心於一點令其住靜寂依於不淨想令修自己心有於身念住以滿厭惡情習修於無相消滅慢隨眠依其慢現觀得行於寂靜五第五善說一爾時世尊住舍衛城祇樹給孤獨園二於此世尊呼諸比丘諸比丘三唯然世尊彼等諸比丘奉答世尊四世尊以此宣說諸比丘四支具足之語乃善說而非惡說無罪垢不令識者非難四支者何五諸比丘於此語善說而非惡說語法而非不法語愛語而非非愛語語真實而非虛假諸比丘此四支具足之語乃善說而非惡說無罪垢不令識者非難六世尊以此宣說善逝以此宣說又作如是言曰為善人所云第一語於美第二語如法勿語不如法第三語優美勿以語粗獷第四語真實勿以語虛僞七時尊者婆耆沙即從座起一肩著衣合掌禮拜世尊以此白世尊曰世尊我湧思念善逝我湧思念八世尊曰婆耆沙請說九時尊者婆耆沙白世尊以適當之偈豫奉讚人以語其語勿令自己苦亦無害他語此為語善語人語善故事其語以快耳不語他人惡此則云善美真實甘露語此乃從古法以謂真義法善人悉確立佛陀所說語達涅槃安穩以至盡苦邊此實無上語六第六舍利弗一爾時尊者舍利弗住舍衛城祇樹給孤獨園二其時尊者舍利弗以和藹語明了無濁聲使明知意義之法語教示利益鼓勵諸比丘彼等諸比丘深切注意虔誠心意集中傾耳聞法三時尊者婆耆沙生如是思念此尊者舍利弗以和藹之語明了無濁聲使明知意義之法語教示利益鼓勵諸比丘彼等諸比丘深切注意虔誠心意集中傾耳聞法我今向尊者舍利弗應以適當之偈讚歎四時尊者婆耆沙則從座起一肩著衣合掌禮尊者舍利弗以此稱尊者舍利弗吾友舍利弗我湧思念吾友舍利弗我湧思念五吾友婆耆沙請說六時尊者婆耆沙以適當之偈向尊者舍利弗讚歎曰智慧深而賢巧分道非道大智舍利弗說法諸比丘略說又廣說如舍利鳥聲無濁妙辨湧其聲猶如蜜快樂耳爽美說而心躍歡注意以傾耳比丘等聽聞七第七自恣一爾時世尊與五百比丘衆共住舍衛城東園鹿子母講堂皆是阿羅漢二其時世尊是日布薩自恣之日為比丘衆所圍繞坐於露地三時世尊默然環視比丘衆言諸比丘四諸比丘我今自恣汝等對我身語有否云何非難耶五如是言已尊者舍利弗即從座起一肩著衣合掌禮世尊以此白曰否也世尊我等於世尊之身上不見有可非議者世尊世尊令未生之道生令知未知之道說未說之法道之知者是道之了者道之巧者今弟子等順從道而後能具有道者世尊我亦向世尊自恣世尊我之身語有否云何可非難耶六否也舍利弗我對汝之身語亦無何可非難舍利弗汝是賢者大智者廣智者捷智者鋭智者貫通智者舍利弗猶如轉輪王之長子以正轉父王所轉之車輪舍利弗如是汝正轉我所轉之無上法輪七世尊若於我身語皆無可非難者此五百比丘衆之身語尚有何可豫非難耶八舍利弗此五百比丘之身語我無可非難舍利弗此五百比丘中有六十比丘是三明者六十比丘是六通者六十比丘是俱解脫者其他是慧解脫者九時尊者婆耆沙即從座起一肩著衣合掌禮世尊以此白世尊曰一世尊我湧思念善逝我湧思念一一世尊曰婆耆沙請說一二時尊者婆耆沙以適當之偈向世尊讚歎曰今乃十五夜為衆之清淨五百比丘集無污斷結縛無後有聖者猶如轉輪王大臣等圍繞譬如限大海惠遍此大地如是戰勝者無上商隊主三明滅死魔弟子等敬禮此等世尊子於此不曾弄無用之辨者拔去渴愛箭敬禮日種佛八第八千以上一爾時世尊與千二百五十人比丘俱住舍衛城祇樹給孤獨園二其時世尊依導引涅槃之法語教示利益鼓勵諸比丘彼等諸比丘深切注意虔誠心意集中傾耳聞法三時尊者婆耆沙如是思念今世尊依導引涅槃之法語教示利益鼓勵諸比丘彼等諸比丘深切注意虔誠心意集中傾耳聞法我今以適當之偈向世尊讚歎四時尊者婆耆沙即從座起一肩著衣合掌禮敬世尊以此白世尊曰世尊我湧思念善逝我湧思念五世尊曰婆耆沙請說六時尊者婆耆沙以適當之偈向世尊讚歎曰千以上比丘以離塵垢法何處均無怖禮敬說涅槃應供善逝尊正覺者所說無有垢穢法彼等比丘聞比丘衆圍繞實正覺者光世尊實龍象第七之聖者猶如大雨降弟子等受潤為奉見我師從日住出來弟子之一人我是婆耆沙禮敬大雄足七婆耆沙此等偈乃汝以前所作耶或汝立即憶起者耶八世尊此等偈非以前之作乃我當今立即所現九然則婆耆沙既非以前所作者即更再多說一唯然世尊尊者婆耆沙奉答世尊即說更多偈讚世尊勝惡魔邪路行破諸障礙結縛切斷者分別說清法我等度瀑流說示種種道於所說不死我等法見者樹立不運去貫串光作者過一切見處以見於涅槃自知並自證其最上之法我等說十處於所善說法知法之學者無放逸餘地依此世尊法常在不放逸禮敬而修學九第九憍陳如一爾時世尊住王舍城竹林栗鼠養餌所二時尊者阿若憍陳如甚久始詣世尊處詣而五體投地於世尊足以口接吻世尊之足手磨而呼自名曰世尊我是憍陳如善逝我是憍陳如三時尊者婆耆沙如是思念此尊者阿若憍陳如甚久始詣世尊處詣而五體投地於世尊之足以口接吻世尊之足手磨自呼名曰世尊我是憍陳如善逝我是憍陳如今尊者阿若憍陳如於世尊面前我以適當之偈讚歎四時尊者婆耆沙即從座起一肩著衣合掌禮世尊以此白世尊曰世尊我湧思念善逝我湧思念五世尊曰婆耆沙請說六時尊者婆耆沙對尊者阿若憍陳如於世尊面前以適當之偈讚曰上座憍陳如隨順佛所證虔誠出離者屢屢快樂於遠離之樂住行如師之教弟子之所達學於不放逸一切以達此有具大威力到達於三明巧於他心智法嗣憍陳如今頭禮師足一第十目犍連一爾時世尊與五百比丘衆俱住王舍城伊師耆利山側黑曜巖皆是阿羅漢時尊者大目犍連以驗彼等之心解脫而無億波提二時尊者婆耆沙作如是思念今世尊與五百比丘衆俱住王舍城伊師耆利山側黑曜巖皆是阿羅漢尊者大目犍連以驗彼等之心悉解脫而無億波提今尊者大目犍連於世尊之面前我以適當之偈讚歎三時尊者婆耆沙即從座起一肩著衣合掌禮世尊以此白世尊曰世尊我湧思念善逝我湧思念四世尊曰婆耆沙請說五時尊者婆耆沙對尊者大目犍連於世尊面前以適當之偈讚曰達苦惱彼岸坐山側聖者勝死達三明弟子等禮敬大神力目連驗他諸人心彼等心解脫知無有餘依達苦惱彼岸具足一切支成滿種種相彼禮敬瞿曇一一第十一伽伽羅池一爾時世尊住瞻波伽伽羅之蓮池岸邊有五百比丘衆七百優婆塞七百優婆夷數千之諸天俱世尊依其光顏依其名聲光輝勝越彼等二時尊者婆耆沙作如是思念今世尊住瞻波伽伽羅之蓮池岸邊有五百比丘衆七百優婆塞七百優婆夷數千之諸天俱世尊依其光顏依其名聲光輝勝越彼等今於世尊面前我以適當之偈讚歎三時尊者婆耆沙即從座起一肩著衣合掌禮世尊以此白世尊曰世尊我湧思念善逝我湧思念四世尊曰婆耆沙請說五時尊者婆耆沙於世尊面前以適當之偈讚曰如無雲空月無雲太陽耀鴦耆羅牟尼榮光耀世界一二第十二婆耆沙一爾時世尊住舍衛城祇樹給孤獨園二其時尊者婆耆沙得阿羅漢果不久耽味於解脫樂其時唱此偈曰我昔耽作詩村莊市里遊時見正覺者我於生正信佛陀為我說蘊處界等法我聞如是法無家而出家實於聖者見入其道之道比丘比丘尼利益成正覺我來於佛前實是善來者到達於三明遂行如佛教我得清天眼以知於宿命得三明神通巧知於他心此嗢陀南出離與不快輕蔑溫和者阿難與善說舍利弗自恣千人之以上憍陳如目連及伽伽羅池依於婆耆沙總數為十二
