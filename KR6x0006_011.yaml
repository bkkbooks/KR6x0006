body:
  text: 第十一帝釋相應第一帝釋品一第一須毗羅一如是我聞爾時世尊住舍衛城祇樹給孤獨園二世尊於此言諸比丘諸比丘彼等諸比丘奉答世尊唯然世尊三世尊以此宣說四諸比丘遠昔阿修羅攻擊諸天諸比丘時天帝釋呼須毗羅天子愛子須毗羅今此等阿修羅攻擊諸天愛子須毗羅汝往迎討阿修羅諸比丘須毗羅天子奉答天帝釋唯然尊者而耽於放逸五諸比丘再度乃至六諸比丘天帝釋三度呼須毗羅天子愛子須毗羅此等阿修羅今攻擊諸天愛子須毗羅汝往迎討阿修羅諸比丘唯然尊命須毗羅天子奉答天帝釋而耽於放逸七諸比丘時天帝釋以偈語須毗羅天子無勵無勤勉達安樂處者須毗羅前往我亦往其處八須毗羅懶惰無勤勉不為所應為一切愛欲繁示其最勝處九帝釋懶惰無勤勵得無限樂者須毗羅去往我亦往其處一須毗羅我天主帝釋無作悲絶望得安樂道者示其最勝道一一帝釋若是無所作決無有老者此實涅槃道須毗羅去往我亦往其處一二諸比丘其實天帝釋自生功德果報以統理忉利天應是勤勉精進之稱讚者諸比丘汝等於此於此善說之法與律出家未達者為達未到者為到未實現者為實現而勤勉奮勵精進者汝等能顯耀此事二第二須師摩一爾時世尊住舍衛城祇樹給孤獨園二世尊於此言諸比丘諸比丘彼等諸比丘奉答世尊唯然世尊三世尊以此宣說四諸比丘遠昔阿修羅攻擊諸天諸比丘時天帝釋呼須師摩天子愛子須師摩此等阿修羅今攻擊諸天愛子須師摩汝往迎討阿修羅須師摩天子奉答天帝釋唯然尊者而耽於放逸五諸比丘再度乃至六諸比丘天帝釋三度呼須師摩天子愛子須師摩此等阿修羅今攻擊諸天愛子須師摩汝往迎討阿修羅諸比丘須師摩天子奉答天帝釋唯然尊者而耽於放逸七諸比丘時天帝釋以偈語須師摩天子無勵無勤勉達安樂處者須師摩去往我亦往其處八須師摩懶惰無勤勵不為所應為一切愛欲繁示其最勝處九帝釋懶惰無勤勵得無限樂者須師摩去往我亦往其處一須師摩我天主帝釋無作悲絶望得安樂道者示其最勝道一一帝釋若是無所作決無有老者此實涅槃道須師摩去往我亦往其處一二諸比丘其實天帝釋自生功德果報以統理忉利天應是努力精進之稱讚者諸比丘汝等於此於此善說之法與律出家未達者為達未到者為到未實現者為實現而努力奮勵精進者汝等能顯耀此事三第三旗尖一爾時世尊住舍衛城祇樹給孤獨園二其時世尊言諸比丘諸比丘諸比丘奉答世尊唯然世尊三世尊以此宣說四諸比丘遠昔天與阿修羅挑起戰爭五諸比丘時天帝釋呼忉利諸天友若赴天部之戰起毛髮豎立之恐怖戰栗者汝等當看我旗尖汝等若看我旗尖者起毛髮豎立之恐怖戰栗當可去除六汝等若不看我旗尖者則看波闍波提天王之旗尖汝等若看波闍波提天王之旗尖者起毛髮豎立之恐怖戰栗當可去除七汝等若不看波闍波提天王之旗尖者則看婆羅那天王之旗尖乃至八汝等若不看婆樓那天王之旗尖者則看伊舍那天王之旗尖汝等若看伊舍那天王之旗尖者起毛髮豎立之恐怖戰栗當可去除九諸比丘若看天帝釋之旗尖波闍波提天王之旗尖婆樓那天王之旗尖伊舍那天王者或可去除或未可去除其起毛髮豎立之恐怖戰栗一何以故天帝釋未離貪未離瞋未離癡有膽怯病而戰栗恐怖是逃避者一一諸比丘我亦語如是汝等或往森林或於樹下或入空屋而起毛髮豎立之恐怖戰栗者其時當念我彼世尊是應供等正覺明行足善逝世間解無上師調御丈夫天人師佛世尊一二諸比丘汝等若憶念我者當可去除其起毛髮豎立之恐怖戰栗一三若不憶念我者則以憶念法法乃由世尊之所善說者有現在果報不隔時當得云來見者導引於涅槃者是有識之士之各自所當知一四諸比丘汝等若憶念法者當可去除其起毛髮豎立之恐怖戰栗一五若不憶念法者則憶念僧伽世尊之弟子僧伽乃善行者世尊之弟子僧伽乃真正行者世尊之弟子僧伽乃正道行者世尊之弟子僧伽乃可尊教之修行者即四雙八輩是此世尊之弟子僧伽值得供養值得尊敬值得布施值得合掌禮拜是世間無上福田一六諸比丘若憶念僧伽者當可去除其起毛髮豎立之恐怖戰栗一七何以故諸比丘如來應供等正覺者乃離貪離瞋離癡無膽怯無戰栗無恐怖無逃避者一八世尊如此宣說善逝說已師更宣說次偈曰林中或樹下孤寂場所時諸比丘思念正等正覺者汝等無恐怖若是世間主人中之牛王不憶念佛者則憶念善說導引涅槃法不憶念善說導於涅槃法則憶念僧伽無上之福田如是佛法僧若以憶念者比丘等恐怖汝等當無有毛髮之豎立四第四吠波質底忍辱一爾時世尊住舍衛城祇樹給孤獨園二世尊宣說於此三諸比丘遠昔有天與阿修羅之戰四時諸比丘吠波質底阿修羅王呼阿修羅友若諸天與阿修羅激戰時阿修羅勝天敗者當以五縛其捆縛天帝釋之頸捉來阿修羅城我處五諸比丘天帝釋亦呼忉利天之諸天友天與阿修羅激戰時天勝阿修羅敗者當以五縛縛其吠波質底阿修羅王之頸捉來正法殿我處六諸比丘其戰天勝阿修羅敗也七諸比丘時忉利諸天以五縛縛吠波質底阿修羅王之頸捉來正法殿之天帝釋處八諸比丘於此以五縛縛吠波質底阿修羅王之頸入正法殿而又走出並以激烈之惡語誹謗天帝釋九諸比丘時御者摩多利以偈語天帝釋曰聞吠波質底當面激惡語帝釋摩怯婆忍乃恐怖耶或力不足故一帝釋忍吠波質底非慮力不足如我之識者何與愚者競一一摩多利然若不止者愚者益招猛是故重刑罰智者止愚人一二帝釋於我之思惟以止禁愚者以知其他怒寂靜於正念一三摩多利婆沙婆此忍我見為過失愚人恐怖我以為是忍他如使牛逃者必愈益猛追愚人益增長一四帝釋以忍為恐畏欲思則令思己利勝者中無有勝忍辱有力忍無力此云最勝忍無力人常忍謂無力之力其力愚人力有力護於法無須要反駁忿者還與忿更是為惡事忿者不還忿激戰得二度最大之勝利知他之忿怒正念靜己人自己以及他雙方之醫師唯無知法者其人為愚者一五諸比丘天帝釋自生功德果報統理忉利之諸天猶為忍辱柔和之稱讚者一六諸比丘就此汝等於如是善說法與律出家忍辱而柔和者則能輝耀此事五第五善語之勝利一舍衛城因緣二諸比丘遠昔天與阿修羅激戰三時諸比丘吠波質底阿修羅以此謂天帝釋曰諸天王善語致勝利吠波質底善語致勝利四諸比丘時天與阿修羅於其會衆應知誰是善語惡語者五諸比丘時吠波質底阿修羅王以此謂天帝釋帝釋唱偈六諸比丘如是言已天帝釋以此謂吠波質底阿修羅王吠波質底汝往昔於此是天吠波質底請說偈七諸比丘如是言已吠波質底阿修羅王以說此偈若不止禁者愚人益招猛是故重刑罰智者止愚人八諸比丘吠波質底阿修羅王語此偈時阿修羅歡呼諸天則默然九諸比丘其時吠波質底阿修羅王以此謂天帝釋帝釋唱偈一諸比丘如是言已天帝釋唱此偈於我之思惟以止禁愚者以知其他怒寂靜於正念一一諸比丘天帝釋唱此偈時諸天歡呼阿修羅默然一二諸比丘時天帝釋以此謂吠波質底阿修羅曰吠波質底唱偈婆娑婆此忍我見為過失愚人恐怖我以為是忍他如使牛逃者必增益猛追愚人益增長一三諸比丘又吠波質底阿修羅王唱此偈時阿修羅歡呼諸天默然一四諸比丘時吠波質底阿修羅王以此謂天帝釋帝釋唱偈一五諸比丘如是言已天帝釋唱此偈以忍為怖畏欲思則令思己利勝者中無有勝忍辱有力忍無力此云最勝忍無力人常忍謂無力之力其力愚人力有力護於法無須要反駁忿者還與忿更是為惡事忿者不還忿激戰得二度最大之勝利知他之忿怒正念靜己人自己以及他雙方之醫師唯無知法者其人為愚者一六諸比丘天帝釋唱此偈時諸天歡呼阿修羅默然一七諸比丘諸天與阿修羅之會衆於此謂曰一八吠波質底阿修羅王所語之偈語屬於力劍爭不和與激戰一九天帝釋之偈語非屬力劍爭不和激戰勝利在於天帝釋之有善語二諸比丘勝利在於天帝釋之致善語六第六鳥巢一舍衛城因緣二諸比丘遠昔天與阿修羅之激戰三諸比丘於其戰阿修羅勝而諸天敗四諸比丘戰敗之諸天向北逃走阿修羅隨後追逐五諸比丘時天帝以偈告御者摩多利摩多利辛巴利車轅避鳥之巢唯無此等鳥巢喜奪命於修羅六御者摩多利答天帝釋唯然尊者則以繫千頭駿馬之車輛回頭反馳七諸比丘時阿修羅如是思惟天帝釋今以繫千頭駿馬返車輛回頭反馳諸天則再戰阿修羅恐怖而入阿修羅宮殿八諸比丘如是天帝釋依法乃有勝利七第七無譎詐一爾時世尊住舍衛城二諸比丘遠昔天帝釋獨居靜坐而如是起心念我即使對敵亦不譎詐三諸比丘時吠波質底阿修羅王知天帝釋心之所念來到天帝釋處四諸比丘天帝釋見吠波質底阿修羅王從遠而來以此言吠波質底阿修羅王吠波質底站住汝已被捕五友勿捨以前汝心之所念六吠波質底我不譎詐可得對汝明誓七吠波質底以言虛妄者必定有惡報誹謗於聖者必定有惡報於友不實者必定有惡報不知恩惠者亦定有惡報舍脂鉢底汝詐者有惡報八第八毗留奢那阿修羅王一舍衛城因緣二時世尊日中入室靜觀三時天帝釋與毗留奢那阿修羅王詣世尊之處詣已各依門之兩側而立四時毗留奢那阿修羅王於世尊前說此偈曰至達其利止人不無勉勵輝耀達其利毗留奢那語五帝釋至達其利止人不無勉勵輝耀達其利無勝忍辱者六毗留奢衆生應其分各依必要來如美味合飯悉足樂人人輝耀達其利毗留奢那語七帝釋衆生應其分各依必生來如美味合飯悉足樂人人輝耀達其利無勝忍辱者九第九森林聖者香一爾時世尊住舍衛城二諸比丘遠昔甚多聖者持戒而具優美性質集森木之葉葺小屋而住三諸比丘時天帝釋與吠波質底阿修羅王來到持戒而具優美性質之聖者處四諸比丘時吠波質底阿修羅王穿革履背劍持傘從正門而入小屋冒犯侮蔑其聖者等五諸比丘時天帝釋脫革履令他人持劍收傘由側門入立於彼等持戒善性之聖者等下方合掌禮敬而立六諸比丘時彼等持戒善性之聖者等以偈語天帝釋長修聖者香身出風吹行千眼者此去此聖者之香天王為不淨七帝釋長修聖者香身出風吹行如種種花編頭上之花鬘大德我等乃愛此等之香此無厭諸天一第十海邊聖者參婆羅一爾時世尊住舍衛城二諸比丘遠昔持戒具優美性質之甚多聖者集海岸之木葉葺小屋而住三諸比丘其時天與阿修羅又行激戰四諸比丘時其持戒善性之聖者等生思念諸天如法阿修羅不如法我等從阿修羅起恐怖亦不知我寧可到參婆羅阿修羅王乞無畏之施五諸比丘時彼等持戒善性聖者等猶如力士之伸屈腕屈伸腕沒於海邊小屋現於參婆羅阿修羅王之前六諸比丘時彼等持戒善性聖者等以偈語參婆羅阿修羅王我等聖者至參婆羅之處以乞無畏施汝等若欲者怖畏或無畏何者悉可與七參婆羅以事天帝釋污聖無無畏以求乞無畏我只與怖畏八聖者等我等乞無畏而與汝怖畏我等以還汝汝有無盡恐如播植種子如收割果實為善有善果行惡有惡果種子蒔播植汝應受果報九諸比丘時彼等持戒善性之聖者等詛咒參婆羅阿修羅王猶如力士之伸屈腕沒於參婆羅阿修羅王之前現於海岸小屋一諸比丘時參婆羅阿修羅王為其持戒善性之聖者等所詛咒其夜三度被襲而醒此嗢陀南須毗羅須師摩旗尖吠波質底與善語之勝利及鳥巢無譎詐毗留奢那修羅及森林聖者等並海聖者等是第二帝釋品一一第一諸天禁戒足一一爾時世尊在舍衛城二諸比丘天帝釋為人時以完滿執持七禁戒足依此執持之天帝釋乃得天帝釋之地位三何為七禁戒足耶四應終生孝養父母應終生尊敬家之長老應終生語柔和應終生不誹謗終生心離慳貪之垢而住家有意寬仁而常布施喜施捨從乞求者樂施分配應終生語真實應終生無忿恨若忿起則速制伏五諸比丘天帝釋以前為人時完滿執持此七禁戒足依此執持天帝釋得天帝釋之地位六世尊宣說已乃至師更說此偈孝養父母者奉事於家長以語柔和語遠離於讒謗捨離於慳貪語真實制忿協利之諸天呼彼為善人一二第二諸天二一爾時世尊住舍衛城祇樹給孤獨園二於此世尊以此告諸比丘三諸比丘天帝釋以前為人時名為摩怯儒兒童是故今稱摩怯婆四諸比丘天帝釋以前為人時施與各街市是故稱富蘭陀羅五諸比丘天帝釋以前為人時恭敬而與施故稱釋羅六諸比丘天帝釋以前為人時以與住處故稱婆娑婆七諸比丘天帝釋以前為人時一剎那間能思慮千事故稱千眼者八諸比丘天帝釋稱須闍者乃有阿修羅女之妻故稱須闍之夫九諸比丘天帝釋乃統治三十三天之主權者故稱為天王一一二同前經之二五一三第三諸天三一如是我聞爾時世尊住毗離大林重閣講堂二時離車人之摩訶梨來詣世尊處詣已禮敬世尊坐於一面三坐一面之離車人摩訶梨以此白世尊曰世尊世尊曾見天帝釋否四摩訶梨我曾見天帝釋五世尊彼非似天帝釋者世尊天帝釋是難見者六摩訶梨我知帝釋又依執持其法而為天帝釋並知帝釋之因法七一八同前經三一二一四第四貧人一爾時世尊住舍衛城竹林栗鼠養餌所二其時世尊言諸比丘諸比丘三彼等比丘奉答世尊唯然世尊四世尊以此宣說五諸比丘此王舍城有可憐之貧困者窮人六彼於如來所說之法與律執持信執持戒執持聞執持捨執持慧七彼如是於如來所說之法與律執持信執持戒執持聞執持捨執持慧死後生忉利天為伴之善趣天界彼之容貌榮光超越其他諸天八諸比丘因此忉利之諸天謂譏嫌愚癡而作細言實希有實未曾有此天子以前為人時可憐貧困窮苦死後生忉利天為伴之善趣天界其容貌榮光超越其他諸天九諸比丘時天帝釋呼忉利諸天友汝等勿譏嫌此天子此天子以前為人時於如來所說之法與律執持信執持戒執持聞執持捨執持慧彼依如來所說之法與律執持信執持戒執持聞執持捨執持慧死後生忉利天為伴之善趣天界其容貌與榮光超越其他之諸天一諸比丘時天帝釋寬恕忉利諸天此時唱彼等偈如來於不動有堅實信仰愛樂於聖者其戒甚善美僧伽有信樂其見若正直稱彼不貧窮其人活不虛然憶念佛教賢者應隨從信戒法知見一五第五樂一爾時世尊住舍衛城祇樹給孤獨園二時天帝釋來詣世尊處詣已禮敬世尊立於一面三立一面之天帝釋以此白世尊曰世尊何處有樂土四世尊園林幽美處作美麗蓮池為人所樂者不值十六一鄉村或森林何處濕乾地阿羅漢所住此悉愛樂土一六第六供犧者一爾時世尊住王舍城靈鷲山二時天帝釋來詣世尊處詣已禮敬世尊立於一面三立一面之天帝釋以偈白世尊曰人人供犧牲人人求功德積來生功德何施有大果四世尊四道咸具足建立於四果而直其正見僧具慧戒定人人供犧性人人求功德積來坐功德施僧有大果一七第七禮敬一爾時世尊住舍衛城祇樹給孤獨園二時世尊日中入室靜觀三時天帝釋與梵天與沙巷婆提來詣世尊處詣已各立於門側四時天帝釋於世尊處唱此偈曰挺立起英雄戰鬥勝利者放下重負人無債人行世卿心善解脫如十五夜月五天王不應如是禮敬如來天王不應如是禮敬如來挺立起英雄戰鬥勝利者商隊之主人無債人行世世尊請說法應有了解者一八第八帝釋之禮敬一一爾時世尊住舍衛城祇樹給孤獨園二於此世尊宣說三諸比丘遠昔天帝釋呼御者摩多利摩多利準備千頭駿馬之車我將往園林觀賞美景四諸比丘御者摩多利答天帝釋唯然尊者牽繫千頭駿馬之車以告知天帝釋尊者千頭駿馬車已備齊請知今時五諸比丘時天帝釋走下勝利殿合掌拜四方六諸比丘時御者摩多利以偈語天帝釋七三明之人衆地上剎帝利及四大天王有譽忉利等諸天悉禮汝時帝汝之禮夜叉初是誰八帝釋三明之人衆地上剎帝利及四大天王有譽忉利等諸天悉禮我我今以禮敬具戒心長靜正真出家者勤修梵行人於家修功德具戒優婆塞如法養妻者摩多利如是我乃作禮敬九摩利多帝釋汝禮人實世最勝者婆娑婆汝禮我亦應禮敬一是語須闍夫天王摩怯婆以禮敬四方最先乘其車一九第九帝釋之禮敬二一爾時世尊住舍衛城祇樹給孤獨園二諸比丘遠昔天帝釋呼御者摩多利摩多利牽繫千頭駿馬車我將往囿園觀賞美景三諸比丘御者摩多利答天帝釋唯然尊者牽繫千頭駿馬車以告知天帝釋尊者千頭駿馬已備齊尊者請知今時四諸比丘時天帝釋走下勝利殿合掌禮世尊五諸比丘時御者摩多利以偈語天帝釋婆娑婆天人悉皆禮敬汝帝釋汝之禮夜叉是誰耶六帝釋今天於此界正等正覺者崇高心之師摩多利我禮貪瞋乃無明無餘悉滅盡漏盡阿羅漢摩多利我禮貪瞋調伏已以超於無明還滅樂有學不逸修習者摩多利我禮七摩多利帝釋汝禮人實世最勝者婆娑婆所禮我亦奉禮敬是語須闍夫天王摩佉婆以敬禮世尊最先乘其車二第十帝釋之禮敬三一爾時世尊住舍衛城祇樹給孤獨園二於此世尊宣說三諸比丘遠昔天帝釋呼御者摩多利摩多利牽繫千頭駿馬車我將往囿園觀賞美景四御摩多利答天帝釋唯然尊者牽繫千頭駿馬車以告知天帝釋尊者千頭駿馬車備齊尊者請知今時五諸比丘時天帝釋走下勝利殿合掌以禮比丘衆七諸比丘時御者摩多利以偈語天帝釋持污穢身體沉淪於尸中為飢渴痛苦此人可尊敬婆娑婆出家等有何可羡語聖者等行我欲聞汝言八帝釋摩多利我羡此出家人衆彼等從村出悉除無欲望小屋無何藏無瓶又無鍋所望物備他此以養育身賢善語正語默然正遊方諸天修羅戰摩多利凡夫又是相鬥爭戰中有不戰自我持武器中者在靜寂執著者之中在於不執著摩多利我乃禮敬於彼等九摩多利帝釋汝禮人實世最勝者婆娑婆汝禮我亦當禮敬一是語須闍夫天王摩怯婆語禮比丘僧最先乘其車此嗢陀南諸天云三度貧人及所樂供犧者禮敬帝釋之禮敬第三帝釋品二一第一殺一爾時世尊在舍衛城祇樹給孤獨園二時天帝釋來詣世尊處詣已禮敬世尊立於一面三立一面之天帝釋以偈語世尊曰殺何物樂眠殺何物不悲殺害何一法瞿曇卿讚耶四世尊殺忿最樂眠殺忿無有悲婆娑婆毒根以為最上蜜殺忿聖者讚殺此而無悲二二第二醜陋一爾時世尊住舍衛城祇樹給孤獨園二於此世尊宣說三諸比丘遠昔有醜陋矮小一夜叉坐於天帝釋之座四諸比丘其時忉利之諸天以譏嫌愚癡而作細語曰實希有實未曾有此醜陋矮小夜叉坐天帝釋之座五諸比丘忉利諸天因譏嫌愚癡而作細語其夜叉成為美麗美觀而宏偉六諸比丘時忉利之諸天到天帝釋處到已以此言天帝釋七尊者醜陋矮小一夜叉坐汝之座是故忉利之諸天實希有實未曾有此醜陋矮小一夜叉坐天帝釋之座語譏嫌細言尊者因忉利之諸天譏嫌愚癡而作細語其夜叉則成為美麗美觀而宏偉尊者彼或許是食忿夜叉耶八諸比丘時天帝釋來到食忿夜叉處到已一肩著衣右膝著地合掌禮其食忿夜叉三度自報其名尊者我乃天帝釋尊者我乃天帝釋九諸比丘天帝釋自報其名其夜叉則成醜陋而矮小成為醜陋短小則遂沒其形一諸比丘時天帝釋則坐自座以寬恕忉利之諸天其時而唱此偈曰我心不易害不為情波奪我長不知怒於我不起忿不言激忿語語無不如法以思自己利常以抑自己二三第三幻術一爾時世尊住舍衛城二世尊以此宣說三諸比丘遠昔吠波質底阿修羅王患病其苦痛烈四諸比丘時天帝釋為探望其病來到吠波質底阿修羅王處五諸比丘吠波質底阿修羅王見天帝釋從遠方而來以此語天帝釋請醫我天王六吠波質底教我參婆羅之幻術七友我與諸阿修羅敘談八諸比丘時吠波質底阿修羅王與諸阿修羅敘談我以參婆羅之幻術教天帝釋耶九不勿以參婆羅之幻術教天帝釋一諸比丘時吠波質底阿修羅王以偈語天帝釋摩怯婆帝釋須闍夫天王幻術導地獄因此參婆羅百年墮地獄二四第四罪過無忿一爾時世尊住舍衛城祇樹給孤獨園二其時又有二比丘爭議一比丘犯罪另比丘以彼比丘當謝罪彼比丘不許諾因而起爭議三時甚多比丘來詣世尊處禮敬世尊坐於一面以此事白世尊四世尊二比丘起爭一比丘犯罪另比丘以彼比丘當謝罪彼比丘不許諾五諸比丘於罪不見為罪之比丘不許諾此如法以謝罪之比丘兩者俱為愚者六諸比丘於罪見為罪之比丘如法以謝罪比丘許諾於此此兩具賢者七諸比丘遠昔天帝釋於正法殿寬恕忉利諸天其說此偈曰勿往忿領域友情勿荒老勿以譏不譏勿云離間語如山倒擠人忿擠於惡者二五第五無忿無害一如是我聞一時世尊住舍衛城祇樹給孤獨園二於此世尊言諸比丘並對諸比丘宣說三諸比丘遠昔天帝釋於正法殿寬恕忉利諸天其時說此偈曰勿勝於忿恨勿以忿還忿無忿無有害常住聖者中如山倒擠人忿擠於惡者此嗢陀南殺醜陋幻術無忿於罪過以無忿無害諸天及天子王魔比丘尼梵天婆羅門森林婆耆沙夜叉婆娑婆
