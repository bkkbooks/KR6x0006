body:
  text: 第六梵天相應第一梵天品一第一勸請一如是我聞爾時世尊住優留毗羅尼連禪河邊之阿闍波羅尼俱律陀樹下時已成等正覺二時世尊獨坐禪思而起此思惟三依我所證得此法甚深難見難悟寂靜微妙超越思念之領域深妙唯賢者始知又此諸人等樂阿賴耶喜阿賴耶跳躍阿賴耶諸人依於樂阿賴耶喜阿賴耶跳躍阿賴耶而難見此理此理者即所謂依緣緣起是此理亦難見此理者即一切行之止靜一切依之捨離愛盡離滅涅槃是我若說法諸人難了解我所說者我是應所疲勞而煩擾四又此以前未曾有聞之偈世尊顯示艱難我所證今此實難說敗於欲瞋者難得悟此法逆世之常流微妙而甚深微細極難見貪欲之所污暗蘊所蔽者不得見此法五世尊作如是思惟即躊躇不說法六時梵天沙巷婆提猶如有力者之伸屈腕或屈伸腕頃如是沒於梵天界現於世尊之前八時梵天沙巷婆提偏袒一肩右膝著地合掌禮敬如是白世尊曰九世尊請說法善逝請說法世間有不少衆生為眼塵所蔽彼等不得聞法而衰退世間應有法之了解者一梵天沙巷婆提白此言已更唱此言於摩揭陀國不淨法垢穢依此心思惟開此甘露門依無垢之心今聞悟此法上立山頂巖如見周諸衆賢者全眼者卿起慈悲心立法城宮樓以觀沈悲慘生老敗諸衆請起立英雄戰立勝利者無債商隊主請遊此世間請世尊說法必有知解者一一時世尊知梵天之勸請對衆生起哀憐以佛眼觀世間一二世尊依佛眼觀世間見衆生眼有蔽多蔽少有利根者鈍根者有善相者惡相者有易教者難教者其中或有衆人見來世罪之怖畏而住一三猶如於蓮池之青蓮華黃蓮華白蓮華有青蓮華黃蓮華白蓮華生於水中長於水中不出水面沈育於水中有青蓮華黃蓮華白蓮華生於水中長於水中出立於水不為水所濕如是世尊依眼觀世間見衆生眼有蔽多蔽少有利根者鈍根者有善相者惡相者有易教者難教者其中或有諸衆見來世罪之怖畏而住一四見已以偈答梵天沙巷婆提為於彼等衆開啓甘露門有耳之衆人捨離其他信梵天我思惑不說微妙法一五時梵天沙巷婆提願我說法世尊許允而禮敬世尊右繞於此沒其身形二第二恭敬一如是我聞爾時世尊住優留毗羅林尼連禪河邊阿闍波羅尼俱律陀樹下時已成等正覺二爾時世尊獨坐靜觀生如是思惟無所尊敬恭敬之生活是苦惱我如何尊敬婆羅門而豫近住耶三時世尊生如是思惟為成就未滿之戒蘊應尊敬其他沙門婆羅門而豫近住但我於天界魔界梵天界所含之世界於沙門婆羅門人天所含之衆中不見如我成就戒者以尊敬其他沙門婆羅門而住四七為成就未滿之定蘊乃至未滿之慧蘊乃至未滿之解脫蘊乃至未滿之解脫知見蘊應尊敬其他沙門婆羅門而近住但我於天界魔界梵天界所含之世界於沙門婆羅門人天所含之衆中不見如我成就解脫知見者以尊敬其他沙門婆羅門而近住八我寧可對我所悟之法尊敬此法而豫近住九時梵天沙巷婆提於心知世尊心之思惟猶如男子力士之伸屈腕屈伸腕頃沒於梵天界現於世尊前一時梵天沙巷婆提偏袒一肩合掌禮世尊如是白世尊曰一一世尊如是善逝如是世尊過去之應供正覺者世尊亦恭敬尊重親近法而住未來之應供正覺者世尊亦恭敬尊重親近法而住今之應供正覺者世尊亦恭敬尊重親近法而住一二梵天沙巷婆提說此已又作此曰過去正覺者未來之諸佛今之正覺者滅衆生憂惱悉皆敬正法而住今亦住又未來亦住此諸佛法然故願自己利以望偉大者憶念佛之教不無敬正法三第三梵天一如是我聞爾時世尊住舍衛城祇樹給孤獨園二其時又有婆羅門女之子梵天於世尊處出家而無家三時尊者梵天單獨隱棲不放逸虔誠精進而住不久此良家之子當為由家於無家而出家於現法成就其無上梵行自知實證證入而住知生已盡梵行已立所作已辦不受後有尊者梵天成阿羅漢四時尊者梵天清晨著衣持鉢於舍衛城乞食於舍衛城戶戶乞食近至母家五其時尊者梵天之母婆羅門女常以供牲供梵天六時梵天沙巷婆提生如是思念此尊者梵天之母婆羅門女常以供牲供梵天我當往警覺七時梵天沙巷婆提猶如力士之伸屈腕屈伸腕沒形於梵天界現身於尊者梵天之母家八時梵天沙巷婆提立於空中對尊者梵天之母婆羅門女唱偈曰婆羅門女者汝常為供食因此離梵天婆羅門女者此非梵天食不知梵天道而汝何牢騷婆羅門女者汝梵天比丘已至無依著以達勝天境已無所有處無養之比丘今乞入汝家相應於供養積修達聖道堪為人天供除惡無穢污乞食清威儀彼亦無前後寂靜絶瞋煙無悶亦無欲於弱於強者無用於暴力令彼以得汝第一之供養無煩惱魔襲心靜無欲污如調順象行戒行善圓滿心解脫比丘令彼以得汝第一之供養婆羅門女者今汝超瀑流以見牟尼佛對彼信不動相應於供養以行是功德未來得安樂九婆羅門女今已超越瀑流以見於聖者以持不動信相應於供養以行是功德未來得安樂四第四婆迦梵天一如是我聞爾時世尊住舍衛城祇樹給孤獨園二時又有婆迦梵天生如是惡見此是常此是恆常此是常住此是完全此是不變之法何以故此不衰不老不萎不滅不生故由此以上無有其他之出離三時世尊知婆迦梵天心中之所念猶如力士之伸屈腕屈伸腕沒形於祇園現身於梵天界四婆迦梵天見世尊從遠而來見已以此白世尊曰友來友善來耶友久違何以來此耶友此是常此是恆常此是常住此是完全此是不變之法何以故此是不衰不老不萎不滅不生故由此以上無有其他之出離五如是言已世尊告此婆迦梵天曰婆迦梵天乃被無明所困惑婆迦梵天乃被無明所困惑何以故以無常者言常以非恆常者言恆常以非常住者言常住以非完全者言完全以變易之法言不變易之法以衰老萎滅生者言不衰不老不萎不滅不生由此以上有其他之出離以言由此以上無有其他之出離故六婆迦我等七十二依於功德業為世統治者超越生與老以生此梵天是為最後生我乃通吠陀是故諸衆人尊崇稱讚我七世尊此生壽是短婆迦思為長我知梵天壽百年或億年八婆迦世尊以為我是無邊見者云越老死悲如何以語我善行古禁戒我願欲知此九世尊汝苦於渴古炎熱於煩惱豫水於諸衆此乃汝古之善行及禁戒如是我記憶如眠之醒覺放救耶尼河兩岸囚衆人令脫捕虜者此乃汝古之善根及禁戒如是我記憶如眠之醒覺於恆伽河流憐愍諸衆人舟被狂龍打此乃汝古之善根及禁戒如是我記憶如眠之醒覺古我汝弟子名呼為劫波聖智汝認我此乃汝古之善根及禁戒如是我記憶如眠之覺醒一婆迦汝實知我壽又亦知其他佛陀如是在若實如是在汝光輝威力照耀於梵界五第五他見一舍衛城因緣二其時有梵天生如是惡見無有可來此之沙門婆羅門三時世尊知彼梵天之所念猶如力士伸屈腕屈伸腕沒形於祇園現身於梵天界四時世尊趺坐於此梵天頭上之虛空入於火定五時尊者大目犍連生如是思惟今世尊在何處耶六大目犍連依超人清淨之天眼見世尊趺坐於梵天頭上之虛空入於火定見已如力士之伸屈腕屈伸腕沒形於祇園現身於梵天界七時尊者大目犍連從東方低於世尊在梵天頭上之虛空趺坐入於火定八時尊者大迦葉生如是思惟世尊今住何處耶尊者大迦葉依超人清淨之天眼見世尊趺坐於梵天頭上之虛空入於火定見已猶如力士之伸屈腕屈伸腕沒形於祇園現身於梵天界如是尊者大迦葉從南方低於世尊於梵天頭上之虛空趺坐入於火定九時尊者大劫賓那坐如是思惟世尊今住何處耶尊者大劫賓那乃至如是尊者大劫賓那從西方低於世尊於梵天頭上之虛空趺坐入於火定一時尊者阿那律乃至如是尊者阿那律從北方低於世尊於梵天頭上之虛空趺坐入於火定一一時尊者大目犍連以偈語梵天曰友汝今亦猶前之所持見勝梵界之光見其明光耶一二梵天友我於今日嘗不持是見勝梵界之光以見其明光如何我今日得云常住恆一三如是世尊為令梵天界之驚異猶如力士之伸屈腕屈伸腕沒形於梵天界現身於祇園一四時有梵天呼其他梵衆天友來汝詣尊者大目犍連如是語尊者大目犍連友目犍連世尊之弟子中其他有如目犍連迦葉劫賓那阿那律之大神通大威力耶一五友唯然其梵衆天答覆梵天而詣尊者大目犍連處一六詣已以此語大目犍連曰友目犍連世尊之弟子中其他有如目犍連迦葉劫賓那阿那律之大神通大威力耶一七時尊者大目犍連以偈語梵天衆曰三明達神通巧妙知他心漏盡阿羅漢佛陀弟子中其數有衆多一八時梵衆天歡喜於尊者大目犍連之所說往詣彼大梵天詣已以此語梵天曰友尊者大目犍連如是曰三明達神通巧妙知他心漏盡阿羅漢佛陀弟子中其數有衆多一九彼梵衆天如是云已梵天歡喜於梵衆天之所說六第六放逸一舍衛城因緣二時世尊又往日住坐獨坐三時辟支梵天之須梵與辟支梵天之淨居往詣世尊之處詣已各立於門邊四時辟支梵天須梵以此謂辟支梵天淨居曰友今不應侍奉世尊世尊在行日住之獨坐彼處繁榮有梵天界梵天於此住於放逸住友我等詣彼梵天詣已令驚惑彼梵天五友唯然辟支梵天淨居回答辟支梵天須梵六時辟支梵天須梵與辟支梵天淨居猶如力士之伸屈腕屈伸腕沒形於世尊前現身彼世界七彼梵天見彼等梵天從遠而來見已以此謂彼等梵天曰友卿等從何處來耶八友我等從彼世尊應供正等覺者之處來友卿亦能往侍奉世尊應供正等覺者實為善九彼言已其梵天不諾彼言即化為千度形以此謂辟支梵天須梵曰友卿見我如是之神通威力否一友我見卿如是神通威力一一友我有如是之神通威力如何往侍奉其他沙門或婆羅門耶一二時辟支梵天須梵化為二千度形以此謂其梵天曰友卿見如是神通威力否一三友我見卿如是神通威力一四友彼世尊比卿與我具更大神通威力友往侍奉彼世尊應供正等覺者為善一五時彼梵天以偈謂辟支梵天須梵曰我宮殿有三百列金翅鳥四百列白鳥五百虎雕刻梵天此宮殿赫赫耀北方一六須梵如何汝宮殿赫耀於北方賢者常見色諍亂與動亂故不樂於色一七時辟支梵天須梵與辟支梵天淨居為驚惑此梵天於此沒其身形一八如是其梵天於其他之時為侍奉世尊應供正等覺者而去七第七瞿迦利迦一爾時世尊住舍衛城二時世尊又行日住之獨坐三時辟支梵天須梵與辟支梵天淨居詣世尊處詣已各立門邊四時辟支梵天須梵對瞿迦利比丘於世尊前唱此偈曰以量不可量此誰知分別以量不可量我思無智者唯有為混亂八第八低沙迦一爾時世尊住舍衛城二時世尊行日住之獨坐三時辟支梵天須梵與辟支梵天淨居詣世尊處詣已各立門邊四時辟支梵天淨居對迦達摩達迦低沙迦比丘於世尊前唱此偈曰以量不可量此誰知分別以量不可量我思無智者唯有為混亂九第九都頭梵天一爾時世尊住舍衛城二時瞿迦利迦比丘生病而痛苦其病嚴重三時辟支梵天都頭於夜更以其勝光輝耀祇園詣瞿迦利迦比丘處四詣已立於空中以此語瞿迦利迦比丘曰瞿迦利迦比丘以信樂舍利弗與目犍連舍利弗與目犍連是穩和者五友汝誰耶六我乃辟支梵天都頭是七友汝莫非依世尊記別為不還者耶此時何故還來此耶汝見犯過誤看八都頭人之出生時斧實生口中愚人語於惡其斧斬自己以讚應責者以責應讚者依口重惡運依惡不得樂博奕為致富失己猶不運污心於善逝不運更增大企惡於口意貶責聖人者於百千垓年三十六垓年五秭年地獄墮之受痛苦一第十瞿迦利迦一爾時世尊住舍衛城二時瞿迦利迦詣世尊處詣已禮敬世尊於一面坐三一面坐之瞿迦利迦比丘白世尊曰世尊舍利弗與目犍連是惡欲者是受惡欲所支配者四言已世尊以此告瞿迦利迦比丘曰瞿迦利迦勿作如是言瞿迦利迦勿作如是言瞿迦利迦勿作如是言瞿迦利迦應信樂舍利弗與目犍連舍利弗與目犍連是穩和者五六復次乃至七瞿迦利迦三度告世尊曰世尊舍利弗與目犍連是惡欲者是受惡欲所支配者八世尊三度告瞿迦利迦曰瞿迦利迦勿作如是言瞿迦利迦勿作如是言瞿迦利迦應信樂舍利弗與目犍連舍利弗與目犍連是穩和者九時瞿迦利迦比丘即從坐起禮敬世尊右繞而去一瞿迦利迦比丘去後不久全身生如芥子粒之瘡芥子粒即漸成豆粒豆粒成如大豆大豆成如棗核大棗核而成如棗大棗而成如阿摩羅果大阿摩羅果而成如未熟之橡果大成如未熟之橡果大於此破裂流出膿血一一時瞿迦利迦比丘於此病而死死矣之瞿迦利迦比丘因對舍利弗與目犍連敵意而墮紅蓮地獄一二時梵天沙巷婆提於黎明更以其勝光輝耀全園詣於世尊處詣已禮敬世尊立於一面一三立於一面之梵天沙巷婆提以此白世尊曰世尊瞿迦利迦比丘死矣因對舍利弗與目犍連懷敵意死墮紅蓮地獄一四梵天沙巷婆提作此言已禮敬世尊右繞沒形於此一五時世尊於當夜過後呼諸比丘曰諸比丘此夜梵天沙巷婆提於黎明以其勝光輝耀全祇園詣我處詣已禮我立於一面諸比丘立於一面之梵天沙巷婆提告我曰世尊瞿迦利迦比丘死矣因對舍利弗與目犍連懷敵意死而墮入紅蓮地獄諸比丘梵天沙巷婆提作此言已禮敬我右繞於此沒其身形一六如是言已有比丘以此白世尊曰世尊紅蓮地獄之壽量有幾何耶一七比丘紅蓮地獄之壽量甚長難數為幾年幾百年幾千年幾百千年一八世尊可譬喻說之耶一九世尊曰比丘得如是說譬喻此拘薩羅國有二十加厘菜種子各過百年取一粒菜種子且以此方法於拘薩羅國取盡二十加厘菜種子亦不盡阿浮陀地獄之壽量諸比丘二十阿浮陀地獄為一尼羅浮陀地獄二十尼羅浮陀地獄為一阿婆婆地獄二十阿婆婆地獄為一阿吒吒地獄二十阿吒吒地獄為一阿訶訶地獄二十阿訶訶地獄為一水蓮地獄二十水蓮地獄為一青睡蓮地獄二十青睡蓮地獄為一青蓮地獄二十青蓮地獄為一白蓮地獄二十白蓮地獄為一紅蓮地獄比丘瞿迦利迦比丘對舍利弗與目犍連懷敵意墮此紅蓮地獄二世尊如是說已善逝又唱此偈曰人之出生時斧實生口中乃至同前經之偈此嗢陀南勸請及恭敬梵婆迦梵天他邪見放逸與瞿迦利迦乃至低沙迦都頭梵天及他瞿迦利迦第二梵天品一一常童子一如是我聞爾時世尊住王舍城葉毗尼河邊二時梵天常童子於黎明光輝照葉毗尼河邊以詣世尊處詣已禮敬世尊立於一面三立一面之梵天常童子於世尊處唱此偈曰氏姓人中尊殊勝剎帝利明行具足者人天中殊勝四梵天常童子言已請師嘉賞五時梵天常童子知依師受嘉賞禮敬世尊右繞而去一二第二提婆達多一爾時世尊於提婆達多離去不久住王舍城靈鷲山二時梵天沙巷婆提於黎明時輝耀全靈鷲山以詣世尊處詣而禮敬世尊立於一面三立一面之梵天沙巷婆提對提婆達多於世尊處唱此偈曰芭薩竹及葦生果實則萎如驢生子死惡人名譽殺一三第三暗陀迦頻陀一爾時世尊住摩揭陀國之暗陀頻陀二爾時世尊於夜暗中坐於露地天降雨三時梵天沙巷婆提於黎明時輝耀全暗陀迦頻陀以詣世尊處詣已禮敬世尊立於一面四立於一面之梵天沙巷婆提於世尊處唱此偈曰住於離市里遊方猶離縛若有心不樂應護於諸根正念住僧伽家家行乞時護根謹正念住於離市里無懼得解脫回憶懼毒蛇電光鳴天雷於夜暗比丘獨坐離恐怖我眼實當見非是傳所聞在於一法教以脫千人死有當五百多於百之十倍於其十倍數皆悉入預流超畜生趣者此外之諸人對於得功德我心難堪數恐人云妄語一四第四阿盧那越提一如是我聞爾時世尊住舍衛城二時世尊呼諸比丘諸比丘三唯然世尊彼等諸比丘應答世尊四世尊如此宣說五諸比丘昔有阿盧那遠多王其王有阿盧那越提之都尸棄世尊應供正等覺者住其阿盧那越提王都六諸比丘又尸棄世尊應供正等覺者有一對上足弟子名為阿毗浮參跋婆七時諸比丘尸棄世尊呼阿毗浮比丘來婆羅門至於食時到某梵天界八唯然世尊阿毗浮比丘奉答尸棄世尊九時諸比丘尸棄世尊與阿毗浮比丘猶如力士之伸屈腕屈伸腕沒於阿盧那越提王都現身於梵天界一時諸比丘尸棄如來呼毗浮比丘婆羅門向此梵天梵輔天梵衆天說法語一一唯然世尊阿毗浮比丘奉答尸棄世尊向梵天梵輔天梵衆天說法語教誡勉勵令其歡喜一二爾時諸比丘梵天與梵輔天及梵衆天相說細語還復牢騷說愚癡實希有未得曾有如何弟子於師前說法耶一三時諸比丘尸棄世尊呼阿毗浮比丘曰婆羅門梵天與梵輔天及梵衆天牢騷說細語云愚癡實希有得未曾有何以弟子於師前說法耶婆羅門是故汝越更警醒於梵天與梵輔及梵衆天一四唯然世尊諸比丘阿毗浮比丘奉答尸棄世尊以現身說法不現身說法現下半身說法現上半身說法一五於此諸比丘梵天與梵輔天及梵衆天起希有得未曾有心沙門之大神通大威力實是希有實是未曾有一六時阿毗浮比丘以此白尸棄世尊曰世尊知我