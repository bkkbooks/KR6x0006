body:
  text: 第二天子相應第一迦葉品一第一迦葉其一一如是我聞爾時世尊住舍衛城祇樹給孤獨園其時迦葉天子於黎明其勝光徧照祇園往詣世尊處詣已禮敬世尊立於一面立於一面之迦葉天子向世尊謂曰世尊請以比丘之教開示比丘及我等二迦葉善哉然則當為汝說能起之事三以修說微妙以修沙門行獨住於一座靜心以修法四迦葉天子作如是言請大師嘉賞迦葉天子知受大師之嘉賞禮敬世尊右繞而形沒於其處二第二迦葉其二一爾時世尊住舍衛城二立於一面之迦葉天子於世尊前唱此偈曰比丘若禪思以得心解脫知世之興廢心善不執著若望心得達不能得其果三第三摩佉一爾時世尊住舍衛城二時摩佉天子於黎明往詣世尊處其勝光徧祇園詣已禮敬世尊立於一面三立於一面之摩佉天子向世尊唱偈曰殺何樂寢臥殺何而不悲殺害何一法瞿曇卿稱讚四世尊殺忿樂寢臥殺忿而不悲諸天以毒根忿為最上蜜聖讚此忿殺殺之不悲傷四第四摩揭陀一立於一面之摩揭陀天子向世尊唱偈曰世有幾多光徧照此世間我等問世尊如何得知此二世尊世有四種光此無第五光晝乃太陽輝夜乃月光照時火於日夜彼此相徧照正覺最勝火此為無上光五第五陀摩利一爾時世尊在舍衛城二時陀摩利天子於黎明其勝光徧照祇園往詣世尊處詣已禮敬世尊立於一面三立於一面之陀摩利天子於世尊前唱此偈曰精進勿倦怠以捨離愛欲依此不欲有婆羅門所行四世尊曰陀摩利此婆羅門者無有之所行婆羅門應作一切終已辦人不得足基四肢雖勤動亦為流所衝得立土足基彼到於彼岸不為流所動天子陀摩利此乃諸漏盡賢善於禪思以喻婆羅門彼達生老終以立於彼岸不為所流逝六第六迦摩陀一立於一面之迦摩陀天子以此白世尊曰二世尊是者難為世尊是甚難世尊曰迦摩陀難為彼等為有學而依戒寂靜又確立於出家之人致安樂知足三世尊知足甚難得世尊曰迦摩陀難得彼等得樂心寂靜人其心日或夜悅樂於修習四世尊心實難靜世尊曰迦摩陀難靜彼等靜諸根寂靜樂彼破死魔網迦摩陀天子為聖者所行五世尊此道嶮難行世尊雖嶮雖難行迦摩陀天子聖者乃樂行非聖於嶮道彼等頭倒下聖者之道平不分嶮與平聖者乃樂行七第七般闍羅旃陀一立於一面之般闍羅旃陀天子於世尊前唱此偈曰有大智慧人障中知餘地無有所著者無比之聖者佛陀知禪定二世尊曰般闍羅旃陀彼等於障中知到涅槃法以得正念人善正心寂靜八第八多耶那一時原本是外道師之多耶那天子於黎明其勝光徧照祇園往詣世尊處詣已禮敬世尊立於一面二立於一面之多耶那天子於世尊前唱此偈曰婆羅門斷流精進滅愛欲牟尼未離欲不入於禪定欲作應作者精進而行此出家若疏漫愈益散塵垢不為勝惡行行惡後受苦行善者為勝行善無有苦宛如握惡草因之手受傷沙門生活惡因之入奈落疏漫所作業污染於禁戒懷疑於梵行無有隨大果三多耶那天子作此言已禮敬右繞世尊體形沒於此處四時世尊其夜過後呼集比丘等五諸比丘此夜名為多耶那本是外道師之天子於黎明時其勝光徧照祇園詣佛處詣已禮敬世尊立於一面立於一面之天子於佛前唱此偈曰婆羅門斷流精進滅愛欲牟尼未離欲不入於禪定欲作應作者精進而行此出家若疏漫愈益散塵垢不為勝惡行行惡後受苦行善者為勝行善無有苦宛如握惡草因之手受傷沙門生活惡因之入奈落疏漫所作業污染於禁戒懷疑於梵行無有隨大果六諸比丘多耶那天子作此言已禮敬圍繞世尊形體沒於其處諸比丘應暗誦多耶那偈諸比丘多耶那偈具足利義屬最初之梵行九第九月天子一爾時世尊住舍衛城二其時月天子被阿修羅王羅睺所捕月天子乃憶念世尊而唱此偈曰佛陀大雄者我歸依於卿卿障皆解脫我今落障礙然則從此我置於歸依處三時世尊關於月天子以偈向阿修羅王羅睺曰月天子今乃歸依於如來應供正覺者羅睺以放月諸佛憐世間四時阿修羅王羅睺以放月天子有所顧慮而詣阿修羅王吠波質底詣已恐怖毛髮豎立立於一面阿修羅王吠波質底對於立於一面之阿修羅王羅睺說偈曰羅睺何恐怖為放月者乎汝今懼顫來懼何而立此五羅睺我懼佛陀偈若我不放月我頭割為七不得生安樂一第十日天子一其時阿修羅王羅睺又捕日天子日天子憶念佛陀其時唱此偈曰佛陀大雄者我歸依於卿卿障皆解脫我今落障礙然則從此我置於歸依處二時世尊關於日天子以偈向阿修羅王羅睺曰日天子今乃歸依於如來應供正覺者羅睺以放日佛陀憐世間彼耀默闇中徧照而周圓熾燃炎熱火羅睺不得吞彼之飛空行羅睺以放我弟子日天子三時阿修羅王羅睺以放日天子即顫慄而詣阿修羅王吠波質底詣已恐怖毛髮豎立而立於一面阿修羅王吠波質底對立於一面之阿修羅王羅睺語偈曰羅睺何怖懼為放日者乎汝今顫懼來何恐而立此四羅睺我畏佛陀偈若我不放日我頭割為七不得生安樂此嗢陀南迦葉與摩佉摩揭陀摩利以及迦摩陀般闍羅旃陀乃至多耶那月日等為十第二給孤獨品一一第一月自在一爾時世尊住舍衛城時月自在天子於黎明其勝光徧照祇園往詣世尊處詣已禮敬世尊立於一面二立於一面之月自在天子於世尊前唱此偈曰善巧心集中正念入禪定猶如無蚊患樹叢中走獸可以平安行不為於放逸以離諍煩惱而入禪定人猶如破網魚可以平安行一二第二毘紐一立於一面之毘紐天子於世尊前唱此偈曰奉侍於善逝順從瞿曇教學不放逸人實是幸福焉二世尊呼曰毘紐從我所說教學句入禪定始終不放逸不入死魔領一三第三提伽羅低一如是我聞爾時世尊住王舍城竹林栗鼠養餌所二時提伽羅低天子於黎明往詣世尊處其勝光徧照竹林詣已禮敬世尊立於一面三立於一面之提伽羅低天子於世尊前唱此偈曰比丘若禪思以得心解脫知世之興廢心善不執著若望心得達不能得其果一四第四難陀那天子一立於一面之難陀那天子向世尊唱偈曰大智之瞿曇無有蓋覆事奉問於世尊大雄智見者何持等戒者何等智慧者何等超苦人諸天崇何人二世尊具戒有智慧勤修於心意寂靜而禪樂正念捨諸愁諸漏皆盡已最後身之人如是之行人稱為持戒者如是之行人稱為智慧者如是超苦人是人諸天敬一五第五栴檀一立於一面之栴檀天子向世尊唱偈曰日夜不惰怠無有立足基亦無攀著處以何超瀑流何人不深沈二世尊常於戒具足智慧善靜心精進不撓人渡難超瀑流遠離於欲想越色之繫縛已盡喜貪人是為不深沈一六第六須達多一立於一面之須達多天子於世尊前唱此偈曰猶如觸於劍猶如髮燃時比丘捨欲貪正念於出家二世尊猶如觸於劍猶如髮燃時捨身見比丘正念於出家一七第七須梵一立於一面之須梵天子向世尊唱偈曰此心常怖畏此意常顫慄起時甚恐懼不起亦恐懼若有免畏道願請以指教二世尊菩提分之外勤修行之外制諸根之外一切放棄外我不得窺見眾生之平安一八第八覺陀一如是我聞爾時世尊住沙計多安闍那林之鹿野苑時覺陀天子於黎明其勝光徧照安闍那林往詣世尊處詣已禮敬世尊立於一面二立於一面之覺陀天子向世尊言此曰比丘汝歡喜否世尊曰友得到何耶天子曰比丘然而悲否世尊曰友失落何耶天子曰比丘然而汝亦不喜亦不悲乎世尊曰友唯然三天子比丘汝不悲汝亦不歡喜唯獨寂寞坐不足思不著四世尊夜叉我不悲亦無有歡喜唯獨寂靜坐無著思不足五天子比丘何不悲如何亦不喜唯獨寂寞坐不足思不著六世尊有悲者有喜有喜者有悲比丘無喜悲如是友當知七天子無喜亦無悲超愛世比丘涅槃婆羅門實久我所見一九第九優多羅一王舍城因緣立於一面之優多羅天子於世尊前唱此偈曰二生導死壽短老導無庇護觀死此恐懼齎樂積功德三世尊生導死壽短老導無庇護觀死此恐怖棄欲希寂靜二第十給孤獨一立於一面之給孤獨天子於世尊前唱此偈曰此乃彼祇園聖僧伽住處法王請住此思念我生喜善意智法定以及戒正命依此人清淨又依姓氏富非得於清淨是故賢智者以思自己利並思擇正法如是其清淨依於戒智慧乃至於寂靜猶如舍利弗比丘到彼岸應當是最勝二給孤獨天子言此已敬禮右繞世尊體形沒於其處三時世尊於其夜過後集比丘等四諸比丘此夜有一天子其勝光徧照祇園於黎明詣我住處詣已禮敬我而立於一面比丘等立於一面其天子於我面前唱此偈曰此乃彼祇園聖僧伽住處法王請住此思念我生喜善意智法定以及戒正命依此人清淨又依姓氏富非得於清淨是故賢智者以思自己利並思擇正法如是其清淨依於戒智慧乃至於寂靜猶如舍利弗比丘到彼岸應當是最勝五比丘等其天子作此語已敬禮右繞於我體形沒於其處六如是語已尊者阿難以此告世尊曰世尊或許彼天子乃給孤獨天子給孤獨長者信樂於尊者舍利弗七善哉善哉阿難只要依尋求終可得即依汝可使得阿難其實乃給孤獨天子此嗢陀南月自在毘紐及提伽羅低乃至難陀那栴檀須達多須梵與覺陀第九優多羅第十給孤獨第三種種外道品二一第一濕婆一如是我聞爾時世尊住舍衛城祇樹給孤獨園時濕婆天子於黎明其勝光徧照祇園往詣世尊處詣已禮敬世尊立於一面二立於一面之濕婆天子於世尊前唱此偈曰只與善人坐只與善人交知善人正法為善不為惡只與善人坐只與善人交知善人正法依他不能得而得之智慧只與善人坐只與善人交知善人正法悲中無有悲只與善人坐只與善人交知善人正法輝耀親族中只與善人坐只與善人交知善人正法人人行善趣只與善人坐只與善人交知善人正法人人有幸福三時世尊以偈答濕婆天子曰只與善人坐只與善人交知善人正法可脫一切苦二二第二差摩一立於一面之差摩天子於世尊前唱此偈曰魯鈍無智慧行為如自敵以作諸惡業以結苦痛果不行其善業終為而苦惱咽鳴淚哭泣以受其苦果若行其善業行訖無苦惱歡喜心意樂以受其樂果為於自己知智者及賢者而作行準備如是不若彼車力者之思勇猛精進之宛如車力者離於平大道入於不平路毀軸如沈思如是法不進從於不法故怠者到魔口如毀軸沈思二三第三世理一立於一面之世理天子向世尊唱此偈曰不論天及人皆以食為樂時有不喜食夜叉實何者二世尊信仰清淨心行施食之人此世及後世皆可得其食是故調伏慳善施即勝垢功德乃人人後世渡津頭三天子曰世尊希有得未曾有實是世尊之善說信仰清淨心行施食之人此世及後世皆可得其食是故調伏慳善施克服垢功德乃人人後世渡津頭四世尊昔我是施者施主布施之讚歎者名為世理王世尊我於四門施與沙門婆羅門可憐之人眾旅行者無宿之人等求乞者五時世尊妃妾等來言我曰陛下之行施與我等不行施與我等亦依陛下得行施與之功德者即何善焉世尊我如是思之我是施者施主施之讚歎者我對於言我等亦應行布施者當作如何說耶世尊如是我於第一門以與妃妾等於此妃妾等行布施超越我之施與六時世尊侍者之剎帝利等來言我曰陛下之施與妃妾等之施與我等不施與我等亦依陛下得行施與之功德者即何善焉世尊我如是思之我是施者施主施之讚歎者對於言我等亦行布施者當如何說耶世尊如是我於第二門以與侍者之剎帝利等彼等於此行布施超越我之施與七時世尊軍隊來說我乃至世尊如是我於第三門與軍隊與彼等於此行布施超越我之施與八時世尊婆羅門家主等來言我乃至世尊如是我於第四門與婆羅門家主等彼等於此行布施超越我之施與九世尊時人人來說我曰今陛下任何皆不施與世尊如是言云我即向彼眾人曰然則從城外諸州所收益之中一半納於宮庭一半施與沙門婆羅門可憐之人眾旅行者無宿之人求乞者等一世尊於是我如是長久所行之功德如是長久所行之善未達其終極有此諸功德此諸功德之果此諸之間當於天界其無終極一一世尊希有是最勝此依世尊實是善說信仰清淨心行施食之人此世及後世皆可得其食是故調伏慳善施克服垢功德乃人人後世渡津頭二四第四陶師一立於一面之陶師天子於世尊前唱此偈曰比丘解脫有七人得上生於無煩天欲貪瞋恚滅無餘並超世間之愛著難超死魔之領域誰是超越泥地者此世捨此人身後亦離天軛者是誰優波迦波羅犍陀弗久左底為第三跋提耶犍陀捉婆婆睺羅祇頻祇耶此等諸人捨人身亦是離卻天軛人二世尊逃惡魔係蹄言之何微妙彼等知誰法斷除有結縛三陶師無外世尊法無外世尊教彼等知其法斷除有結縛於此名與色滅盡無有餘此世知其法彼斷有結縛四世尊知難悟又難汝言深奧語汝知何人法以語如是語五陶師昔世我陶師於耶發鄰加行村作陶壺以事父與母迦葉如來世乃為優婆塞遠離於欲無欲修梵行我本同鄉者前為卿之友然而我正是解脫七比丘貪瞋滅無餘知超世愛著六世尊跋伽婆如汝之語有如是汝前為陶師於耶發鄰加街村作陶壺遠離於欲無欲修梵行我乃同鄉者以前實我友七積此高修習最後身二人邂逅昔故友真實如是者二五第五姜睹一如是我聞爾時眾多比丘等住於拘薩羅國雪山側之森林小屋掉舉而高慢多辯饒舌忘念不正知心不安靜散亂不制伏諸根二時姜睹天子於其布薩十五日詣其比丘等處詣已向比丘等言偈曰往昔彼瞿曇弟子比丘等而住於安樂乞食無求心無求之心住知世之無常彼等苦惱盡今之比丘等惡向於自己如村長於村心奪他家富食餐而寢臥僧伽無合掌此有人禮我被棄無主人宛如於死屍對放逸之人我乃以語彼住不放逸者我乃行歸依二六第六赤馬一爾時世尊住舍衛城二立於一面之赤馬天子向世尊言此曰世尊於此不生何物不衰不死無生起之處步行之而知或見或得到彼世界之邊極耶三世尊曰友我不語於此不生何物不衰不死不沒步行之即得知得見得到達不生起彼世界之邊極四天子曰世尊希有得未曾有世尊此實是由世尊所語友我不語於此不生何物不衰不死不沒步行之即得知得見得到達不生起彼世界之邊極五世尊我往昔名為赤馬仙人普奢之子而有飛行於空中之神通世尊我有如是迅速之力譬如精巧練習熟練取弓於輕矢其速力如以超越射透多羅樹之葉蔭六世尊斯我一足之幅度有如由東海至西海之廣於我起如是願我於步行得到世界之邊極七世尊我具有如是速力於如是足幅於飯食之外大小便之外睡以治疲勞外行我壽命百歲之間未達世界之邊極中途而死八世尊希有得未曾有也世尊此實是由世尊所語我不語於此不生何物不衰不死不沒步行而得知得見得到達不生起彼世界之邊極九世尊曰友我非說不達世界之邊極而成苦惱之邊極友我說示於此一尋之有想有意之身體上到達世界與世界之果世界之滅與世界之滅道步行於世界不得達邊極不達世邊極不以脫苦惱是故實賢者及世間解者達世界邊極終以成梵行惡之澄靜者知世之邊極此世及後世無有所求者二七第七難陀一立於一面之難陀天子於世尊前唱此偈曰時過日夜移青春棄我等觀死此恐怖齎樂積功德二世尊時過日夜移青春棄我等觀死此恐怖棄欲希寂靜二八第八難提毘舍羅一立於一面之難提毘舍羅天子向世尊語偈曰四輪九門孔污穢滿貪欲乃是不淨性大雄從如何有此之出口二世尊以斷惡欲貪乃至繩與網拔棄渴愛根如是有出口二九第九須尸摩一舍衛城因緣二時尊者阿難往詣世尊處禮敬世尊坐於一面世尊對坐於一面之阿難宣說阿難汝亦喜舍利弗否三阿難曰世尊不愚不污不迷亂不亂心者有誰不喜歡尊者舍利弗者世尊尊者舍利弗是賢者世尊尊者舍利弗是大慧世尊尊者舍利弗是廣慧世尊尊者舍利弗是速慧世尊尊者舍利弗是迅慧世尊尊者舍利弗是銳慧世尊尊者舍利弗是貫通慧世尊尊者舍利弗是小欲世尊尊者舍利弗是知足世尊尊者舍利弗是遠離世尊尊者舍利弗是不共住世尊尊者舍利弗是精進世尊尊者舍利弗是辯者世尊尊者舍利弗是聽忠言之人世尊尊者舍利弗忠告者世尊尊者舍利弗是惡之責難者世尊不愚不污不迷亂不亂心者有誰不喜歡尊者舍利弗者四世尊曰阿難確實如是阿難確實如是阿難不愚不污不迷亂不亂心者有誰有不喜歡舍利弗者阿難舍利弗是賢者是大慧廣慧速慧迅慧銳慧貫通慧小欲知足遠離不共住精進辯者聽忠言者忠告者惡之責難者五時須尸摩天子於讚歎彼尊者舍利弗之德中為天子大眾所圍繞而詣世尊處詣已禮敬世尊立於一面六立於一面之須尸摩天子以此告世尊曰世尊不愚不污不迷亂不亂心者有誰不喜歡尊者舍利弗者尊者舍利弗是賢者乃至惡之責難者也不愚不污不迷亂不亂心者有誰不喜歡尊者舍利弗者七時須尸摩天之天子眾於讚歎尊者舍利之德時以生喜悅歡喜而顯其勝色光八譬喻清淨而好性質八角善磨之吠琉璃珠置於黃毛布上其光之輝照如是須尸摩天子之天事眾讚歎尊者舍利弗之德時生喜悅歡喜而顯其勝色光九譬喻由精巧金工師以作巧妙之閻浮河金之頸飾置於黃毛布之上以輝耀其光如是須尸摩天子之天子眾乃至顯一譬如夜將曉明星輝照之光乃至一一譬如秋季太陽昇於澄雲之空以拂虛空所有之暗以輝耀其光如是須尸摩天子之天子眾於讚歎尊者舍利弗之德時以顯其勝色光一二時須尸摩天子關於尊者舍利弗於世尊前唱此偈曰無忿而小欲柔和而調順擔師譽聖者知舍利弗智一三時世尊關於尊者舍利弗以偈答須尸摩天子曰無忿而小欲柔和而調順善調之庸人如待薪資金用以待死時舍利弗智者為世所皆知三種種之外道師一如是我聞爾時世尊住王舍城竹林栗鼠養餌處二時眾多之種種外道弟子之天子等阿舍摩舍波利任迦阿考吒迦吠坦婆利摩納婆伽彌耶於黎明往詣世尊處其勝光徧照竹林詣已禮敬世尊立於一面三立於一面之阿舍摩天子關於富蘭那迦葉於世尊前唱此偈曰世間之割殺以及害與奪迦葉謂非惡不見自功德彼述實自信相應為師尊四時舍波利天子關於末伽梨瞿舍羅於世尊前唱此偈曰苦行與厭離以善自制伏與人語止爭離於有罪語平等於語實何以彼如是不為其惡耶五時任迦天子關於尼乾陀若提子於世尊前唱此偈曰厭離巧比丘制御四種身開顯被見聞彼何無罪過六時阿考吒迦天子關於種種之外道師於世尊前唱此偈曰據陀迦旃延乃至尼乾陀又此末迦梨以及富蘭那為人人之師達沙門果人如何於彼等遠離善人焉七時吠坦婆利天子以偈答阿考吒迦天子曰號吼卑野干畢竟是野干不管於如何難等於獅子裸形而妄語以為眾之師疑訝之行為難等於善人八時惡魔波旬隨從吠坦婆利天子而入於世尊前唱此偈曰苦行與厭離守遠離生活物質入於心以樂喜天界不導人他界彼等正教誨九時世尊知此惡魔波旬以偈答惡魔波旬曰此世及彼世不管任何色光顯輝中空此等皆是實那牟尼所讚如對魚於餌因為是不殺而可令投棄一時摩納婆伽彌耶天子關於世尊於世尊前唱此偈曰王舍城諸山尾布羅最勝雪山之諸山白山為最勝行於空中者太陽為最勝海為水中勝月為星中勝世界及天界云佛是第一此嗢陀南濕婆與差摩世理並陶師姜睹及赤馬難提毘舍羅難陀須尸摩種種外道師此等共為十
