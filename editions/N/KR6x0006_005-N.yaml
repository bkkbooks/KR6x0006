body:
  text: 第五比丘尼相應一第一阿羅毘迦一如是我聞爾時世尊住舍衛城祇樹給孤獨園二時阿羅毘迦比丘尼清晨著衣持鉢入舍衛城乞食於舍衛城乞食後收鉢入於暗林以求遠離三時惡魔波旬欲令阿羅毘迦比丘尼生恐怖毛髮豎立以捨遠離而詣阿羅毘迦比丘尼之處詣已以偈語阿羅毘迦比丘尼曰世間無由出遠離欲何為還味諸欲樂勿至後成悔四時阿羅毘迦比丘尼作如是思惟語此偈是誰人耶非人耶五時阿羅毘迦比丘尼作如是思惟此惡魔波旬令我起毛髮豎立之恐怖欲使去遠離而唱偈六時阿羅毘迦比丘尼知是惡魔波旬以偈答惡魔波旬曰世間有出離依智我自達放逸惡波旬汝不知其道欲樂如劍鎗諸蘊斷頭臺汝云味欲樂於我非為樂七時惡魔波旬苦惱以阿羅毘迦比丘尼已知我萎身隱沒其身形二第二蘇摩一舍衛城因緣時蘇摩比丘尼清晨著衣持鉢入舍衛城乞食二於舍衛城乞食後收鉢為日住來至暗林入暗林已於樹下為日住而坐三時惡魔波旬欲令蘇摩比丘尼生恐怖毛髮豎立以棄禪定而詣蘇摩比丘尼處詣已以偈語蘇摩比丘尼曰聖者所至處是處甚難至非女二指智能得至彼處四時蘇摩比丘尼生如是思惟是語此偈者誰耶人耶非人耶五時蘇摩比丘尼生如是思惟此惡魔波旬欲令我生恐怖毛髮豎立以棄禪定而唱此偈六時蘇摩比丘尼知是惡魔波旬以偈答惡魔波旬曰心入於寂靜女形復何障智慧已顯現即見無上法我若思男女思此為何物心感於如是即應惡魔語七時惡魔波旬苦惱以蘇摩比丘尼已知我萎身隱沒其身形三第三瞿曇彌一舍衛城因緣時吉離舍瞿曇彌比丘尼清晨著衣持鉢入舍衛城乞食二於舍衛城乞食後收鉢為日住以至暗林至暗林已於樹下為日住而坐三時惡魔波旬欲令吉離舍瞿曇彌比丘尼生恐怖毛髮豎立以棄禪定而詣吉離舍瞿曇彌比丘尼處詣已以偈語吉離舍瞿曇彌比丘尼曰汝何喪其子涕泣而獨憂獨入坐暗林為求男子否四時吉離舍瞿曇彌比丘尼生如是思惟語此偈者是人非人耶五時吉離舍瞿曇彌比丘尼生如是思惟此惡魔波旬欲令我生恐怖毛髮豎立以棄禪定而語此偈六時吉離舍瞿曇彌比丘尼知是惡魔波旬以偈答曰喪子日已過亦無男子想我不復悲泣無煩汝顧為以捨浮世樂破一切闇冥及破死魔軍我住盡諸漏七時惡魔波旬苦惱以吉離舍瞿曇彌比丘尼已知我萎身隱沒其身形四第四毘闍耶一舍衛城因緣時毘闍耶比丘尼於舍衛城乞食食後收鉢為日住而坐於樹下二時惡魔波旬欲令毘闍耶比丘尼生恐怖毛髮豎立以棄禪定而詣毘闍耶比丘尼處詣已語偈曰汝今美年輕我亦是年少貴女來此處共受五種樂三時毘闍耶比丘尼作如是思惟語此偈者是人非人耶四時毘闍耶比丘尼生如是思惟此惡魔波旬乃至語偈五時毘闍耶比丘尼知是惡魔波旬以偈答曰以意樂色聲香味觸五法我悉還與汝此等非我須危脆易破碎對此污穢身我唯恥厭惡拔除愛欲根上色界眾生行無色眾生此眾善獲得我悉除迷闇六時惡魔波旬苦惱以毘闍耶比丘尼已知我萎身隱沒其身形五第五蓮華色一舍衛城因緣時蓮華色比丘尼清晨入舍衛城乞食乃至立於開美華之沙羅樹下二時惡魔波旬欲令蓮華色比丘尼生恐怖毛髮豎立以棄禪定而詣蓮華色比丘尼處三詣已以偈語蓮華色比丘尼曰上下開美華來沙羅樹下汝唯一人立汝美無倫比愚人之汝心不懼惡者否四時蓮華色比丘尼生如是思惟語此偈者是人非人耶五時蓮華色比丘尼生如是思惟此惡魔波旬乃至語偈六時蓮華色比丘尼知是惡魔波旬以偈答惡魔波旬曰心惡如汝者百千來於此不動我一毛我一不怖汝惡魔我於此沒形入汝之腹中或立汝眉間汝不得見我比丘尼我心得自在善修如意足解脫諸結縛我實不怖汝七時惡魔波旬苦惱以蓮華色比丘尼已知我萎身隱沒其身形六第六遮羅一舍衛城因緣時遮羅比丘尼清晨入舍衛城乞食乃至為日住而坐樹下二時惡魔波旬詣遮羅比丘尼處詣已謂遮羅比丘尼曰比丘尼汝不喜者何友我不喜生何故不喜生生者乃受用樂欲誰以此教汝比丘尼不喜生三比丘尼有生者有死生即見苦惱縛殺其他禍是故不樂生佛陀施說法以導超此生捨離一切苦我入於真實上色界眾生往無色眾生是故不知滅以是為再來四時惡魔波旬苦惱以遮羅比丘尼已知我萎身隱沒其身形七第七優波遮羅一爾時世尊住舍衛城二時優波遮羅比丘尼清晨入舍衛乞食乃至為日住坐於樹下惡魔波旬如是謂優波遮羅比丘尼曰比丘尼汝欲生於何處三友我不欲生於何處四惡魔三三炎摩天或是兜率天或是化樂天他化自在天願心以向此當得受此樂五比丘尼三三炎摩天或是兜率天或是化樂天他化自在天此等愛欲縛再行魔領域世間一切燃世間一切煙世間悉吐炎世間悉震動不震不動處凡常人不到非惡魔行處於此我心樂六時惡魔波旬乃至苦惱萎身隱沒其身形八第八尸須波遮羅一爾時世尊住舍衛城時尸須波遮羅比丘尼清晨入舍衛城乞食乃至為日住坐於樹下二時惡魔波旬詣尸須波遮羅比丘尼處詣已謂尸須波遮羅比丘尼曰比丘尼汝喜誰之教見三友我不喜任何人之教見四惡魔汝依誰圓頂成如此尼耶不喜教見者是如何之愚五比丘尼佛外之教見異見諸纏縛我不喜此法正法彼不知生於釋種家證悟無比人總服拂惡魔何處無不破無執悉解脫有眼見一切滅盡一切業解脫盡諸依我師彼世尊其教我歡喜六時惡魔波旬乃至隱沒其身形九第九世羅一爾時世尊住舍衛城時世羅比丘尼清晨入舍衛城乞食乃至為日住坐於樹下二時惡魔波旬欲令世羅比丘尼生恐怖乃至以偈語世羅比丘尼曰誰作此身體作者於何處何處生身體何處身體滅三時世羅比丘尼生如是思惟唱此偈者是人非人耶四時世羅比丘尼生如是思惟此惡魔波旬欲令我生恐怖毛髮豎立以棄禪定而唱此偈五時世羅比丘尼知是惡魔波旬以偈答惡魔波旬曰此身非自作亦非於他作依於因而生依於因而滅猶如諸種子移植於田園地味及溫味依二萌芽出是五蘊四大及此等六處依於因而生因壞即消滅六時惡魔波旬苦惱以世羅比丘尼已知我萎身隱沒其身形十第十金剛一爾時世尊住舍衛城時金剛比丘尼清晨著衣持鉢入舍衛城乞食於舍衛城乞食後收鉢為日住而至暗林入暗林已為日住坐於樹下二時惡魔波旬欲令金剛比丘尼生恐怖毛髮豎立以棄禪定而詣金剛比丘尼處詣已以偈謂金剛比丘尼曰誰作此眾生作者於何處何處生眾生何處眾生滅三時金剛比丘尼生如是思惟唱此偈者是人非人耶四時金剛比丘尼生如是思惟此惡魔波旬欲令我生恐怖毛髮豎立以棄禪定而唱此偈五時金剛比丘尼知是惡魔波旬以偈答惡魔波旬曰汝何言眾生汝行於魔見此唯聚諸行眾生不可得猶如諸支集而起車之名因於有五蘊而有眾生名有起是苦惱停滅且苦惱苦惱外不生苦惱外不滅六時惡魔波旬苦惱以金剛比丘尼已知我萎身隱沒其身形此嗢陀南由阿羅毘迦蘇摩瞿曇彌與具毘闍耶蓮華色遮羅至優波遮羅尸須波遮羅世羅及金剛依是成為十
