body:
  text: 相應部經典歸命彼世尊應供等覺者有偈篇第一諸天相應第一葦品一瀑流一如是我聞爾時世尊住舍衛城祇樹給孤獨園二爾時有天神於黎明放其殊勝妙光徧照祇園詣世尊處詣已敬禮世尊立於一面三立一面已彼天神白世尊曰友卿如何度瀑流耶世尊曰友我不住不求以度瀑流友卿如何不住不求以度瀑流耶世尊曰友我住時沈求時溺友我如是不住不求以度瀑流四不住與不求度世間執著涅槃婆羅門久久我見知五彼天神作如是言得大師嘉賞認證天神知得大師認證敬禮世尊右繞而去二解脫一爾時世尊舍衛城二時有天神於黎明放其殊勝妙光徧照祇園詣世尊之處詣已禮敬世尊立於一面三立於一面之天神白世尊友卿知眾生之解脫令解脫遠離耶世尊曰友我知眾生之解脫令解脫遠離天神曰友卿如何知眾生之解脫令解脫遠離耶四世尊有喜之滅盡亦盡想與識受滅皆寂靜友我之如是知眾生解脫令解脫遠離三引導者一立於一面之天神於世尊面前而唱偈曰生導死壽短導老無庇獲觀死此恐怖齎樂積功德二世尊生導死壽短導老無庇獲觀死此恐怖棄欲希寂靜四時乃過去一立於一面之天神於世尊面前而唱偈曰時過日夜移青春棄我等觀死此恐怖齎樂積功德二世尊時過日夜移青春棄我等觀死此恐怖棄欲希寂靜五幾何斷一立於一面之天神於世尊面前而唱偈曰幾斷幾何棄且更修幾何超越幾何結稱度瀑流僧二世尊五斷與五棄上修五無漏超越五種結稱渡瀑流僧六不眠一立於一面之天神於世尊前而唱偈曰他醒幾何眠他眠幾何醒染塵依幾何依幾何得清二世尊他醒於五眠他眠於五醒染塵依於五依五而得清七不了知一立於一面之天神於世尊前而唱偈曰因法不了知引入於異教此人眠不醒今正彼醒時二世尊因以了知法不入於異教彼等正證知以平行不平八迷亂一立於一面之天神於世尊前而唱偈曰以迷於法故引入於異教深眠彼不醒今正彼醒時二世尊因以不迷法不入於異教彼等正證知以平行不平九慢之欲一立於一面之天神於世尊前而唱偈曰欲慢無調順不靜心無寂獨林住放逸無越死魔岸二世尊去慢心寂靜智慧悉解縛獨住不放逸可度死魔岸一住森林一立於一面之天神於世尊面前而唱偈曰住於森林者寂靜清淨行日唯取一食如何悅顏色二世尊不悲過去事未來勿憧憬若持身現在顏色即朗悅憧憬於未來悲於過去事諸愚之為此如刈綠葦萎此嗢陀南導解脫瀑流時過斷幾何不眠不了知迷亂與慢欲第十謂林住依此有品名第二歡喜園品一一歡喜園一如是我聞爾時世尊住舍衛城祇樹給孤獨園二於此世尊以比丘等言諸比丘世尊彼等諸比丘奉答世尊世尊如是宣說諸比丘昔有屬於三十三天之天神於歡喜園為天女群侍隨圍繞給與五欲具足爾時唱此偈曰享譽三三天天神之住家如非見此園不知此快樂三諸比丘如是說已有天神以偈答彼天神曰汝為愚癡者不知如來語諸行實無常乃是生滅性生者必有滅寂此正悅樂一二歡喜一立於一面之天神於世尊面前而唱偈曰有子依子喜牛主依牛喜人喜依四依無依即無喜二世尊有子依子悲牛主依牛悲人悲依於依無依即無悲一三無有如子者一立於一面之天神於世尊前而唱偈曰可愛莫若子致富莫若牛光明莫若陽海為最上湖二世尊可愛莫若己致富莫若穀光明莫若慧雨為最上湖一四剎帝利一天神剎利兩足尊四足牡牛勝妻中貴姓勝子中長子勝二世尊正覺兩足尊良駿四足勝柔順為賢妻孝順子最勝一五大林鳴寂靜身一天神麗日正盛時鳥停不飛動以鳴於大林恐怖以襲我二世尊麗日正盛時鳥停不飛動於是大林鳴其樂現於我一六睡眠懶惰一天神沈睡懶欠呿飽食氣塞臉為是諸人眾聖道不顯現二世尊睡眠惰欠呿過食阻塞氣精進以拂此聖道即自清一七難為龜一天神無智沙門行難為並難忍愚者墮障礙於此人最多若不制伏心幾日沙門行思念之為囚步步當沈溺二世尊如龜以己殼藏頭尾手足比丘攝意念無著無害他以離於煩惱誰亦不得貶一八慚一天神誰於此世間有慚止惡者如鞭影駿馬彼悟離非難二世尊有慚制止惡常行正念少達苦之邊際以平行不平一九茅屋一天神卿有茅屋否如何無有巢如何無繼系如何脫繫縛二世尊我實無茅屋於我實無巢我實無繼系我實脫繫縛三天神何謂汝茅屋何謂汝之巢何謂汝繼系何知汝繫縛四世尊汝以母謂屋以妻謂巢窟言子為繼系我云渴愛縛五天神善哉卿無屋善哉無巢窟善哉無繼系善哉卿脫縛二三彌提一如是我聞爾時世尊住王舍城溫泉精舍二爾時尊者三彌提為洗浴身體黎明即起來至溫泉溫泉洗身已起身著一衣站立以待身乾三爾時有天神於夜將曉以其勝光徧照溫泉林而往詣尊者處詣已立於空中以偈告尊者三彌提曰天神比丘不享樂精進以行乞比丘行享樂享樂勿行乞青春盛壯時勿為徒空費尊者汝時我不知為時無隱顯如是之故我行乞不享樂時之以捨我是即為畏怖四爾時天神降立於地上言尊者三彌提曰比丘汝具青少年壯膚美髮黑摒棄人生最盛期之欲樂而出家比丘享樂人之五欲勿捨現實樂勿逐時要之物五友我捨現實樂不逐時要物友何以故世尊宣說時要之欲樂不安苦多於此有大禍此聖法乃現實非隔時得言來看可導涅槃智者應自證知六比丘如何世尊宣說時要之欲樂苦多不安於此有大禍此聖法是現實非隔時得言來看可導涅槃智者應自證知耶七友我乃出家未久是新學人初參者不能廣說此法與律彼世尊應供正等覺者今住溫泉精舍此義詣問彼世尊尚請汝如世尊所說受持八比丘彼世尊有大威力為諸天所圍繞我等不易親近比丘汝若以此義詣問世尊我等為聽法應得親近九尊者三彌提答其天神友唯諾即詣世尊住處詣已禮敬世尊坐於一面坐於一面之尊者三彌提敬白世尊曰一世尊我為洗浴身體黎明即起去至溫泉於溫泉洗身已起身出著一衣站立以待身乾世尊爾時有天神於夜將曉以其勝光徧照溫泉林來立於空中以偈語我曰比丘不享樂精進以行乞比丘行享樂享樂勿行乞青春盛壯時勿為徒空費一一世尊如是言已我以偈答天神曰汝時我不知為時無隱顯如是之故我行乞不享樂摒捨時之我是即為恐怖一二世尊爾時天神降立於地上以此言我曰比丘汝具青少年壯膚美髮黑勿樂人生最盛期之欲樂而出家比丘享樂人之五欲勿捨現實樂勿逐時要物一三世尊如是言已我如是言天神曰友我捨現實樂不逐時要物友我捨時要物以逐現實樂友何以故世尊宣說時要之欲樂不安苦多於此有大禍此聖法乃現實不隔時得言來看可導涅槃智者應自證知一四世尊言已天神如是言我曰比丘如何世尊宣說樂欲是時要之物不安苦多於此有大禍此聖法是現實非隔時得言來看可導涅槃智者應自證知耶一五世尊如是言已我語天神曰友我出家未久是新學人初參者不能廣說此法與律彼世尊應供正等覺者今住溫泉精舍此義詣問彼世尊尚請汝如世尊所說受持一六世尊如是說已天神語我曰比丘彼世尊有大威力為諸天所圍繞我等不易親近比丘汝若以此義詣問世尊我等為聽法應得親近世尊其天神之語若為真實其天神當不遠一七如是言已天神語尊者三彌提曰比丘問比丘等問我來矣一八爾時世尊以偈語天神曰知名表面者唯執是顯名不知名真義死魔繫縛去了知名真義不思語說者其人不如此依此人無罪如果汝夜叉知如是人言一九不然世尊我不知所略說之意義善哉世尊得請說世尊所略說者令我能得廣知其義耶二我勝等或劣人思依此爭此等三種別若心不動者其人無勝劣如果汝夜叉知如是人言二一不然世尊我不知世尊所略說之義善哉世尊得請說世尊所略說者令我能得廣知其義耶二二拂思勿行慢斷世名色愛不動絕結縛無欲之彼者後世於天界於所有住處雖求人天跡亦無有所得如果汝夜叉知如是人言二三世尊我如是知世尊廣宣所略說之意義於所有世界依語與心身勿為惡業行離欲正念心無有伴利者即無受痛苦此嗢陀南歡喜園歡喜無有如子者剎利大林鳴睡眠懶作難慚與第九屋十云三彌提第三劍品二一第一依劍一舍衛城因緣二立於一面之天神於世尊前唱此偈曰天神如依劍所觸猶燃頭髮時比丘捨欲貪正念於出家三世尊猶如觸於劍猶燃頭髮時捨身見比丘正念於出家二二第二觸一天神不觸者無觸觸故應有觸故無污惡者於觸故而觸二世尊清淨無污惡以污無垢者其惡返愚人如同於逆風撒布微細塵二三第三纏縺一天神內外之纏縺人人纏纏縺奉敬向瞿曇誰離此纏縺二世尊住戒智慧人修心及智慧熱誠慎比丘彼離此纏縺遠離貪與瞋乃至於無明漏盡阿羅漢解脫此纏縺消滅名與色障想及色想無所殘餘者此總斷纏縺二四第四制止心一天神心所制止者不行心苦事若總制止心心脫一切苦二世尊非總制止心非制自制心正於起惡處應制此之心二五第五阿羅漢一天神完了應所為漏盡最後身阿羅漢比丘猶言如我語人人語我物應如是言乎二世尊完了應所為漏盡最後身阿羅漢比丘猶言如我語人人語我物雖然如是言世稱巧知者唯依慣例稱三天神完了應所為漏盡最後身阿羅漢比丘彼依於我慢猶言如我語人人語我物四世尊皆捨我慢鎖盡除不存在超謬想賢者猶言如我語人人語我物此世巧稱呼唯依慣例稱二六第六光明一天神世有幾何光普照此世間我等問世尊如何可得知二世尊世有四種光此無第五光於晝太陽光於夜月普照時有日夜火彼此皆遍照正覺最勝火此為無上光二七第七流一天神流何處不流渦於何處止名色何處滅無有餘殘留二世尊地水與火風四大之滅處由此流不流於此止渦流於此滅名色無有餘殘留二八第八大富一天神有大富大財領國剎帝利勿飽於愛欲互為貪嫉妒此等嫉妒性隨有流中流誰於世無嫉以捨貪渴愛二世尊捨家以出家財子可愛捨以捨貪與瞋以及離無明漏盡阿羅漢彼等於此世成為無嫉者二九第九四輪一天神四輪九門孔污穢滿貪欲乃是不淨性大雄從如何有此之出口二世尊以斷惡欲貪乃至繩與綱拔除渴愛根如是有出口三第十麋鹿之縛一天神如麋鹿之縛悠悠而柔順食少不貪味猶如獅子象雄雄之獨行不欲於愛欲我等來請問脫苦應如何二世尊世間有五欲意示為第六於此離欲愛如是苦解脫此嗢陀南依劍之所觸制止心纏縺阿羅漢光明流乃至大富第九於四輪麋鹿縛第十第四沙睹羅巴天群品三一第一與善人為伴一如是我聞爾時世尊住舍衛城祇樹給孤獨園二爾時甚多沙睹羅巴天群其勝光徧照祇園於黎明往詣世尊處詣已禮敬世尊立於一面三立於一面之一天神於世尊前而唱此偈曰唯與善人坐唯與善人交知善之正法為善不為惡四爾時其他天神於世尊前亦唱此偈曰唯與善人坐唯與善人交知善之正法依他不能得而得之智慧五爾時其他之天神於世尊前亦唱此偈曰唯與善人坐唯與善人交知善之正法悲中無有悲六爾時其他之天神於世尊前亦唱此偈曰唯與善人坐唯與善人交知善之正法輝耀親族中七爾時其他之天神於世尊前亦唱此偈曰唯與善人坐唯與善人交知善之正法人人行善趣八爾時其他之天神於世尊前亦唱此偈曰唯與善人坐唯與善人交知善之正法人人有幸福九爾時其他之天神以此向世尊曰世尊誰之偈為善說耶世尊曰依汝等各各之善說然則亦聞我偈唯與善人坐唯與善人交知善之正法當脫一切苦三二第二慳貪一爾時世尊住舍衛城祇樹給孤獨園二爾時甚多沙睹羅巴天神等其勝光徧照祇園於黎明往詣世尊處詣已禮敬世尊立於一面三立於一面之一天神於世尊前唱此偈曰依慳貪放逸如是不布施因明知其果由欲功德者而行於布施四爾時其他之天神於世尊前唱此偈曰慳貪畏布施畏彼不施與慳貪所恐怖乃是飢與渴愚人此世後必然以觸此是故滅慳貪布施勝垢穢功德實人人後世之淺渡五爾時其他之天神於世尊前唱此偈曰善導曠野旅分與貧困者滅中有不滅此為永久法有人與貧困或人富不與施與貧困者功德計千倍六爾時其他之天神於世尊前唱此偈曰難與而與之難為而為者不善人難慣從善人法難是故善與惡後世趣所異惡人行地獄善人趣天堂七爾時其他之天神以此向世尊曰世尊誰之偈為善說耶世尊曰依汝等各各皆善說然則以聞我偈雖以拾落穗為生與養妻貧困以行施是行善業法雖千之供犧百千之供犧斯施猶不值十六分之一八爾時其他之天神向世尊說此偈曰如何豐供犧不值於正施千之供犧者百千之供犧此犧何不值十六分之一九爾時世尊以偈語其天神曰或人之錯誤立施於三業傷殺又惱施淚污殺害施不值於正施雖此千供犧百千之供犧斯施猶不值十六分之一三三第三善哉一爾時世尊住舍衛城二爾時沙睹羅巴天神等其勝光徧照祇園黎明往詣世尊住處詣已禮敬世尊立於一面三立於一面之天神於世尊前唱此歡喜偈曰友善哉布施慳貪與放逸如是不行施由知以明果欲為功德者而行於布施四爾時其他之天神於世尊前唱此歡喜偈曰善哉行布施善哉貧困施或人貧亦施或富不好施貧困之施與功德計千倍五爾時其他之天神於世尊前唱此歡喜偈曰善哉行布施貧困施善哉依信施亦善布施戰同謂如少數善人以勝於多數若貧依信施利他人安樂六爾時其他之天神於世尊前唱此歡喜偈曰友善哉布施貧困施善哉依信施亦善如法施亦善精進於如法以得布施者以越夜摩界衛多羅尼川而往於天界七爾時其他之天神於世尊前唱此歡喜偈曰善哉行布施貧困施善哉依信施亦善如法施亦善辨別施亦善辨別之施者善逝所讚歎此世值供養行施有大果猶善田蒔種八爾時其他之天神於世尊前唱此歡喜偈曰善哉行布施貧困施亦善依信施亦善如法施亦善辨別施亦善自制於有生不害有生者善哉求生活懼人之責難以致不為惡如是讚懼者責不懼勇者善人懼責難以不為惡事九爾時其他之天神以此向世尊曰世尊誰之偈為善說耶世尊曰依汝等各各皆善說然則且聞我歡喜偈依信之布施被受種種譽法句施尤勝其以前之世過去世善人有智慧諸人皆行於涅槃三四第四非然一爾時世尊住舍衛城祇樹給孤獨園二爾時甚多沙睹羅巴天神等其勝光徧照祇園於黎明往詣世尊住處詣已禮敬世尊立於一面三立於一面之天神於世尊前唱此偈曰人人中愛欲乃非是常住於此有愛樂人人被繫縛於此以放逸而無作歸來人人死魔領如是不歸來禍從欲望生苦惱從欲生以調伏欲望是則禍調伏若已調伏禍則調伏苦惱世之諸對象乃非是愛欲於貪之思念此人之愛欲於世諸對象依舊猶留存於此之賢者乃調伏欲望離忿及捨慢超越一切縛不執著名色斯人無何物亦無陷入苦除念不行慢於此斷名色乃至於渴愛斷結離煩惱乃至無欲心斯人此世後於人與天界及一切住處無須求其跡四尊者摩加拉奢如是問此世及後世若天與人共不見解脫人以敬仰禮拜拜無上利行亦讚彼等否五世尊呼摩加拉奢尊者而予回答比丘若禮拜如是解脫人亦應讚彼等若知法離疑比丘彼等亦超越結縛人三五第五嫌責天一爾時世尊住舍衛城祇樹給孤獨園二爾時甚多嫌責天神等其勝光徧照祇園於黎明往詣世尊住處詣已立於空中三立於空中之一天神於世尊前唱此偈曰非如有自己異而誇示人如賭博詐術其人所受用皆依於偷盜以語之所行勿語虛無為雖語不為者賢者以知此四世尊唯語此道跡只是於聽聞不能隨之行此道跡堅固賢者依道跡以修於禪定解脫魔之縛賢者知世法如不云不作賢者依智慧而入於涅槃以度世執著五爾時彼天神等下來立於地上頭面頂禮世尊足向世尊言世尊是我等之罪是我等之過恰如愚者迷者不善者我等想可如是責難世尊否願世尊饒恕我等之罪為未來不再犯六時世尊微笑七時彼天神等更怒而昇空八一天神於世尊前唱此偈曰我等以謝罪而不受饒恕內蓄恚怒重其人更結怨若無有罪過豈有此過失怨恚若不靜於此何有善誰無有罪過誰無有過失誰不隨失念誰賢常正念九世尊憐愍諸有情於如來覺者無有諸罪過亦無有過失失念佛不墮彼賢常正念雖然以謝罪不得受寬恕內蓄恚怒重其人更結怨若我不喜恚即納汝罪過三六第六信一爾時世尊住舍衛城祇樹給孤獨園二爾時甚多沙睹羅巴天神等其勝光徧照祇園黎明往詣世尊處詣已禮敬世尊立於一面三立於一面之一天神於世尊前喝此偈曰信仰人之侶若人不無信而在於此世有譽及稱讚死後生天界四天神捨慢離忿恨超越一切縛不執名色者無何所結縛魯鈍無智慧人人耽放逸如護最勝富賢守不放逸莫耽於放逸莫交愛欲樂禪思不放逸以達最勝樂三七第七會一如是我聞爾時世尊與諸阿羅漢之五百比丘共住於釋迦族迦毘羅城之大林十世界之多數諸天亦為謁見世尊及比丘眾而會集二爾時四淨居之諸天如是思念今世尊與諸阿羅漢之五百比丘共住於釋迦族迦毘羅城之大林十世界之多數諸天為謁見世尊及比丘眾而會集我等亦詣世尊之處詣已於世尊前各唱其偈三如是彼等諸天恰如有力人之伸屈臂腕屈伸臂腕如是沒於淨居天現於世尊處四爾時彼等諸天禮敬世尊立於一面立於一面之一天神於世尊前唱偈曰林中大集會天眾共會集見無敗僧伽我等亦來赴此法之集會五爾時其他之天神於世尊前唱此偈曰於此比丘等自心靜且直如御執手綱賢者守諸根六爾時其他之天神於世尊前唱此偈曰割柱碎閂銓除柵離貪欲有眼者清淨不污於遊行善調若幼象七爾時其他之天神唱此偈曰誰歸命於佛不墮於惡趣此人以捨身應滿於天集三八第八岩石之破片一如是我聞爾時世尊住王舍城摩達屈支之鹿野苑二爾時世尊之足為岩石破片所傷世尊甚感痛楚身之所受非常強烈心中頗有不快世尊以正心正念之忍耐而不為之所惱三時世尊將僧伽梨疊為四重正心正念兩足相疊以作右脇師子臥四時七百沙睹羅巴天神等夜中往詣世尊處其勝光徧照摩達屈支詣已禮敬世尊立於一面五立於一面之一天神於世尊前發此歡喜語曰沙門瞿曇實是龍象不為所生起之強烈苦痛不愉之身苦所惱正心正念得堪忍是為依其龍象之性六時其他之天神於世尊前發此歡喜語曰沙門瞿曇實是師子不為所生起之強烈苦痛不愉之身苦所惱正心正念得堪忍是依其師子之性七時其他之天神於世尊前發此歡喜語曰沙門瞿曇實是良駿不為所生起之強烈苦痛不愉之身苦所惱正心正念得堪忍是依其良駿之性八時其他之天神於世尊前發此歡喜語曰沙門瞿曇實是牡牛不為所生起之強烈苦痛不愉之身苦所惱正心正念得堪忍是依其牡牛之性九時其他之天神於世尊前發此歡喜語曰沙門瞿曇實是忍耐強牛不為所生起之強烈苦痛不愉之身苦所惱正心正念得堪忍是依其忍耐強牛之性一時其他之天神於世尊前發此歡喜語曰沙門瞿曇是調馴不為所生起之強烈苦痛不愉之身苦所惱正心正念得堪忍是依此調馴之性一一時其他之天神於世尊前發此歡喜語曰善修三昧與見解脫心不躍上不沈下於有行發而非抑其行制伏煩惱如是人中之龍象人中之師子人中之良駿人中之牡牛人中之忍耐強牛人中之調馴者有人若想侵害是人中之調順者彼何以非無智耶人於百歲間學習五吠陀精修嚴苦行婆羅門行人彼等之心行乃非正解脫彼等其性劣不得達彼岸渴愛之所囚禁戒之所縛百年雖強烈以修嚴苦行彼等之心行乃非正解脫彼等其性劣不得達彼岸於此不調馴憍慢與愛欲不使心靜者不得有寂默雖獨住森林亦行於放逸於死魔領域不得度彼岸以捨憍慢行令心善寂靜諸行皆清淨由是得解脫單獨住森林不行於放逸渡脫死魔域可到達彼岸三九第九雲天公主其一一如是我聞爾時世尊住毘舍離之大重閣講堂二時雲天之紅蓮公主其勝光徧照大林於黎明往詣世尊處詣已禮敬世尊立於一面三立於一面彼雲天之紅蓮公主於世尊前唱此偈曰住毘舍離林眾生之上首無上正覺者我雲天公主紅蓮恭禮奉有眼者之證此法我先聞我今眼當知善逝牟尼說不論任何人以謗此聖法閑蕩之愚人墮叫喚地獄長劫受痛苦不論任何者寂靜與忍辱近此聖法人以捨此身時應滿天之集四第十雲天公主其二一如是我聞爾時世尊住毘舍離之大林重閣講堂二時雲天公主小紅蓮於黎明時其勝光徧照大林詣世尊處詣已禮敬世尊立於一面三立於一面之雲天公主小紅蓮於世尊前唱此偈曰色鮮之電光我雲天公主紅蓮來至此禮敬佛與法奉說有益偈如此之聖法種種之方法雖以如何多於分別而說只要我有心略說此意義即使身口意而在於此世不作一切惡以離於愛欲於正心正念不受無利益之一切苦惱此嗢陀南與善人相處慳貪與善哉否則嫌責天信會岩破片以及雙雲天紅蓮之公主第五燃燒品四一第一正在燒一如是我聞爾時世尊住舍衛城祇樹給孤獨園二時有天神於黎明時其勝光徧照祇園往詣世尊處詣已禮敬世尊立於一面三立於一面之天神於世尊前唱此偈曰四由火燄燃家搬出諸物品惟只於此家是善不為燒如是於此世老死火熾燒布施而搬出施者為搬出施乃得樂果不施無此果依盜王者奪被火燒消滅如是富此身死時無不捨賢者以知此享富且善施從力用且施行天無難責四二第二以與何一天神與何與力耶與何美貌耶與何安樂耶與何與眼耶與何一切耶問之對我說二世尊與食物與力與衣與美貌與車乘與樂與燈明與眼與住處人者是為與一切教與正法者是與不死人四三第三食一天神不論天及人皆以食為樂時有不喜食夜叉實何者二世尊以信清淨心行施食之人此世及後世皆可得其食是故調伏慳善施克眼垢功德即人人後世航渡頭四四第四一根一天神僅此有一根無明亦復有二面斷常亦有三種垢三毒復有五地場五欲其本十二渦十二處大海不滿足有地窖地獄聖者得超越四五第五完人一天神其名無有缺而於見秘義若以施智慧不著愛欲家知一切賢者以行於聖道即得見大聖四六第六天女一天神天女所侍者如事吸血鬼此名愚癡林如何得出口二世尊此道稱真直此地稱無怖車稱無轢聲具足斯法輪慚為依靠臺正念是帷帳以法我稱御正見是先行如是乘車人是女或是男依於此車乘到達於涅槃四七第七植林一天神任何人功德日夜常增長具戒止住法誰亦往天界二世尊植園以植林以是作橋梁以掘飲水井作水小屋者其人之功德日夜必增長法住戒具足是人行天界四八第八祇園一天神此乃彼祇園聖僧伽住處法王請住此思之我生喜善意智明戒法定及正命依此人清淨又依氏姓富非得於清淨是故賢智者以思自己利並思擇正法如是其清淨依於戒智慧乃至於寂靜猶如舍利弗比丘到彼岸應當是最勝四九第九慳貪一天神此世有慳貪吝嗇不與施詈退求乞者雖是他人施亦為阻礙者其人此世後結果應如何來此問世尊我等於如何應以知此耶二世尊此世有慳貪吝嗇不與施詈退求乞者雖是他人與亦為阻礙者此人人乃生於地獄畜生夜摩之世界雖即來人界當生貧窮家於此難獲得衣食遊享樂彼等愚人望難獲浮世樂此世有此果未來墮惡道三天神我等知是說更另問瞿曇此世得人身慈深離慳貪歡喜信世尊深敬法與僧此人此世後結果有如何今來問世尊我等應何知四世尊此世得人身慈深離慳貪歡喜信世尊深敬法與僧此諸人之生光輝徧天界若使來人間當生富貴家於此則易獲衣食遊享樂未來他所蓄自由樂享用此世有此果未來生天界五第十陶師一陶師比丘解脫有七人而上生達無煩天欲貪瞋恚滅無餘並超世間之愛著難超死魔之領域誰是超越泥地者此世捨此人身後亦離天軛者是誰優波迦波羅犍陀弗久左底為第三跋提耶犍陀提婆婆睺羅祇頻祇耶此等諸人捨人身亦是離於天軛人二世尊逃惡魔係蹄言之何微妙彼等知誰法斷除有結縛三陶師無外世尊法無外世尊教彼等知其法斷除有結縛於此名與色滅盡無有餘此世知其法彼斷有結縛四世尊知難復悟難汝言深奧語汝知何人法以語如是言五陶師昔世我陶師於耶發鄰加街村作陶壺以事父與母迦葉如來世乃為優婆塞遠離於欲無欲修梵行我本同鄉者前為卿之友然而我正是解脫七比丘貪瞋滅無餘知超世愛者六世尊跋伽婆如汝所語有如是汝前為陶師於耶發鄰加街村作陶壺遠離於欲無欲修梵行我乃同鄉者以前實我友七積此高修習最後身二人邂逅昔故友真實乃如是此嗢陀南燃燒及與何一根及完人天女植林園慳貪是陶師第六老品五一第一老一天神老時善何物何者善安住何者為人寶何者盜不奪二世尊老時戒最善信仰善住處智慧乃人寶功德盜不奪五二第二依不老一天神何物不老善何者善基礎何者為人寶何者盜不搬二世尊戒善老平安信仰善基礎智慧乃人寶功德盜不搬五三第三友一天神何為旅人友何為自家友何為肇事友何為未來友二世尊商主遊人友母為自家友朋友事起時屢次皆為友自作功德者乃為未來友五四第四支持一天神何者人支持此世最上友生物依大地何精以育此二世尊子乃人支持妻為最上友生物依大地雨精以育此五五第五生因一一天神何物以生人人何奔迴走何者墮輪迴何者人大畏一世尊渴愛以生人人心奔迴走眾生墮輪迴苦惱人最畏五六第六生因二一天神何物以生人人何奔迴走何者墮輪迴依何不解脫二世尊渴愛以生人人心奔迴走眾生墮輪迴依苦不解脫五七第七生因三一天神何物以生人人何奔迴走何者墮輪迴何者人依怙二世尊渴愛以生人人心奔迴走眾生墮輪迴業為人依怙五八第八非道一天神何者謂非道何者盡日夜何為梵行垢無水何沐浴二世尊貪欲謂非道青春盡日夜女為梵行垢於此人執著苦行與梵行為無水沐浴五九第九伴一天神何者為人伴又以何教人又愛樂何物人脫眾苦惱二世尊信為人之伴智慧以教人愛樂涅槃者人脫眾苦惱六第十詩一天神何物偈頌因何為其標記偈頌依何物何物偈住家二世尊韻為偈頌因文字其標記偈頌依題名詩人此住家此嗢陀南依老不老友支持三生因非道以及伴此依詩人滿第七勝品六一第一名一天神何者勝一切無有勝此者以何之一法一切所從屬二世尊名為勝一切無有勝名者以名之一法一切所從屬六二第二心一天神世間依何導依何物所惱以何之一切一切所從屬二世尊世間依心導依心之所惱以心之一法一切所從屬六三第三渴愛以何之一法一切所從屬二世尊世間依愛導依渴愛所惱渴愛之一法一切所從屬六四第四結一天神世間依何縛世步是何物離卻何物者是名為涅槃二世尊世間依喜縛尋求世步脚離卻愛欲者是名為涅槃六五第五縛一天神世依何物縛世步是何物離卻何物者是斷一切縛二世尊世間依喜縛尋求世脚步離卻渴愛者是斷一切縛六六第六窘迫一天神世何所窘迫依何為覆蓋為鎗之所貫依何常灼燻二世尊世間死窘迫依老為覆蓋依愛投鎗串依欲常灼燻六七第七為繼一天神世間依何繼依何為覆蓋世間何禁閉何物上安立二世尊世依渴愛繼依衰老為覆為死所禁閉世立苦惱上六八第八禁閉一天神世為何禁閉安立何物上世間依何繼依何為覆蓋二世尊世為死閉禁世立苦惱上世依渴愛繼依衰老為覆六九第九欲望一天神世依何所縛依何伏解脫依離卻何物以斷一切縛二世尊世依欲望縛伏欲得解脫依離於欲望以斷一切縛七第十世間一天神何生世間生和合何物上世間依何物依何世間苦二世尊六生世間生和合於六上依六而執著於六世間苦此嗢陀南名心與渴愛是為結與縛窘迫繼禁閉欲世等為十第八斷品七一第一殺一立於一面之天神以偈向世尊曰殺何樂寢臥殺何而不悲殺害何一法瞿曇卿稱讚二世尊殺忿樂寢臥殺忿為不悲諸天以毒根而為最上蜜聖讚忿殺害殺而不悲傷七二第二車一天神何物車相標何為火相標何為國相標何為婦相標二世尊幡乃車相標煙乃火相標王乃國相標夫乃婦相標七三第三富一天神人於此世間何為最勝富善修何種事能帶來安樂何物之果實其味為最上如何之生活為生活最勝二世尊信在此世間乃人最勝富若修諸善法帶來安與樂真實乃果實是最上美味智慧之生活謂生活最勝七四第四雨一天神何物生最上何物降最上運步何最上語者何最上二他神種子生最上雨乃降最上牝牛步最上子語中最勝三世尊明乃生最上無明降最上僧伽步為最佛陀語為最七五第五恐怖一天神道實種種說何多恐此世具大智慧者瞿曇我請問以立於何者人不恐此世二世尊正確語與意以身不為惡若於富裕家有信有柔和善辨仁慈深立此之四法此世不恐怖七六第六不老一天神何老何不老何者云非道何者障礙法何者盡日夜何者穢梵行何者無水浴世有幾多穴心意不停滯我等來問佛我等以何知二世尊色體乃衰老人姓氏不老貪欲云非道慳貪障礙法青春盡日夜女人穢梵行人人執著此苦行與梵行乃無水沐浴世有六孔穴心不得滯此懶惰與放逸不勤不抑制耽睡眠怠慢應離此一切七七第七主一天神何為世間主何為最上器何為劍之銹此世何作獄何物拒持離何者好持離何者屢屢來賢者得歡喜二世尊勢力世間主女人最上器忿為世劍銹盜賊於此世以作苦地獄盜賊拒持離沙門好持離沙門屢屢來賢者乃歡喜七八第八欲愛一天神追求利益者以何不得與人何不施捨應放何之善不應放何惡二世尊人追求利益不以與自己自己不施捨應放善良語不得放惡語七九第九食糧一天神何者包糧食何為富住家何者令人苦何者世難捨猶如鳥縛蹄凡人何物縛二世尊信仰包糧食吉祥富住家欲望令人苦世捨欲望難猶如縛蹄鳥凡人欲望縛八第十光炎一天神於世何光炎於世何不眠何為共同者何為威儀路猶如母養子何者養怠慢亦養精進者以何者之精以養於地上倚著之生物二世尊智慧世光炎正念世不眠牛乃共事者畦乃威儀路猶如母養子雨養怠慢者亦養精進人乃以雨之精養育於地上倚著之生物八一第十一無諍一天神此世誰無諍誰生活不滅誰遍知欲望常為自由人如是立己道父母兄弟禮其生雖卑賤以受剎帝利所尊敬者誰二世尊沙門世無諍沙門生不滅沙門知欲望常為自由人沙門立己道父母兄弟禮其生雖卑賤剎帝利尊敬此嗢陀南殺之車與富雨怖與不老主欲愛糧食光炎及無諍
