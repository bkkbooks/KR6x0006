body:
  text: 第七婆羅門相應第一阿羅漢品一第一陀然闍仁一如是我聞爾時世尊住王舍城竹林栗鼠養餌所二其時有婆羅墮婆闍姓之婆羅門妻名陀然闍仁信樂佛法僧三時陀然闍仁將近於運食與婆羅墮婆闍姓之婆羅門發三次之歡喜語歸命彼世尊應供正等覺者乃至歸命彼世尊應供正等覺者四如是言已婆羅墮婆闍姓之婆羅門以此謂陀然闍仁曰此賣女不論何時常語彼禿頭沙門之功德賣女今我應論破汝師五否也婆羅門包含世界於天界魔界梵天界包含沙門婆羅門人天之衆中不見得能論破我彼世尊應供正等覺者然則汝婆羅門去去即當自知六時婆羅墮婆闍之婆羅門忿怒不喜而詣世尊處詣已與世尊相致問交談而坐一面七坐一面之婆羅墮婆闍姓婆羅門以偈言世尊曰殺何物樂寢殺何物不悲殺害何一法瞿曇卿讚歎八世尊殺忿是樂寢殺忿無有悲婆羅門毒根以為最上蜜忿怒之殺害聖者是讚賞如是之殺法其殺無有悲九如是言已婆羅墮婆闍姓之婆羅門以此白世尊曰瞿曇是最勝瞿曇是最勝瞿曇猶如令倒者起覆者顯露示迷者以道如有眼者得見物形如暗中之燈明如是瞿曇請說種種法我歸命世尊瞿曇法僧伽我得於世尊瞿曇之處出家及具足戒一婆羅墮婆闍姓之婆羅門得於世尊之處出家及具足戒一一得具足戒不久尊者婆羅墮婆闍單獨隱棲不放逸虔誠精勤而住彼正是良家之子為成就無上梵行由家出無家而出家於現法得入自知自證知生已盡梵行已立所作已辦不受後有一二於此婆羅墮婆闍成為一阿羅漢二第二讒謗一爾時世尊住舍衛城竹林栗鼠養餌所二讒謗婆羅墮婆闍婆羅門聞婆羅墮婆闍婆羅門於沙門瞿曇之處由家出無家而出家三忿怒不喜來詣世尊處詣已以激烈惡語讒謗非難世尊四作如是言已世尊於此告讒謗婆羅墮婆闍婆羅門曰婆羅門汝如何思惟耶有朋友親戚骨肉者客等來造訪汝否五唯然瞿曇時常有朋友親戚骨肉者客等來造訪我六婆羅門汝如何思惟耶汝豫與彼等堅食軟食及美食否七唯然瞿曇我時常與彼等堅食軟食及美食八婆羅門若彼等不受者則將成為誰之物耶九瞿曇若彼等不受者彼等食物當屬我者一婆羅門如是汝讒謗不應讒謗我誹謗不應誹謗我非難不應非難我我不受汝之此等婆羅門彼則是汝之物讒謗返還其讒謗者誹謗返還其誹謗者非難返還其非難者婆羅門此謂主客共食共來往我不與汝共食共來往婆羅門此是汝物婆羅門此是汝物一一王與王臣今如是知尊者瞿曇沙門瞿曇是應供者然瞿曇亦將怒一二世尊無忿自調御是為正生活有正智解脫寂靜如是人忿由何處起以忿還忿者更為是惡事不以忿還忿戰得二勝利知他之所忿靜己正念人自及他兩方皆行於利益彼乃自與他兩方之醫師於法無知者以此為愚人一三如是言已讒謗婆羅墮婆闍婆羅門如是白世尊曰世尊是最勝乃至我今歸依世尊瞿曇法僧伽願於世尊瞿曇座下出家得具足戒一四讒謗婆羅墮婆闍婆羅門得於世尊之處出家及具足戒一五又尊者讒謗婆羅墮婆闍婆羅門得具足戒不久單獨隱棲不放逸虔誠精勤而住彼正是良家之子為成就梵行由家出無家而出家於現法得入自知自證知生已盡梵行已立所作已辦不受後有一六又此婆羅墮婆闍婆羅門為一阿羅漢三第三阿修羅王一爾時世尊住王舍城竹林栗鼠養餌所二阿修羅王婆羅墮婆闍婆羅門聞婆羅墮婆闍姓之婆羅門於沙門瞿曇之處由家出無家而出家三忿怒不喜來詣世尊處詣已以激烈不善之語讒謗誹謗世尊四如是言已世尊默然五時阿修羅王婆羅墮婆闍婆羅門以此白世尊曰沙門汝勝利沙門汝勝利六世尊口出粗惡語愚者以為勝然實勝利者乃知堪忍人以忿還忿者更為是惡事不以忿還忿戰得二勝利知他之所忿靜己正念人自及他兩方皆行於利益彼乃自及他兩方之醫師於法無知者以此為愚人七如是言已阿修羅王婆羅墮婆闍婆羅門以此言世尊曰世尊是最勝者世尊是最勝者乃至八又此尊者婆羅墮婆闍婆羅門成為一阿羅漢四第四毗蘭耆迦一爾時世尊住舍衛城竹林栗鼠養餌所二毗蘭耆迦婆羅墮婆闍婆羅門聞婆羅墮婆闍姓之婆羅門於沙門瞿曇座前由家出無家而出家三忿怒不喜來詣世尊處詣已默然而立一面四時世尊知毗蘭耆迦婆羅墮婆闍婆羅門心之所念以偈告毗蘭耆迦婆羅墮婆闍婆羅門曰清淨無穢惡以污無垢人惡還其愚人逆風撒細塵五如是言已毗蘭耆迦婆羅墮婆闍婆羅門以此白世尊曰世尊是最勝者世尊是最勝者我今歸依世尊瞿曇法僧伽願於世尊處得出家及具足戒乃至知生已盡梵行已立所作已辦不受後有六又此婆羅墮婆闍婆羅門成為一阿羅漢五第五不害一舍衛城因緣二時不害婆羅墮婆闍婆羅門來詣世尊處詣而與世尊互相致問坐於一面三坐一面之不害婆羅墮婆闍婆羅門以此白世尊曰瞿曇我是不害瞿曇我是不害四世尊若如其名者汝實為不害然而不害於身口以及心以不害他者始名實不害五如是言已不害婆羅墮婆闍婆羅門以此白世尊曰瞿曇是最勝者乃至六又此婆羅墮婆闍成為一阿羅漢六第六縈髻一舍衛城因緣二時縈髻婆羅墮婆闍婆羅門來詣世尊處詣而與世尊互相致問坐於一面三坐一面之縈髻婆羅墮婆闍婆羅門以偈白世尊曰內外之纏縺人人迷此纏奉問於瞿曇誰利此纏縺四世尊智慧人住戒以修心智慧熱心深慎者彼應離纏縺以離於貪著乃至瞋無明漏盡阿羅漢解脫於纏縺名之以及色障礙及色想無餘盡消滅此悉斷纏縺五如是言已縈髻婆羅墮婆闍婆羅門以此白世尊曰世尊是最勝者乃至六又其婆羅墮婆闍成為一阿羅漢七第七淨者一爾時世尊住舍衛城二時淨者婆羅墮婆闍婆羅門來詣世尊處詣而與世尊互相致問坐於一面三坐一面之淨者婆羅墮婆闍婆羅門於世尊處語此偈曰雖持戒苦行世間之如何婆羅門不清明行具足者唯此是清淨其外無淨者四世尊雖多唱馱咒埃滿內不淨外依於欺瞞非生婆羅門譬如剎帝利婆羅門毗舍首陀旃陀羅下水清掃人精勤而不撓常勇猛精進達最勝清淨知此婆羅門五如是言已淨者婆羅墮婆闍婆羅門以此白世尊曰世尊是最勝者乃至六又此婆羅墮婆闍成為一阿羅漢八第八拜火一爾時世尊住王舍城竹林栗鼠養餌所二時其拜火婆羅墮婆闍婆羅門行火供煮酪米飯為拜火供犧三時世尊清晨著衣持鉢入王舍城乞食於王舍城家家乞食至拜火婆羅墮婆闍婆羅門家至而立於一面四拜火婆羅墮婆闍婆羅門見世尊乞食以偈白世尊曰三明等具足生高有多聞明行具足者受食我乳飯五世尊雖多唱馱咒埃滿內不淨外蔽於欺瞞非生婆羅門以知於宿命見天界惡趣及達生之滅聖者力成滿有此三明人三明婆羅門明行具足者我受食乳飯六尊者瞿曇且受此食尊者是婆羅門七世尊我唱此偈者非為得食者婆羅門於此知見者非法諸佛之唱偈以斥其代價婆羅門法住是為生活道漏盡悔行靜完全大聖者依事奉飲食是為功德田八如是言已拜火婆羅墮婆闍婆羅門以此白世尊曰世尊是最勝者乃至九又此婆羅墮婆闍成為一阿羅漢九第九孫陀利迦一爾時世尊住拘薩羅之孫陀利迦河邊二時又有孫陀利迦婆羅墮婆闍婆羅門於孫陀利迦河邊行火供作拜火供犧三時孫陀利迦婆羅墮婆闍婆羅門行火供以完成拜火供犧立座回顧四周誰應受食我此剩肴供物耶四時孫陀利迦婆羅墮婆闍婆羅門見世尊包頭坐於樹下見已以手持剩肴供物右手執水瓶以趣近世尊五時世尊聞孫陀利迦婆羅墮婆闍婆羅門之足音摘去頭包六時孫陀利迦婆羅墮婆闍婆羅門此人禿頭此人禿頭者從此欲折回七然則孫陀利迦婆羅墮婆闍婆羅門又生如是思念婆羅門亦有禿頭者我寧詣而以問其生八時孫陀利迦婆羅墮婆闍婆羅門來詣世尊處詣而以此白世尊曰尊者之生者何九世尊勿以問出生唯問其行為微木亦生火雖然生為卑智慧有駿敏止惡有慚愧是為聖者生依真所調順以具悉調順到達於聖道成就梵行人帶來供犧牲呼報出食事是人值供養以給於供犧一婆羅門於我此供犧善為於供養今見如師者以前未見故我剩肴供犧他衆受為食尊者瞿曇受尊者婆羅門一一世尊我唱此偈者非為以得食婆羅門於此知見者非法諸佛之唱偈以斥其代價婆羅門法住是為生活道漏盡悔行靜完全大聖者依事奉飲食是為功德田一二尊瞿曇然則我此剩肴供犧應與何人耶一三婆羅門我如來與如來弟子外即包含世界天界魔界梵天界包含沙門婆羅門人天之衆中不見食此剩肴供犧能消化者婆羅門是故汝從此剩肴供犧捨於無草處或沉於無蟲之水中一四時孫陀利迦婆羅墮婆闍婆羅門從此剩肴供犧沉於無蟲之水中一五時其剩肴供犧沉於水中時唧唧出聲生煙出炎喻於日中太陽所熱之鐵板投入水中唧唧出聲生煙出炎一六時孫陀利迦婆羅墮婆闍婆羅門驚恐毛髮豎立來詣世尊處詣而立於一面一七世尊以偈言於立一面之孫陀利迦婆羅墮婆闍婆羅門曰婆羅門事火勿思得清淨智云此外事依外求清淨依是不得淨婆羅門我止事火而內燃依常火常靜我是阿羅漢常行於梵行婆羅門汝慢是名為重擔忿煙妄語灰舌即是木酌心供犧火處善以自調順始為是人火婆羅門有戒渡津法之湖澄清無染污常為善人讚聖者來此浴體清渡彼岸真實與正法自制是梵行婆羅門依此中道得最勝直心者歸命我謂此等人為隨法行者一八如是言已孫陀利迦婆羅墮婆闍婆羅門以此白世尊曰世尊是最勝者乃至一九又此婆羅墮婆闍婆羅門成為一阿羅漢一第十婆富提低一爾時世尊住拘薩羅國之繁茂森林二時婆羅墮婆闍姓婆羅門有十四頭牛去處不明三時婆羅墮婆闍姓婆羅門尋牛至森林至而見世尊趺坐身正直樹立正念坐於繁茂森林四見已詣世尊處詣而於世尊前白此偈曰於此沙門失十四頭之牛至今尋六日如無有不得然而此沙門是為最安樂於此沙門撒菜種於菜田收穫之最惡非一莖二莖然而此沙門是為最安樂於此沙門之穀倉盡而空鼠盛於其中無有如踊躍然而此沙門是為最安樂於此沙門敷席之盡七月如未滿蚤虱然而此沙門是為最安樂於此沙門有一兒及二兒亦有女七人非如成寡婦然而此沙門是為最安樂於此沙門未蹴褐色黑白斑點婦眠足然而此沙門是為最安樂於此沙門無朝等取缺債還還以立責然而此沙門是為最安樂五世尊婆羅門於我失牛十四頭至今尋六日如無有不得然而婆羅門我為最安樂婆羅門於我撒菜種於田收穫之最惡非一莖二莖然而婆羅門我為最安樂婆羅門於我穀倉盡而空鼠盛於其中無有如踊躍然而婆羅門我為最安樂婆羅門於我敷席盡七月牀非滿蚤虱然而婆羅門我為最安樂婆羅門於我有一兒二兒亦有女七人非如成寡婦然而婆羅門我為最安樂婆羅門於我無蹴褐黑白斑點婦眠足然而婆羅門我為最安樂婆羅門於我無有朝來等迫取於缺債還還以立責然而婆羅門我為最安樂六如是言已婆羅墮婆闍婆羅門以此白世尊曰瞿曇是最勝者瞿曇是最勝者瞿曇猶如起倒者顯覆者示道於迷者如有眼者得見物見形如暗揭燈明如是尊者瞿曇種種說法我今歸依世尊法僧伽願於尊者瞿曇之處得出家及具足戒七婆羅墮婆闍婆羅門得具足戒不久單獨隱棲不放逸虔誠精勤不久良家之子成就清淨梵行由家出無家而出家入於自知自證知生已盡梵行已立所作已辦不受後有八又尊者婆羅墮婆闍成為一阿羅漢此嗢陀南陀然闍仁及讒謗阿修羅與毗蘭耆迦不害及縈髻淨者與拜火與孫陀利迦及婆富提低依此為十經第二優婆塞品一一第一耕田一如是我聞爾時世尊住摩揭陀國南山一葦婆羅門村二時又有耕田婆羅墮婆闍婆羅門於播種時裝五百犁具三時世尊清晨著衣持鉢到耕田婆羅墮婆闍婆羅門之農作場四時耕田婆羅墮婆闍婆羅門為分配食物與豫於諸人五時世尊到分配食物處而立一面六耕田婆羅墮婆闍婆羅門見世尊為乞食而立見而言世尊曰沙門我乃耕種耕種而食沙門汝亦須耕種耕種而得食七婆羅門我亦耕種耕種而食八然則我等未見尊瞿曇之軛鋤犁鑱刺棒牡牛而且尊者瞿曇作如是言婆羅門我亦耕種耕種而食九時耕田婆羅墮婆闍婆羅門以偈白世尊曰汝自云農夫我不見汝耕我問農夫語何知我等耕一世尊信仰是種子鍛鍊是甘雨智慧軛為鋤慚乃為其柄定為是其繩正念我犁鑱乃至為刺棒守身及守語以知食之量以信免割草樂道我休息精進乃我負重荷立牡牛瑜伽運安穩行而無有歸行而亦無悲如是我耕耘不死是果實以為此耕耘我悉脫苦惱一一尊者瞿曇且請受食尊者瞿曇農夫瞿曇之耕耘乃為不死果一二世尊唱偈非為食婆羅門有此知見者非法諸佛之唱偈責斥等價值婆羅門住法唯此生活道諸漏悉皆盡後悔之行靜完滿大聖者以事奉飲食為求功德田一三如是言已耕田婆羅墮婆闍婆羅門以此白世尊曰瞿曇是最勝者瞿曇是最勝者瞿曇喻倒者起覆者露示道於迷者如暗中揭燈明有眼者得見諸形如是尊者瞿曇說種種法我今歸依世尊法僧伽願尊者瞿曇納受我今日以後終生歸依為優婆塞一二第二優陀耶一舍衛國因緣二時世尊清晨著衣持鉢到優陀耶婆羅門之住家三時優陀耶婆羅門以白飯盛滿世尊之鉢四第二次世尊清晨著衣持鉢到優陀耶婆羅門家乃至五第三次優陀耶婆羅門以白飯盛滿世尊之鉢而言曰甚煩沙門瞿曇勿屢次屢次來六世尊屢屢播種子屢屢降天雨屢屢耕農田屢屢穀類實屢屢乞食食屢施施主食屢屢施主施屢屢行天界屢屢搾牛乳屢求犢母牛屢屢疲勞苦愚者屢入胎屢屢於生死屢屢送墓場七如是言已優陀耶婆羅門以此白世尊曰尊者瞿曇是最勝者乃至願尊者瞿曇容納我從今日以後終生歸依為優婆塞一三第三提婆比多一舍衛城因緣二時世尊患感冒尊者優波婆那為世尊之侍者三時世尊呼尊者優波婆那曰優波婆那為我取溫水來四唯然世尊尊者優波婆那奉答世尊即著衣持鉢到提婆比多婆羅門家默然立於一面五提婆比多婆羅門見尊者優波婆那默然立一面以偈白尊者優波婆那曰尊者默然立禿頭僧伽梨何欲及何求為乞何而來六優波婆那阿羅漢善逝聖者患感冒若有溫水者婆羅門與佛供養應供人尊崇可尊人敬於可敬人我願齎豫彼七時提婆比多婆羅門施一擔溫水一瓶糖蜜豫尊者優波婆那八時尊者優波婆那返詣世尊處詣而奉世尊溫水沐浴融糖蜜於溫水以奉世尊九如是世尊其病痊愈一時提婆比多婆羅門來詣世尊處詣而與世尊相致問候交談坐於一面一一坐於一面之提婆比多婆羅門以偈白世尊曰應布施何處施何有大果何處於供養其施果榮盛一二世尊若了知宿命見天界惡趣達生之滅盡滿通力聖者應布施於此施此有大果如是而供果其施果榮盛一三如是言已提婆比多婆羅門以此白世尊曰尊者瞿曇是最勝者乃至願受納我從今日以後歸依為優婆塞一四第四大富者一舍衛城因緣二時有大富婆羅門裝作衰萎貧窮來詣世尊處詣而與世尊互相致問坐於一面三世尊對坐一面之大富婆羅門曰婆羅門汝何故裝作衰萎貧窮而來四尊者瞿曇我有四子彼等與其妻等共謀將我逐出五婆羅門若然汝須暗記此偈當彼等集聚會堂時子輩等之在座時唱之我素喜其生我希其生長彼等與妻謀逐我如豚犬雖非喜賢者亦呼我為父唯子夜叉形捨去我年老如老哀弱馬不豫飲食物我乃此子父雖身為長者但乞他家食有此不孝子不如我拐杖可拂逐猛牛亦可逐猛犬暗中能導我在於深溪時並作定足基依此拐杖力倒而又得起六時此大富婆羅門在世尊處暗記此偈待衆等集聚會堂子輩在座時而唱七時其子等即將大富婆羅門領歸家中豫沐浴各豫穿著一夾衣八時大富婆羅門持一夾衣來詣世尊處詣而與世尊相致問交談坐於一面九坐一面其大富婆羅問以此白世尊曰尊者瞿曇我等婆羅門求我等之師受納酬謝願尊者瞿曇我師受納之報謝一世尊哀憐而納受一一時其大富婆羅門以此白世尊曰尊者瞿曇是最勝者乃至願尊者瞿曇從今日以後受我歸依為優婆塞一五第五憍傲一舍衛城因緣二時名為憍傲之婆羅門住舍衛城彼不敬母不敬父不敬師亦不敬長者三時世尊為大衆所圍繞而說法四時憍傲婆羅門作如是思念此沙門瞿曇為大衆圍繞而說法我今詣沙門瞿曇處若沙門瞿曇語我者我即亦語彼若沙門瞿曇不語我者我即亦不語彼五時憍傲婆羅門詣世尊處詣而默然立於一面六時世尊不言彼七時憍傲婆羅門以此沙門瞿曇無何所知而欲歸八時世尊知憍傲婆羅門心之所念以偈告憍傲婆羅門曰婆羅門勿慢若為此來者婆羅門來者即善達其用九時憍傲婆羅門沙門瞿曇知我心即於立處投身垂頭於世尊之足禮吻世尊之足以手自指並自呼報其名曰尊者瞿曇我名憍傲者尊者瞿曇我名憍傲者一時大衆起未曾有之心實乃希有實乃未曾有此憍傲婆羅門不敬母不敬父不敬師亦不敬長者且對沙門瞿曇行如是最勝五體投地之禮敬一一時世尊以此言憍傲婆羅門曰婆羅門可起立以坐自座汝心已信樂我一二時憍傲婆羅門就坐自座以偈白世尊曰應向誰謙讓應對誰尊奉應豫敬重誰並豫善供誰一三世尊對於母及父乃至年長兄第四乃師長應該行謙讓應尊此等人且敬此等者豫供此等人是為善供養清涼阿羅漢作了漏盡者對此諸善衆行無上禮敬憍慢與強傲應當皆捨去一四如是言已憍傲婆羅門以此白世尊曰尊者瞿曇是最勝者乃至願尊者瞿曇從今日以後受我終生歸依為優婆塞一六第六違義一舍衛城因緣二時名喚違義之婆羅門住舍衛城三時違義婆羅門如是思念我今詣沙門瞿曇處其沙門瞿曇之所說即皆反對而述四時世尊於露地經行五時違義婆羅門詣世尊處順世尊之經行而自經行以此白世尊曰沙門說法六世尊心污瞋恚多何亦好反對如是善說法亦甚難得知唯有滅瞋恚除去無信樂心之障礙者始知善說法七如是言已違義婆羅門以此白世尊曰尊者瞿曇是最勝者乃至願尊者瞿曇從今日以後受我終生歸依為優婆塞一七第七木匠一爾時世尊住拘薩羅國之森林二其時木匠婆羅墮婆闍婆羅門亦因事入此森林三木匠婆羅墮婆闍婆羅門見世尊於沙羅樹下趺坐身正直樹立正念而坐四見而如是思念我為來此森林工作而快樂此沙門瞿曇何為而樂耶五時木匠婆羅墮婆闍婆羅門詣世尊之處詣而以偈白世尊曰比丘汝於此沙羅樹森林以為何事耶唯獨於森林瞿曇有何樂六世尊我獨在森林以行所應行一切森或叢皆是我所斷然我於森林無有煩惱繫亦無刺所刺獨樂拂不滿七如是言已木匠婆羅墮婆闍婆羅門以此白世尊曰尊者瞿曇是最勝者乃至願尊者瞿曇從今日以後受我終生歸依做優婆塞一八第八採薪一爾時世尊住拘薩羅國之森林二其時有婆羅墮闍姓婆羅門之衆多弟子為採薪而來至此森林三至而見世尊於林中結跏趺坐身正直樹立正念而坐見而來到彼婆羅墮婆闍婆羅門處四到已以此告婆羅墮婆闍婆羅門曰尊師請知彼森林有一沙門結跏趺坐身正直樹立正念而坐五時婆羅墮婆闍婆羅門與彼其青年等俱到森林見世尊在森林中結跏趺坐身正直樹立正念而坐見已詣世尊之處以偈白世尊曰深森有多怖獨入於空林心不動實美甚美之比丘汝是在禪思無能歌此者亦無能言語獨聖者依林心喜獨住林我見實希有我思念乃此願生於無上三天世界主為作同伴者何故獨於林尊者修苦行為達於梵否六世尊凡夫種種著愛欲或歡喜生自無知根一切我斷除我無貪無欲亦不與接近有諸清淨見到達於無上吉祥之正覺婆羅門我獨於無畏禪思七如是言已婆羅墮婆闍姓婆羅門以此白世尊曰尊者瞿曇是最勝者乃至願尊者瞿曇從今日以後受我終生歸依為優婆塞一九第九孝養一舍衛城因緣二時孝養婆羅門來詣世尊處詣已與世尊互相致問坐於一面三一面坐之孝養婆羅門以此白世尊曰尊者瞿曇我於如法求食如法求食以養父母尊者瞿曇我如是行是以應為而為耶四婆羅門汝確實如是行應所行婆羅門如法求食以養父母者乃生甚多功德若人以如法孝養父母者依法於父母因此而行為賢者於此世當以讚歎彼彼至於死後又生於天界五如是言已孝養婆羅門以此白世尊曰尊者瞿曇是最勝者乃至願世尊從今日以後受我終生歸依為優婆塞二第十乞食一舍衛城因緣二時乞食婆羅門來詣世尊之處詣而與世尊互相致問坐於一面三一面坐之乞食婆羅門以此白世尊曰尊者瞿曇我亦乞食者尊者亦乞食者於此則無何差異四世尊唯作乞他食並非是比丘執持惡臭法並非是比丘功德惡捨去依智慧於世以修梵行者是名為比丘五如是言已乞食婆羅門以此白世尊曰尊者瞿曇是最勝者乃至願尊者瞿曇從今日以後受我終生歸依做優婆塞二一第十一參伽羅婆一舍衛城因緣二時名喚參伽羅婆婆羅門住舍衛城是水淨行者依水求得清淨朝夕入水行沐浴行三時尊者阿難清晨著衣持鉢入舍衛城乞食於舍衛城乞食後收鉢而來詣世尊處詣而禮敬世尊坐於一面四坐一面尊者阿難以此白世尊曰世尊於此名喚參伽羅婆婆羅門住舍衛城是水淨行者依水求得清淨朝夕入水行沐浴行世尊願垂哀憐到參伽羅婆婆羅門家五世尊許允此而默然六時世尊清晨著衣持鉢到參伽羅婆婆羅門家即坐於所設之座七時參伽羅婆婆羅門近詣世尊前與世尊互相致問坐於一面八世尊以此告一面坐之參伽羅婆婆羅門曰婆羅門汝為水淨行者依水求得清淨朝夕入水行沐浴行真實否九尊者瞿曇是真實一婆羅門汝見有如何利益為水淨行者依水求得清淨朝夕入水行沐浴行耶一一尊者瞿曇我於此日間所為之惡業依夕時沐浴洗落夜間所為之惡業依清晨沐浴將之洗落尊者瞿曇我見此利益故為水淨行者依水求得清淨朝夕入水行沐浴行一二世尊婆羅門戒律渡津之法湖澄清無污穢常受善人讚聖者浴其處體淨渡彼岸一三如是已言參伽羅婆婆羅門以此白世尊曰尊者瞿曇是最勝者乃至願尊者瞿曇從今日以後受我終生歸依為優婆塞二二第十二庫摩都薩邑一如是我聞爾時世尊住釋迦族之庫摩都薩邑二時世尊清晨著衣持鉢入庫摩都薩乞食三其時庫摩都薩邑之婆羅門與家主等因事而集聚於集會堂雨綿綿下降四時世尊來到其集會堂五庫摩都薩婆羅門與家主等見世尊從遠而來六見而言曰彼禿頭沙門等是誰耶彼等何以不知集會法耶七時世尊以偈謂語庫摩都薩婆羅門家主等曰無善人之處並非是集會語不如法者並非是善人若以滅貪欲瞋恚與愚癡能語於如法始稱為善人八如是言已庫摩都薩婆羅門家主等以此白世尊曰尊者瞿曇是最勝者乃至願尊者瞿曇從今日以後受我等終生歸依為優婆塞此嗢陀南耕田優陀耶並提婆比多大富婆羅門憍傲與違義木匠及採薪孝養並乞食及參伽羅婆庫摩都薩等總合為十二
